function openGiftBox(project, awardResult){
  const t = awardResult.timing || "none";
  const li = awardResult.levelInfo;
  const nextTxt = li ? (li.isMax
      ? `ถึงระดับสูงสุดแล้ว — ระดับ ${li.lv} ${li.title}`
      : `อีก ${li.toNext} แต้ม จะขึ้นสู่ระดับ ${li.lv+1}`)
    : "";

  // variant config
  let cfg;
  if(t==="early"){
    cfg={
      cls:"gift-early",
      icon:icon("award",30),
      title:"เยี่ยมมาก! เสร็จก่อนกำหนด",
      sub:esc(project.title),
      msg:"งานนี้เสร็จก่อนเวลาที่กำหนด ทำได้ดีมากจริงๆ ความตั้งใจและความรับผิดชอบของคุณเห็นได้ชัด ทีมโชคดีที่มีคุณ รักษามาตรฐานนี้ไว้นะ 🎉",
      celebrate:true
    };
  } else if(t==="ontime"){
    cfg={
      cls:"gift-ontime",
      icon:icon("check",28),
      title:"เสร็จตามกำหนด",
      sub:esc(project.title),
      msg:"ส่งงานตรงเวลาพอดี ขอบคุณที่รักษากำหนดการนะ",
      celebrate:false
    };
  } else if(t==="late"){
    cfg={
      cls:"gift-late",
      icon:icon("clock",28),
      title:"งานเสร็จแล้ว — แต่ช้ากว่ากำหนด",
      sub:esc(project.title),
      msg:"งานนี้เสร็จช้าเกินกำหนดไปนิดนึง ไม่เป็นไรนะ ทุกคนมีติดขัดได้ สู้ต่อไป! เป็นกำลังใจให้ คราวหน้าลองวางแผนเผื่อเวลาดู แล้วจะดีขึ้นแน่นอน พยายามเข้านะ 💪",
      celebrate:false
    };
  } else {
    cfg={
      cls:"gift-none",
      icon:icon("check",28),
      title:"บันทึกงานเสร็จแล้ว",
      sub:esc(project.title),
      msg:"งานนี้ไม่ได้ตั้งกำหนดส่งไว้ — บันทึกผลงานเรียบร้อยแล้ว",
      celebrate:false
    };
  }
  // v53: replace the static line with a random cheer from the matching pool
  cfg.msg = randGiftMsg(t);

  const overlay=document.createElement("div");
  overlay.className="gift-overlay";
  overlay.innerHTML=`
    <div class="gift-box ${cfg.cls}">
      ${cfg.celebrate?`<div class="gift-confetti">${Array.from({length:14}).map((_,i)=>`<i style="--i:${i}"></i>`).join("")}</div>`:""}
      <div class="gift-emoji">${cfg.icon}</div>
      <div class="gift-title">${cfg.title}</div>
      <div class="gift-subtitle">${cfg.sub}</div>
      <div class="gift-rewards">
        ${(()=>{
          const d = awardResult.daysDiff;
          let label;
          if(awardResult.timing==="early"){
            label = `เสร็จก่อนกำหนด ${d} วัน`;
          } else if(awardResult.timing==="ontime"){
            label = "เสร็จตรงกำหนด";
          } else if(awardResult.timing==="late"){
            label = `ช้ากว่ากำหนด ${Math.abs(d)} วัน`;
          } else {
            label = "ไม่ได้ตั้งกำหนดส่ง";
          }
          const val = awardResult.base||0;
          const valTxt = val>=0 ? `+${val}` : `${val}`;
          const valColor = val<0 ? "var(--crit,#dc2626)" : "";
          return `<div class="gift-reward-line"><span>${label}</span><span style="color:${valColor}">${valTxt}</span></div>`;
        })()}
        ${awardResult.capped?`<div class="gift-reward-line" style="font-size:11px;color:var(--label2)"><span>※ จำกัดโบนัสตามเวลาที่ตั้งให้งาน</span><span></span></div>`:""}
        <div class="gift-reward-line gift-total"><span>${awardResult.primaryName?`${esc(awardResult.primaryName)} (ผู้ดูแลหลัก) ได้รับ`:'รวมคะแนนที่ได้รับ'}</span><span>${(awardResult.granted||0)>=0?`+${awardResult.granted||0}`:`${awardResult.granted}`}</span></div>
        ${(awardResult.collabs && awardResult.collabs.length > 0) ? `
          <div class="gift-collab-divider"></div>
          <div class="gift-collab-head">🤝 ทีมร่วมได้รับ ${awardResult.collabAmount>=0?`+${awardResult.collabAmount}`:`${awardResult.collabAmount}`} แต้ม (50% ของผู้ดูแลหลัก)</div>
          ${awardResult.collabs.map(c => `
            <div class="gift-reward-line gift-collab-line">
              <span><span class="gift-collab-dot" style="background:${avatarColor(c.name)}"></span> ${esc(c.name)}</span>
              <span>${c.amount>=0?`+${c.amount}`:`${c.amount}`}</span>
            </div>
          `).join("")}
        ` : ""}
        ${nextTxt?`<div class="gift-next">${nextTxt}</div>`:""}
        ${awardResult.newAchievements.length>0?
          awardResult.newAchievements.map(a=>`
            <div class="gift-newach">
              <div style="font-weight:800">ปลดล็อกความสำเร็จ: ${esc(a.name)}</div>
              <div style="font-size:11px;color:var(--label2);margin-top:3px">${esc(a.desc)} · +${a.reward} แต้ม</div>
            </div>
          `).join("") : ""}
      </div>
      <div class="gift-msg">${cfg.msg}</div>
      <button class="gift-btn" id="giftClose">${t==="early"?"เยี่ยมเลย!":t==="late"?"รับทราบ จะพยายามต่อ":"รับทราบ"}</button>
    </div>
  `;
  document.body.appendChild(overlay);
  if(cfg.celebrate){
    const box=overlay.querySelector(".gift-box");
    const r=box.getBoundingClientRect();
    setTimeout(()=>burstConfetti(r.left+r.width/2, r.top+40, 60),250);
  }
  $("#giftClose").onclick=()=>{
    overlay.style.animation="fadeIn .2s ease reverse";
    setTimeout(()=>{
      overlay.remove();
      if(awardResult.leveledUp) showLevelUp(awardResult.newLevel);
    },200);
  };
}

function showLevelUp(newLevel){
  const info = LEVELS[newLevel-1] || LEVELS[LEVELS.length-1];
  const overlay=document.createElement("div");
  overlay.className="levelup-overlay";
  overlay.innerHTML=`
    <div class="levelup-box">
      <div class="levelup-emoji">${icon("award",26)}</div>
      <div class="levelup-title">เลื่อนระดับ</div>
      <div class="levelup-level">ระดับ ${newLevel}</div>
      <div class="levelup-name">${esc(info.title)}</div>
      <div class="levelup-tap">แตะที่ใดก็ได้เพื่อปิด</div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.onclick=()=>{
    overlay.style.animation="fadeIn .2s ease reverse";
    setTimeout(()=>overlay.remove(),200);
  };
  setTimeout(()=>{ if(overlay.parentNode) overlay.click(); },4500);
}

function showAchievementUnlock(a){
  const el=document.createElement("div");
  el.className="ach-toast";
  el.innerHTML=`
    <div class="at-em">${icon("award",18)}</div>
    <div class="at-body">
      <div class="at-top">ปลดล็อกความสำเร็จ</div>
      <div class="at-name">${esc(a.name)}</div>
      <div class="at-rew">${esc(a.desc)} · +${a.reward} แต้ม</div>
    </div>
  `;
  document.body.appendChild(el);
  setTimeout(()=>{
    el.style.transition="opacity .4s, transform .4s";
    el.style.opacity="0"; el.style.transform="translate(-50%,-30px)";
    setTimeout(()=>el.remove(),400);
  },3500);
}

(async function(){
  await loadAll(true);
  await bootstrapTeam();
  loadAvatarsFromCache();            // v57: instant avatars from cache before first paint
  loadHolidays();                    // v61: pull team's custom holiday list (background)
  if(myName) seedSeenJobs(myName);   // v53: baseline for live add-to-job alerts
  render();
  // v30: 30-second auto-sync REMOVED.
  // It caused two pain points:
  //   1) Page re-rendered while users were typing → form jumped back to home
  //   2) Unnecessary network traffic when no one else was editing
  // New behavior:
  //   • Saves still push to cloud INSTANTLY on every edit (sset → fire-and-forget)
  //   • Pull happens ONLY when:
  //       - User clicks the 🔄 button in the header (manual)
  //       - User comes back to this tab from another (visibilitychange below)
  //   • Never interrupts active editing.
  document.addEventListener("visibilitychange", async ()=>{
    if(document.hidden) return;          // tab is going away, skip
    if(!SHEET_URL) return;
    if(document.querySelector(".overlay")) return;     // a modal/sheet is open
    if(document.querySelector(".pj-detail-row")) return; // inline detail open
    if(SHEET_STATE==="syncing") return;
    // v53: don't refresh while the user is actively typing (quick-add, search,
    // any field) — a re-render would wipe their in-progress text.
    const aeV = document.activeElement;
    if(aeV && (aeV.tagName === "INPUT" || aeV.tagName === "TEXTAREA" || aeV.isContentEditable)) return;
    await flushPendingWrites();
    // v53: if an admin wiped while this tab was in the background, follow it.
    if(await checkWipeTombstone()){ await bootstrapTeam(); await loadAvatars(); render(); return; }
    const beforeP=JSON.stringify(projects), beforeU=JSON.stringify(users);
    await loadAll();
    if(JSON.stringify(projects)!==beforeP || JSON.stringify(users)!==beforeU){
      render();
    }
  });
  // Retry pending writes when the network comes back
  window.addEventListener("online", ()=>{ flushPendingWrites(); });

  // ── v46: Fast chat polling (every 8s, chat page only, never while typing) ──
  let _chatPollBusy = false;
  setInterval(async ()=>{
    if(!SHEET_URL) return;
    // v53: every 8s, on ANY page, check whether an admin wiped all data. This is
    // what makes deleted test data stay gone on a teammate's already-open browser.
    if(SHEET_STATE !== "syncing" && !document.querySelector(".overlay")){
      const ae0 = document.activeElement;
      const typing0 = ae0 && (ae0.id === "chatInput" || (ae0.closest && ae0.closest(".chat-input-row")));
      if(!typing0 && !_chatPollBusy){
        try{
          if(await checkWipeTombstone()){
            await bootstrapTeam();
            await loadAvatars();
            render();
            toast("ข้อมูลถูกล้างโดยผู้ดูแล — รีเฟรชแล้ว");
            return;
          }
        }catch(e){ /* ignore */ }
      }
    }
    // v53: live "you've been added to a job" alert. Runs on ANY page every 8s.
    // Pulls the shared projects + programs, and if a NEW job now involves me that
    // I hadn't seen before, pop a toast — so someone with the app open in the
    // background still finds out when a teammate pulls them into a task.
    if(SHEET_STATE !== "syncing" && !document.querySelector(".overlay") && myName && !_chatPollBusy){
      const aeI = document.activeElement;
      const typingI = aeI && (aeI.tagName === "INPUT" || aeI.tagName === "TEXTAREA" || aeI.isContentEditable);
      if(!typingI && window.__seenJobIds){
        try{
          const [rp, rpr] = await Promise.all([ sget(PROJ_KEY, true), sget(PROGRAMS_KEY, true) ]);
          const freshProjects = rp && rp.value ? JSON.parse(rp.value) : projects;
          const freshPrograms = rpr && rpr.value ? JSON.parse(rpr.value) : programs;
          const involvesMe = [];
          (freshProjects||[]).forEach(p=>{
            if(p.cancelled || p.status==="done") return;
            if(projectInvolves(p, myName)) involvesMe.push({ id:"t_"+p.id, title:p.title, who:p.createdBy, kind:"task" });
          });
          (freshPrograms||[]).forEach(pr=>{
            if(pr.status==="done") return;
            const mine = nKey(pr.owner||"")===nKey(myName) || (pr.members||[]).some(m=>nKey(m)===nKey(myName));
            if(mine) involvesMe.push({ id:"pr_"+pr.id, title:pr.title, who:pr.owner, kind:"program" });
          });
          const newOnes = involvesMe.filter(j => !window.__seenJobIds.has(j.id));
          if(newOnes.length){
            newOnes.forEach(j => window.__seenJobIds.add(j.id));
            if(rp && rp.value) projects = freshProjects;
            if(rpr && rpr.value) programs = freshPrograms;
            const first = newOnes[0];
            const byTxt = first.who ? ` โดย ${esc(first.who)}` : "";
            if(newOnes.length === 1){
              toast(`🔔 คุณถูกเพิ่มเข้าร่วม${first.kind==="program"?"โปรเจกต์":"งาน"} “${esc(first.title)}”${byTxt}`);
            } else {
              toast(`🔔 คุณถูกเพิ่มเข้าร่วม ${newOnes.length} งานใหม่`);
            }
          }
        }catch(e){ /* ignore transient errors */ }
      }
    }
    if(document.querySelector(".overlay")) return;
    const ae = document.activeElement;
    if(ae && (ae.id === "chatInput" || ae.closest && ae.closest(".chat-input-row"))) return;
    _chatPollBusy = true;
    try{
      const before = JSON.stringify(chatMsgs);
      const raw = await sget(CHAT_KEY, true);
      if(raw){
        const incoming = JSON.parse(raw);
        if(JSON.stringify(incoming) !== before){
          chatMsgs = incoming;
          const ae2 = document.activeElement;
          const typing = ae2 && (ae2.id === "chatInput" || (ae2.closest && ae2.closest(".chat-input-row")));
          if(currentPage === "chat" && !typing && !document.querySelector(".overlay")){
            render();
          }
        }
      }
    }catch(e){ /* ignore transient poll errors */ }
    finally{ _chatPollBusy = false; }
  }, 4000); // v57: was 8000 — faster so collaborators see new jobs in ~4s
})();
</script>

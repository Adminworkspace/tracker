<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Project & Jobs Tracker — CC Workspace</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  :root {
    /* Calm but alive — neutral base, single cool accent + one warm accent */
    --bg:#FAFAF9; --card:#FFFFFF; --card2:#F5F5F4;
    --label:#1C1917; --label2:#78716C; --label3:#A8A29E;
    --sep:#E7E5E4; --sep2:#F0EFEE;
    /* cool accent (structure + active state) — soft charcoal, minimal & refined */
    --accent:#374151; --accent-soft:#F1F2F4; --accent-line:#C9CDD4;
    /* warm accent (life, progress, success moments) — emerald, mature not childish */
    --warm:#0E7C66; --warm-soft:#E6F4F0; --warm-line:#9DCFC3; --warm-deep:#0A5E4D;
    --blue:#2563EB; --green:#16A34A; --orange:#EA580C;
    --red:#DC2626; --amber:#D97706; --indigo:#4F46E5;
    --teal:#0D9488; --gold:#B45309;
    /* semantic */
    --ok:#0E7C66; --warn:#D97706; --crit:#DC2626; --idle:#78716C;
    --radius:10px; --radius-sm:7px; --radius-lg:18px;
    /* motion — the soul of "alive but calm" */
    --ease:cubic-bezier(.22,.61,.36,1);
    --ease-out:cubic-bezier(.16,1,.3,1);
    --spring:cubic-bezier(.34,1.56,.64,1);
    --t-fast:.16s; --t:.24s; --t-slow:.4s;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter","Segoe UI","Helvetica Neue",Helvetica,Arial,sans-serif;
    --mono:"SF Mono","JetBrains Mono","Roboto Mono",ui-monospace,Menlo,monospace;
  }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration:.001s !important; transition-duration:.001s !important; }
  }
  body { font-family:var(--font); background:var(--bg); color:var(--label);
    min-height:100vh; -webkit-font-smoothing:antialiased; letter-spacing:-0.011em; }
  body.has-nav { padding-bottom:64px; }
  button { font-family:var(--font); cursor:pointer; border:none; background:none; letter-spacing:-0.01em; }
  input,textarea,select { font-family:var(--font); letter-spacing:-0.01em; }
  .avatar { border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-weight:700; flex-shrink:0; overflow:hidden; line-height:1; }
  .avatar img { width:100%; height:100%; object-fit:cover; display:block; }
  .ico { display:inline-block; vertical-align:middle; flex-shrink:0; }

  /* ═══ MICRO-INTERACTION TOOLKIT — "calm but alive" ═══ */
  .tap { transition:transform var(--t-fast) var(--ease), box-shadow var(--t-fast) var(--ease); }
  .tap:active { transform:scale(.97); }
  .lift { transition:transform var(--t) var(--ease-out), border-color var(--t) var(--ease), box-shadow var(--t) var(--ease-out); }
  .lift:hover { transform:translateY(-2px); }
  .num-anim { font-variant-numeric:tabular-nums; transition:color var(--t) var(--ease); }
  @keyframes riseIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes popIn { 0%{opacity:0;transform:scale(.9)} 60%{transform:scale(1.02)} 100%{opacity:1;transform:scale(1)} }
  @keyframes barGrow { from{width:0 !important} }
  @keyframes pulseWarm { 0%{box-shadow:0 0 0 0 rgba(14,124,102,.35)} 70%{box-shadow:0 0 0 7px rgba(14,124,102,0)} 100%{box-shadow:0 0 0 0 rgba(14,124,102,0)} }
  @keyframes flameFlick { 0%,100%{transform:scale(1) rotate(-3deg)} 50%{transform:scale(1.1) rotate(3deg)} }
  @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
  .rise { animation:riseIn var(--t-slow) var(--ease-out) both; }
  .stagger > * { animation:riseIn var(--t-slow) var(--ease-out) both; }
  .stagger > *:nth-child(1){animation-delay:.02s} .stagger > *:nth-child(2){animation-delay:.06s}
  .stagger > *:nth-child(3){animation-delay:.10s} .stagger > *:nth-child(4){animation-delay:.14s}
  .stagger > *:nth-child(5){animation-delay:.18s} .stagger > *:nth-child(6){animation-delay:.22s}
  .stagger > *:nth-child(7){animation-delay:.26s} .stagger > *:nth-child(8){animation-delay:.30s}
  .stagger > *:nth-child(9){animation-delay:.34s} .stagger > *:nth-child(n+10){animation-delay:.38s}
  .ripple { position:relative; overflow:hidden; }
  .ripple-dot {
    position:absolute; border-radius:50%; transform:scale(0);
    background:currentColor; opacity:.18; pointer-events:none;
    animation:rippleGo .55s var(--ease-out) forwards;
  }
  @keyframes rippleGo { to{transform:scale(2.4);opacity:0} }
  .live-dot { position:relative; }
  .live-dot::after {
    content:""; position:absolute; inset:0; border-radius:inherit;
    animation:pulseWarm 2.4s var(--ease) infinite;
  }
  .ico-wrap { display:inline-flex; align-items:center; justify-content:center; }

  /* LOGIN — v45: Bright sky-blue palette. Light, fresh, energetic — the colorful
     avatar rings still pop, and the floating work emojis read as cheerful confetti.
     Gradient goes from a soft top sky to a slightly deeper bottom for gentle depth. */
  .login-screen {
    min-height:100vh;
    padding:60px 24px 40px;
    background:linear-gradient(180deg, #EAF4FF 0%, #D6EAFB 55%, #C4E0F7 100%);
    display:flex; flex-direction:column;
    position:relative; overflow:hidden;
  }
  /* Subtle ambient orbs in the background for depth */
  .login-screen::before, .login-screen::after {
    content:""; position:absolute; border-radius:50%;
    filter:blur(80px); opacity:.28; pointer-events:none;
  }
  .login-screen::before {
    width:420px; height:420px;
    background:radial-gradient(circle, #60A5FA 0%, transparent 70%);
    top:-120px; left:-100px;
    animation:loginOrb 18s ease-in-out infinite;
  }
  .login-screen::after {
    width:380px; height:380px;
    background:radial-gradient(circle, #A5D8FF 0%, transparent 70%);
    bottom:-100px; right:-100px;
    animation:loginOrb 22s ease-in-out infinite reverse;
  }
  @keyframes loginOrb {
    0%, 100% { transform:translate(0,0) scale(1); }
    50%      { transform:translate(40px,30px) scale(1.15); }
  }

  /* v56: Time-of-day landscape scene (replaces ripple background).
     A layered SVG mountain scene that recolours by real device time:
     morning / day / evening / night. Sits behind all content (z-index:0). */
  .login-bg-emojis {
    position:absolute; inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
  }
  .login-scene { position:absolute; inset:0; width:100%; height:100%; display:block; }
  .login-scene svg { width:100%; height:100%; display:block; }
  @keyframes sceneTwinkle { 0%,100%{opacity:0.25} 50%{opacity:1} }
  .scene-star { animation:sceneTwinkle 3s ease-in-out infinite; }
  @keyframes sceneBirdFly {
    0%   { transform:translate(-12vw, 4vh)  scale(1); opacity:0; }
    8%   { opacity:1; }
    50%  { transform:translate(50vw, -2vh) scale(1.05); }
    92%  { opacity:1; }
    100% { transform:translate(112vw, 5vh) scale(1); opacity:0; }
  }
  .scene-bird { animation:sceneBirdFly 18s linear infinite; transform-box:view-box; }
  .scene-bird.b2 { animation-duration:24s; animation-delay:-6s; }
  /* v59b: clouds start near centre (visible on mobile where edges are cropped)
     and drift gently OUTWARD — c1 to the left, c2 to the right. */
  @keyframes sceneCloudDriftL { 0%{transform:translateX(0)} 100%{transform:translateX(-8vw)} }
  @keyframes sceneCloudDriftR { 0%{transform:translateX(0)} 100%{transform:translateX(8vw)} }
  .scene-cloud { animation:sceneCloudDriftL 42s ease-in-out infinite alternate; }
  .scene-cloud.c2 { animation:sceneCloudDriftR 55s ease-in-out infinite alternate; }
  @media (prefers-reduced-motion: reduce) {
    .scene-star, .scene-bird, .scene-cloud { animation:none; }
    .scene-bird { opacity:1; }
  }
  /* v56: on dark skies (evening/night) switch text to light so names stay
     readable over the scene. */
  .login-screen.scene-evening .login-title,
  .login-screen.scene-night .login-title { color:#FFFFFF; text-shadow:0 1px 8px rgba(0,0,0,0.35); }
  .login-screen.scene-evening .login-subtitle,
  .login-screen.scene-night .login-subtitle { color:rgba(255,255,255,0.88); text-shadow:0 1px 6px rgba(0,0,0,0.3); }
  .login-screen.scene-evening .login-tagline,
  .login-screen.scene-night .login-tagline { color:#FFFFFF; background:rgba(255,255,255,0.18); }
  .login-screen.scene-evening .mc-name,
  .login-screen.scene-night .mc-name { color:#FFFFFF; text-shadow:0 1px 6px rgba(0,0,0,0.45); }
  .login-screen.scene-evening .mc-role,
  .login-screen.scene-night .mc-role { color:rgba(255,255,255,0.82); text-shadow:0 1px 5px rgba(0,0,0,0.4); }
  .login-screen.scene-night .login-foot,
  .login-screen.scene-evening .login-foot { color:rgba(255,255,255,0.82); }

  .login-header { text-align:center; padding:8px 0 44px; color:var(--label); position:relative; z-index:2; }
  .login-emoji {
    display:inline-flex; align-items:center; justify-content:center;
    width:64px; height:64px; border-radius:18px;
    /* v38: Solid color, no gradient — cleaner and on-brand */
    background:#21409a;
    color:#fff; font-size:26px; margin-bottom:20px;
    box-shadow:0 12px 32px rgba(33,64,154,.30), 0 4px 12px rgba(0,0,0,.10);
  }
  .login-title { font-size:30px; font-weight:800; letter-spacing:-0.03em; color:var(--label); }
  .login-subtitle { font-size:14px; font-weight:500; color:var(--label2); margin-top:8px; }
  .login-tagline {
    display:inline-block; margin-top:22px; padding:7px 16px;
    background:rgba(255,255,255,.7); border:1px solid var(--sep);
    border-radius:99px; font-size:12px; font-weight:600;
    color:var(--label2); letter-spacing:.01em;
    backdrop-filter:blur(8px);
  }

  /* v32: Member grid — flex rows of 4, admin sits alone */
  .login-grid {
    display:flex; flex-direction:column; gap:32px;
    max-width:780px; margin:0 auto; width:100%;
    position:relative; z-index:2;
  }
  .login-row {
    display:flex; justify-content:center; flex-wrap:wrap; gap:24px;
  }
  .login-row.admin-row { margin-top:14px; }

  /* v36: Floating avatar card — back to no white wrapper, just the avatar itself.
     The previous "card with bg" approach made the screen feel busy with rectangles.
     The avatar is now a TRUE CIRCLE (border-radius:50%) — no more corners visible.
     Background uses a soft white-to-color gradient so the emoji inside contrasts. */
  .member-card {
    position:relative; cursor:pointer;
    width:108px; padding:0;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    background:transparent; border:none;
    text-align:center;
    transition:transform var(--t) var(--spring), opacity var(--t) var(--ease), filter var(--t) var(--ease);
    animation:floatUp 6s ease-in-out infinite;
  }
  /* v42: Dim only fires when the mouse is ON a member-card itself, not just over the
     grid container's empty space. :has(.member-card:hover) checks the parent ONLY when
     an actual card is being hovered — empty space between cards no longer triggers dim. */
  .login-grid:has(.member-card:hover) .member-card {
    opacity:.35;
    filter:saturate(.7);
  }
  .login-grid .member-card:hover {
    opacity:1 !important;
    filter:saturate(1) !important;
  }
  .member-card:nth-child(1) { animation-delay:0s;    }
  .member-card:nth-child(2) { animation-delay:.8s;   }
  .member-card:nth-child(3) { animation-delay:1.6s;  }
  .member-card:nth-child(4) { animation-delay:2.4s;  }
  .member-card:nth-child(5) { animation-delay:3.2s;  }
  .member-card:nth-child(6) { animation-delay:.4s;   }
  .member-card:nth-child(7) { animation-delay:2.0s;  }
  .member-card:nth-child(8) { animation-delay:1.2s;  }
  @keyframes floatUp {
    0%, 100% { transform:translateY(0); }
    50%      { transform:translateY(-8px); }
  }
  .member-card:hover { animation-play-state:paused; transform:translateY(-12px); z-index:5; }
  .member-card:active { transform:translateY(-4px); }

  /* v40: SIMPLIFIED — the ring is now an outset box-shadow, not a ::before pseudo-element.
     Previous version had stacking-context issues where the ring was bleeding into the
     avatar's white background. With box-shadow there's no extra DOM, no clipping problems.
     The ring brightens on hover via a thicker shadow. */
  .member-card .mc-avatar {
    width:78px; height:78px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:38px; line-height:1;
    overflow:hidden; position:relative;
    /* White bg is set inline per-user via JS (background:#FFFFFF) */
    box-shadow:
      0 0 0 3px var(--mc-col,#21409a),         /* The color ring */
      0 8px 20px rgba(28,25,23,.16),           /* Soft drop shadow */
      0 2px 6px rgba(28,25,23,.10);
    transition:box-shadow var(--t) var(--ease), transform var(--t) var(--spring);
  }
  .member-card:hover .mc-avatar {
    transform:scale(1.28);
    box-shadow:
      0 0 0 4px var(--mc-col,#21409a),         /* Thicker, more saturated ring */
      0 0 0 7px rgba(255,255,255,.7),          /* White spacer (extra glow) */
      0 14px 30px rgba(28,25,23,.22),
      0 5px 10px rgba(28,25,23,.12);
  }
  .member-card .mc-avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }

  .member-card .mc-emoji { line-height:1; }
  .member-card .mc-name {
    font-size:14px; font-weight:700; letter-spacing:-0.01em;
    color:var(--label);
  }
  .member-card .mc-role {
    font-size:11px; color:var(--label2); font-weight:500; margin-top:-4px;
  }

  /* Admin (Witaya) — larger circle + golden ring */
  .member-card.admin .mc-crown {
    /* v49: bigger crown + tidy baseline alignment with the name. */
    display:inline-flex; align-items:center; justify-content:center;
    font-size:20px; line-height:1;
    vertical-align:middle;
    margin-right:3px;
    position:relative; top:-2px;
  }
  .member-card.admin .mc-name {
    display:flex; align-items:center; justify-content:center; gap:0;
  }
  .member-card.admin .mc-avatar {
    width:90px; height:90px; font-size:42px;
    /* v40: Gold ring via outset box-shadow — no more ::before bleeding into white bg */
    box-shadow:
      0 0 0 3px #F59E0B,
      0 12px 28px rgba(245,158,11,.30),
      0 4px 8px rgba(28,25,23,.10);
  }
  .member-card.admin:hover .mc-avatar {
    transform:scale(1.28);
    box-shadow:
      0 0 0 4px #F59E0B,
      0 0 0 7px rgba(255,255,255,.7),
      0 16px 34px rgba(245,158,11,.40),
      0 6px 12px rgba(28,25,23,.14);
  }
  .member-card.admin .mc-name { font-size:16px; }

  .member-card .mc-level {
    display:inline-block; font-size:10px; font-weight:700;
    color:var(--label);
    background:rgba(255,255,255,.85);
    border:1px solid var(--sep);
    padding:3px 9px; border-radius:99px;
    margin-top:-4px;
    backdrop-filter:blur(4px);
  }

  .login-foot {
    text-align:center; color:var(--label3); font-size:12px;
    font-weight:500; margin-top:auto; padding-top:48px;
    position:relative; z-index:2;
  }

  @media (max-width:640px) {
    .login-grid { gap:24px; }
    .login-row { gap:14px; }
    .member-card { width:92px; gap:8px; }
    .member-card .mc-avatar { width:64px; height:64px; font-size:30px; }
    .member-card.admin .mc-avatar { width:74px; height:74px; font-size:34px; }
    .member-card .mc-name { font-size:13px; }
    .member-card.admin .mc-name { font-size:14px; }
    .login-title { font-size:24px; }
  }
  @media (max-width:380px) {
    .login-row { gap:10px; }
    .member-card { width:78px; }
    .member-card .mc-avatar { width:56px; height:56px; font-size:26px; }
    .member-card.admin .mc-avatar { width:66px; height:66px; font-size:30px; }
  }

  /* SIDEBAR / BOTTOM NAV */
  .sidebar {
    position:fixed; left:0; top:0; bottom:0;
    width:212px;
    /* v32: Dark sidebar — matches PinHome reference.
       The dark surface creates strong contrast with the white active pill,
       which visually "bridges" the sidebar to the white content cards on the right.
       This is the deep-blue brand variant: a touch of #21409a mixed with charcoal. */
    background:linear-gradient(180deg, #1a2240 0%, #131829 100%);
    border-right:1px solid rgba(255,255,255,.06);
    padding:20px 12px 14px;
    display:flex; flex-direction:column; z-index:100;
    color:rgba(255,255,255,.85);
  }
  .sb-logo {
    display:flex; align-items:center; gap:10px;
    padding:2px 6px 24px; font-size:15px; font-weight:800;
    letter-spacing:-0.02em;
    color:#fff;
  }
  .sb-logo-icon {
    width:32px; height:32px;
    /* v38: Solid brand color, no gradient */
    background:#21409a;
    border-radius:var(--radius); display:flex; align-items:center; justify-content:center;
    color:#fff;
    box-shadow:0 4px 12px rgba(33,64,154,.4);
  }
  .nav-item {
    display:flex; align-items:center; gap:11px;
    padding:10px 12px; border-radius:var(--radius);
    font-size:13.5px; font-weight:600;
    color:rgba(255,255,255,.65); cursor:pointer;
    transition:background var(--t) var(--ease), color var(--t) var(--ease),
               transform var(--t-fast) var(--ease), box-shadow var(--t) var(--ease);
    margin-bottom:3px;
    position:relative;
    background:transparent;
    border:none;
    text-align:left;
    width:100%;
  }
  .nav-item:hover { background:rgba(255,255,255,.06); color:#fff; }
  .nav-item:active { transform:scale(.97); }
  /* v32: Active state — white pill that visually bridges sidebar → content area.
     The shadow + brightness make the white pill pop against the dark sidebar. */
  .nav-item.active {
    background:#FFFFFF;
    color:#21409a;
    font-weight:700;
    box-shadow:0 4px 14px rgba(0,0,0,.25), 0 2px 4px rgba(33,64,154,.20);
  }
  .nav-item.active:hover { color:#21409a; background:#FFFFFF; }
  /* Left accent stripe for the active item — subtle blue brand cue */
  .nav-item.active::before {
    content:""; position:absolute; left:-12px; top:8px; bottom:8px;
    width:3px; border-radius:0 3px 3px 0;
    background:#FFFFFF;
    box-shadow:0 0 12px rgba(255,255,255,.5);
  }
  .nav-item-icon { flex-shrink:0; width:20px; display:flex; align-items:center; justify-content:center; opacity:.7;
    transition:transform var(--t) var(--spring), opacity var(--t) var(--ease); }
  .nav-item.active .nav-item-icon { opacity:1; color:#21409a; }
  .nav-item:hover .nav-item-icon { transform:scale(1.12); opacity:1; }
  .nav-badge {
    margin-left:auto; min-width:20px; height:20px; padding:0 6px;
    border-radius:99px; background:var(--crit); color:#fff;
    font-size:11px; font-weight:800; line-height:20px; text-align:center;
    animation:badgePop .35s var(--spring);
  }
  .nav-item.active .nav-badge { background:#21409a; color:#fff; }
  @keyframes badgePop { from{transform:scale(.4);opacity:0} to{transform:scale(1);opacity:1} }
  .chat-scope-badge {
    display:inline-flex; align-items:center; justify-content:center;
    min-width:18px; height:18px; padding:0 6px; margin-left:6px;
    border-radius:99px; background:var(--crit); color:#fff;
    font-size:10.5px; font-weight:800; line-height:1; vertical-align:middle;
  }
  .nav-spacer { flex:1; }
  .nav-divider { height:1px; background:rgba(255,255,255,.08); margin:10px 4px; }
  .nav-user {
    display:flex; align-items:center; gap:10px;
    padding:9px 8px; border-radius:var(--radius);
    cursor:pointer; transition:background .12s;
  }
  .nav-user:hover { background:rgba(255,255,255,.06); }
  .nav-user-info { flex:1; min-width:0; overflow:hidden; }
  .nav-user-name { font-size:13px; font-weight:700; letter-spacing:-0.01em;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#fff; }
  .nav-user-role { font-size:11px; color:rgba(255,255,255,.55); font-weight:500; }

  @media (max-width: 819px) {
    .sidebar {
      width:auto; right:0; top:auto; bottom:0; height:auto;
      padding:6px 6px max(6px, env(safe-area-inset-bottom));
      flex-direction:row;
      border-right:none; border-top:1px solid var(--sep);
      background:rgba(255,255,255,.95);
      backdrop-filter:saturate(180%) blur(16px);
      color:var(--label);
    }
    .sb-logo, .nav-divider, .nav-user, .nav-spacer { display:none; }
    .nav-item {
      flex:1; flex-direction:column;
      padding:7px 4px; gap:3px;
      margin-bottom:0; font-size:10px;
      text-align:center; border-radius:var(--radius-sm);
      color:var(--label2);
    }
    .nav-item:hover { background:var(--card2); color:var(--label); }
    .nav-item.active {
      background:transparent; color:#21409a;
      box-shadow:none;
    }
    /* v31: hide left stripe on mobile (different orientation — bottom nav) */
    .nav-item.active::before { display:none; }
    .nav-item.active:hover { color:#21409a; background:transparent; }
    .nav-item.active .nav-item-icon { opacity:1; color:#21409a; }
    .nav-item-icon { width:auto; }
  }
  /* v19: TABLET LANDSCAPE — icon-only sidebar (820-1199px) */
  @media (min-width: 820px) and (max-width: 1199px) {
    .sidebar {
      width:68px; padding:18px 8px 14px;
      align-items:stretch;
    }
    .sb-logo {
      justify-content:center; padding:2px 0 22px;
    }
    .sb-logo > div:not(.sb-logo-icon) { display:none; }
    .nav-item-label { display:none; }
    .nav-item {
      flex-direction:column; padding:10px 4px; gap:4px;
      font-size:10px; text-align:center;
      border-radius:var(--radius-sm); justify-content:center;
      position:relative;
    }
    .nav-item.active {
      background:#FFFFFF; color:#21409a;
      box-shadow:0 2px 6px rgba(33,64,154,.10);
    }
    .nav-item.active::before {
      content:""; position:absolute; left:-8px; top:8px; bottom:8px;
      width:3px; border-radius:0 3px 3px 0; background:#21409a;
    }
    .nav-item.active:hover { color:#21409a; }
    .nav-item-icon { width:auto; opacity:1; }
    .nav-badge {
      position:absolute; top:4px; right:6px; min-width:16px; height:16px;
      font-size:9px; line-height:16px; margin-left:0; padding:0 4px;
    }
    .nav-user {
      padding:8px 4px; flex-direction:column; gap:4px; justify-content:center;
    }
    .nav-user-info { display:none; }
    body.has-nav { padding-left:68px !important; }
  }
  @media (min-width: 1200px) {
    body.has-nav { padding-left:212px; padding-bottom:0; }
  }
  @media (min-width: 820px) {
    body.has-nav { padding-bottom:0; }
  }

  /* TOP BAR */
  .topbar {
    position:sticky; top:0; z-index:50;
    background:rgba(250,250,250,.85);
    backdrop-filter:saturate(180%) blur(16px);
    -webkit-backdrop-filter:saturate(180%) blur(16px);
    border-bottom:1px solid var(--sep);
    padding:12px 18px; display:flex; align-items:center;
    justify-content:space-between; min-height:52px;
  }
  .tb-title { font-size:18px; font-weight:800; letter-spacing:-0.025em; }
  .tb-sub { font-size:11.5px; color:var(--label2); font-weight:500; margin-top:2px; }
  .tb-left { display:flex; flex-direction:column; }
  .head-actions { display:flex; align-items:center; gap:7px; }
  .sync-pill {
    display:flex; align-items:center; justify-content:center; gap:6px;
    height:30px; padding:0 12px 0 10px; border-radius:999px;
    background:var(--card2); border:1px solid var(--sep);
    font-size:11.5px; font-weight:600; color:var(--label2);
    transition:border-color .15s, color .15s;
  }
  .sync-pill:hover { border-color:var(--accent-line); color:var(--label); }
  .sync-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--ok,#16A34A); transition:background .3s;
    flex-shrink:0; box-shadow:0 0 0 2px rgba(22,163,74,.15);
  }
  .sync-pill-txt { white-space:nowrap; }
  @media (max-width:640px){
    .sync-pill-txt { display:none; }
    .sync-pill { width:30px; padding:0; }
  }
  .icon-btn {
    width:34px; height:34px; border-radius:var(--radius);
    background:var(--card); border:1px solid var(--sep); color:var(--label2);
    display:flex; align-items:center; justify-content:center;
    transition:border-color var(--t) var(--ease), color var(--t) var(--ease), transform var(--t-fast) var(--spring);
  }
  .icon-btn:hover { border-color:var(--accent-line); color:var(--label); transform:translateY(-1px); }
  .icon-btn:active { transform:scale(.9); }

  /* FAB */
  .fab {
    position:fixed; right:18px;
    bottom:calc(80px + env(safe-area-inset-bottom));
    width:54px; height:54px; border-radius:var(--radius-lg);
    background:var(--accent); color:#fff;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 18px rgba(24,24,27,.25);
    z-index:95;
    transition:transform var(--t) var(--spring), box-shadow var(--t) var(--ease-out);
  }
  .fab:hover { transform:scale(1.06) translateY(-2px); box-shadow:0 10px 26px rgba(24,24,27,.3); }
  .fab:active { transform:scale(.92); }
  @media (min-width:820px){ .fab { bottom:30px; right:30px; } }

  /* COMPACT WELCOME — calm but alive */
  .welcome {
    margin:16px 16px 10px; padding:18px;
    background:var(--card); border:1px solid var(--sep);
    border-radius:var(--radius-lg); color:var(--label);
    animation:riseIn var(--t-slow) var(--ease-out) both;
  }
  .wc-top { display:flex; gap:13px; align-items:center; }
  .wc-avatar {
    width:46px; height:46px; border-radius:var(--radius);
    background:var(--accent); flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:18px; font-weight:700; color:#fff; overflow:hidden;
    cursor:pointer; transition:transform var(--t) var(--spring);
  }
  .wc-avatar:hover { transform:scale(1.05) rotate(-2deg); }
  .wc-avatar:active { transform:scale(.95); }
  .wc-avatar img { width:100%; height:100%; object-fit:cover; }
  .wc-body { flex:1; min-width:0; }
  .wc-greet { font-size:12px; font-weight:500; color:var(--label2); }
  .wc-name { font-size:18px; font-weight:800; letter-spacing:-0.025em; line-height:1.2; margin-top:2px; }
  .wc-today { font-size:11.5px; color:var(--label2); margin-top:3px; }
  .wc-stats { display:flex; gap:8px; flex-shrink:0; }
  .wc-stat {
    background:var(--card2); border:1px solid var(--sep);
    border-radius:var(--radius); padding:7px 11px; min-width:54px;
    cursor:pointer;
    transition:transform var(--t) var(--spring), border-color var(--t) var(--ease);
    display:flex; flex-direction:column; align-items:center; gap:1px;
  }
  /* MOBILE: stack stats below greeting/name */
  @media (max-width: 640px) {
    .welcome { padding:15px; margin:14px 12px 10px; }
    .wc-top { flex-wrap:wrap; gap:12px; }
    .wc-body { flex-basis:calc(100% - 60px); min-width:0; }
    .wc-stats {
      width:100%; flex:1 1 100%;
      display:grid; grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:6px;
    }
    .wc-stat { padding:8px 6px; min-width:0; }
    .wc-stat-lbl { font-size:9px; }
    .wc-stat-big { font-size:16px; }
    .wc-name { font-size:17px; }
  }
  .wc-stat:hover { border-color:var(--warm-line); transform:translateY(-2px); }
  .wc-stat:active { transform:scale(.95); }
  .wc-stat-lbl { font-size:9.5px; font-weight:600; color:var(--label2); text-transform:uppercase; letter-spacing:.04em; }
  .wc-stat-big { font-size:17px; font-weight:800; letter-spacing:-0.02em; font-variant-numeric:tabular-nums; }
  .wc-stat.streak-hot .wc-stat-big { color:var(--warm); }
  .wc-progress { margin-top:16px; padding-top:14px; border-top:1px solid var(--sep); }
  .wc-progress-bar { height:7px; background:var(--card2); border-radius:99px; overflow:hidden; position:relative; }
  .wc-progress-fill {
    height:100%; border-radius:99px;
    background:linear-gradient(90deg,var(--warm),var(--warm-deep));
    position:relative;
  }
  .wc-progress-fill::after {
    content:""; position:absolute; inset:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
    background-size:200% 100%;
    animation:shimmer 2.6s var(--ease) infinite;
  }
  .wc-progress-text { font-size:11px; color:var(--label2); margin-top:8px;
    display:flex; justify-content:space-between; font-weight:600; }
  .wc-tier-label { font-weight:800; color:var(--warm); }

  /* Quick add */
  .quick-add {
    margin:8px 16px 6px;
    background:var(--card); border-radius:14px;
    padding:5px; display:flex; align-items:center; gap:5px;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
    border:1.5px solid transparent;
    transition:border-color .2s, box-shadow .2s;
  }
  .quick-add:focus-within {
    border-color:var(--blue);
    box-shadow:0 0 0 4px rgba(0,122,255,.12);
  }
  .qa-icon {
    width:34px; height:34px; border-radius:9px;
    background:rgba(0,122,255,.12); color:var(--blue);
    display:flex; align-items:center; justify-content:center;
    font-size:17px; flex-shrink:0;
  }
  .qa-input {
    flex:1; border:none; background:none; outline:none;
    font-size:14px; padding:8px 4px; color:var(--label);
    min-width:0;
  }
  .qa-input::placeholder { color:var(--label3); }
  .qa-btn {
    flex-shrink:0; padding:8px 14px; border-radius:10px;
    background:var(--blue); color:#fff;
    font-size:13px; font-weight:700;
    transition:transform .15s, opacity .15s;
  }
  .qa-btn:active { transform:scale(.94); }
  .qa-more {
    flex-shrink:0; padding:8px 10px; border-radius:10px;
    background:rgba(120,120,128,.1); color:var(--label2);
    font-size:14px; font-weight:700;
    transition:background .15s;
  }
  .qa-more:active { background:rgba(120,120,128,.2); }

  /* Overview chart */
  .overview {
    margin:8px 16px 4px; background:var(--card); border-radius:18px;
    padding:14px 14px 12px;
    box-shadow:0 1px 3px rgba(0,0,0,.04);
    animation:cardIn .55s cubic-bezier(.2,.9,.3,1.1) .05s both;
  }
  .ov-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .ov-title { font-size:14px; font-weight:800; letter-spacing:-0.02em; display:flex; align-items:center; gap:6px; }
  .ov-total {
    background:rgba(0,122,255,.1); color:var(--blue);
    padding:4px 11px; border-radius:20px;
    font-size:13px; font-weight:800;
  }
  .ov-body { display:flex; align-items:center; gap:14px; }
  .ov-chart { flex-shrink:0; position:relative; width:130px; height:130px; }
  .ov-chart svg { width:100%; height:100%; }
  .ov-chart-center {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; pointer-events:none;
  }
  .ov-chart-num { font-size:26px; font-weight:900; letter-spacing:-0.03em; line-height:1; }
  .ov-chart-lbl { font-size:10px; color:var(--label2); font-weight:600; margin-top:2px; }
  .ov-legend { flex:1; display:flex; flex-direction:column; gap:3px; min-width:0; }
  .ov-legend-row { display:flex; align-items:center; gap:8px; padding:2px 0; font-size:12px; }
  .ov-legend-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .ov-legend-lbl { flex:1; font-weight:600; }
  .ov-legend-val { font-weight:800; }
  .ov-legend-row.alert .ov-legend-lbl,
  .ov-legend-row.alert .ov-legend-val { color:var(--red); }

  /* Timeline */
  .timeline { padding:8px 16px 20px; }
  .tl-group { margin-bottom:18px; animation:cardIn .4s ease both; }
  .tl-group:nth-child(2){animation-delay:.08s}
  .tl-group:nth-child(3){animation-delay:.16s}
  .tl-group:nth-child(4){animation-delay:.24s}
  .tl-group-head { display:flex; align-items:center; gap:9px; margin-bottom:9px; padding:0 4px; }
  .tl-group-emoji {
    width:28px; height:28px; border-radius:9px;
    display:flex; align-items:center; justify-content:center;
    font-size:15px; box-shadow:0 2px 6px rgba(0,0,0,.08);
  }
  .tl-group-label { font-size:15px; font-weight:800; letter-spacing:-0.02em; }
  .tl-group-count {
    font-size:12px; font-weight:700; color:var(--label2);
    background:rgba(120,120,128,.14); border-radius:20px;
    padding:2px 9px;
  }
  .tl-list { position:relative; padding-left:28px; }
  .tl-list::before {
    content:""; position:absolute;
    left:13px; top:10px; bottom:10px;
    width:2px; border-radius:2px;
    background:var(--accent,#E5E5EA); opacity:.3;
  }
  .tl-item { position:relative; padding-bottom:11px; }
  .tl-item:last-child { padding-bottom:0; }
  .tl-dot {
    position:absolute; left:-21px; top:18px;
    width:13px; height:13px; border-radius:50%;
    background:#fff; border:3px solid var(--accent,#999);
    z-index:2;
    box-shadow:0 1px 4px rgba(0,0,0,.15);
    transition:transform .2s;
  }
  .tl-item:hover .tl-dot { transform:scale(1.2); }
  .tl-card {
    background:var(--card); border-radius:14px; padding:12px 13px;
    box-shadow:0 1px 3px rgba(0,0,0,.05);
    cursor:pointer; transition:transform .18s, box-shadow .18s;
  }
  .tl-card:active { transform:scale(.98); }
  .tl-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.07); transform:translateY(-1px); }
  .tl-card-head { display:flex; align-items:flex-start; gap:9px; margin-bottom:5px; }
  .tl-proj-dot {
    width:16px; height:16px; border-radius:5px; flex-shrink:0; margin-top:2px;
    box-shadow:0 1px 3px rgba(0,0,0,.15);
  }
  .tl-card-title { font-size:14.5px; font-weight:700; line-height:1.32; flex:1; letter-spacing:-0.02em; }
  .tl-card-desc {
    font-size:12px; color:var(--label2); line-height:1.4; margin-top:2px;
    display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden;
  }
  .tl-meta-row { display:flex; flex-wrap:wrap; gap:5px; align-items:center; margin-top:7px; }

  /* Deadline countdown bar */
  .dl-bar {
    margin-top:8px; padding:7px 10px;
    border-radius:10px;
    background:rgba(120,120,128,.06);
  }
  .dl-top {
    display:flex; align-items:center; gap:7px;
    font-size:11px; margin-bottom:4px;
  }
  .dl-pulse {
    width:8px; height:8px; border-radius:50%;
    flex-shrink:0;
  }
  .dl-pulse.live { animation:dlpulse 1.5s ease-in-out infinite; }
  @keyframes dlpulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:.6} }
  .dl-count { font-weight:800; flex:1; }
  .dl-date { color:var(--label3); font-size:10px; font-weight:600; }
  .dl-track { height:5px; background:rgba(120,120,128,.12); border-radius:5px; overflow:hidden; }
  .dl-fill { height:100%; border-radius:5px; transition:width .5s; }

  .tl-progress-mini { display:flex; align-items:center; gap:7px; margin-top:7px; }
  .tl-progress-bar { flex:1; height:5px; background:rgba(120,120,128,.14); border-radius:5px; overflow:hidden; }
  .tl-progress-fill { height:100%; border-radius:5px; transition:width .5s; }
  .tl-progress-txt { font-size:11px; font-weight:700; color:var(--label2); flex-shrink:0; }

  .tl-card-foot {
    display:flex; align-items:center; justify-content:space-between;
    margin-top:8px; padding-top:8px; border-top:.5px solid var(--sep);
    font-size:11px; color:var(--label2); font-weight:600;
  }
  .tl-card-foot-left { display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
  .tl-assignee { display:flex; align-items:center; gap:5px; }
  .tl-budget {
    font-size:11px; font-weight:700; color:var(--green);
    background:rgba(52,199,89,.12); padding:1px 8px; border-radius:8px;
  }

  .empty-state { text-align:center; padding:50px 30px; color:var(--label2); }
  .empty-state .em { font-size:54px; margin-bottom:8px; opacity:.7; }
  .empty-state .t { font-size:16px; font-weight:700; color:var(--label); margin-bottom:4px; }
  .empty-state .d { font-size:13px; font-weight:500; }
  .empty-state .ds { font-size:12px; font-weight:500; color:var(--label3); margin-top:8px; }

  .pill {
    font-size:11px; font-weight:600; padding:3px 9px; border-radius:var(--radius-sm);
    display:inline-flex; align-items:center; gap:3px;
  }

  /* ANALYTICS PAGE */
  .analytics { padding:16px; }
  .ana-cards {
    display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
    margin-bottom:16px;
  }
  @media (max-width: 480px) { .ana-cards { grid-template-columns:1fr 1fr; } .ana-cards .ac-full { grid-column:span 2; } }
  .ana-card {
    background:var(--card); border:1px solid var(--sep); border-radius:var(--radius);
    padding:14px;
  }
  .ana-card.budget { background:var(--accent); color:#fff; border-color:var(--accent); }
  .ana-card.spent { background:var(--card); color:var(--label); border:1px solid var(--sep); }
  .ana-card.remain { background:var(--card); color:var(--label); border:1px solid var(--sep); }
  .ac-icon { display:none; }
  .ac-label { font-size:11px; font-weight:600; opacity:.8; letter-spacing:.02em; }
  .ac-value { font-size:20px; font-weight:800; letter-spacing:-0.02em; margin-top:5px; line-height:1.1; }
  .ac-sub { font-size:11px; opacity:.8; font-weight:500; margin-top:3px; }
  .ana-section { background:var(--card); border:1px solid var(--sep); border-radius:var(--radius-lg); overflow:hidden; margin-bottom:14px; }
  .ana-section-head {
    padding:14px 16px;
    border-bottom:1px solid var(--sep);
    font-size:13px; font-weight:700; letter-spacing:-0.01em;
    display:flex; align-items:center; justify-content:space-between;
  }
  /* ═══ PERFORMANCE DASHBOARD ═══ */
  .perf-filter {
    display:flex; gap:6px; padding:12px; background:var(--card); border:1px solid var(--sep);
    border-radius:var(--radius-lg); margin-bottom:14px; overflow-x:auto; -webkit-overflow-scrolling:touch;
  }
  .perf-filter button {
    padding:8px 14px; font-size:12px; font-weight:700; white-space:nowrap;
    background:var(--card2); border:1px solid var(--sep); border-radius:99px;
    color:var(--label2); transition:all var(--t-fast) var(--ease);
  }
  .perf-filter button:hover { color:var(--label); border-color:var(--accent-line); }
  .perf-filter button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .perf-export-bar {
    display:flex; gap:8px; padding:10px 12px; background:var(--card2); border:1px dashed var(--sep);
    border-radius:var(--radius); margin-bottom:14px; align-items:center; flex-wrap:wrap;
  }
  .perf-export-bar .lbl { font-size:11px; font-weight:700; color:var(--label2); flex:1; min-width:120px; }
  .perf-export-bar button {
    padding:8px 14px; font-size:12px; font-weight:700; border-radius:var(--radius-sm);
    background:var(--card); border:1px solid var(--sep); color:var(--label);
    transition:all var(--t-fast) var(--ease); display:inline-flex; align-items:center; gap:6px;
  }
  .perf-export-bar button:hover { border-color:var(--warm); color:var(--warm-deep); background:var(--warm-soft); }
  .perf-export-bar button.primary { background:var(--warm); color:#fff; border-color:var(--warm); }
  .perf-export-bar button.primary:hover { background:var(--warm-deep); }
  .perf-cards { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:10px; margin-bottom:14px; }
  .perf-card {
    background:var(--card); border:1px solid var(--sep); border-radius:var(--radius);
    padding:14px 14px; transition:transform var(--t) var(--ease-out);
  }
  .perf-card:hover { transform:translateY(-2px); }
  .perf-card .pc-label { font-size:11px; font-weight:700; color:var(--label2); letter-spacing:.02em; }
  .perf-card .pc-value { font-size:22px; font-weight:800; letter-spacing:-0.02em; margin-top:4px; font-variant-numeric:tabular-nums; }
  .perf-card .pc-sub   { font-size:11px; color:var(--label3); font-weight:600; margin-top:4px; }
  .perf-card.accent .pc-value { color:var(--accent); }
  .perf-card.warm   .pc-value { color:var(--warm-deep); }
  .perf-card.warn   .pc-value { color:var(--warn); }
  .perf-card.crit   .pc-value { color:var(--crit); }
  /* Per-person performance row */
  .pp-row {
    padding:14px 16px; border-bottom:1px solid var(--sep2);
    display:grid; grid-template-columns:auto 1fr; gap:12px; align-items:start;
  }
  .pp-row:last-child { border-bottom:none; }
  .pp-row-main { min-width:0; }
  .pp-name-line { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .pp-name { font-size:14px; font-weight:800; letter-spacing:-0.01em; }
  .pp-name-sub { font-size:11px; color:var(--label3); font-weight:600; }
  .pp-stats {
    display:grid; grid-template-columns:repeat(auto-fit, minmax(90px, 1fr)); gap:8px;
  }
  .pp-stat {
    background:var(--card2); border-radius:var(--radius-sm); padding:8px 10px;
  }
  .pp-stat-lbl { font-size:10px; font-weight:700; color:var(--label3); letter-spacing:.03em; }
  .pp-stat-val { font-size:14px; font-weight:800; margin-top:2px; font-variant-numeric:tabular-nums; }
  .pp-stat-val.green { color:var(--ok); }
  .pp-stat-val.orange{ color:var(--warn); }
  .pp-stat-val.red   { color:var(--crit); }
  .pp-stat-val.muted { color:var(--label3); }
  .pp-bar-wrap { margin-top:10px; }
  .pp-bar-track { height:6px; background:var(--card2); border-radius:99px; overflow:hidden; display:flex; }
  .pp-bar-seg { height:100%; transition:width var(--t-slow) var(--ease-out); }
  .pp-bar-legend { display:flex; gap:12px; margin-top:6px; font-size:10px; font-weight:600; color:var(--label2); flex-wrap:wrap; }
  .pp-bar-legend span { display:inline-flex; align-items:center; gap:4px; }
  .pp-bar-legend i { width:8px; height:8px; border-radius:2px; display:inline-block; }
  /* Hours-per-task chart bars */
  .hpt-row {
    padding:10px 16px; border-bottom:1px solid var(--sep2);
    display:grid; grid-template-columns:130px 1fr 90px; gap:10px; align-items:center;
  }

  .lb-level { font-size:12px; color:var(--label2); font-weight:500; margin-top:2px; }
  .lb-coins {
    background:var(--accent); color:#fff; padding:5px 11px; border-radius:var(--radius-sm);
    font-size:13px; font-weight:700; font-variant-numeric:tabular-nums;
  }

  .ach-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
  .ach-card {
    background:var(--card); border:1px solid var(--sep); border-radius:14px;
    padding:14px 12px; text-align:center; position:relative; overflow:hidden;
    transition:transform var(--t) var(--ease-out), border-color var(--t) var(--ease);
  }
  .ach-card.unlocked { border-color:var(--warm-line); background:var(--warm-soft); }
  .ach-card.unlocked:hover { transform:translateY(-2px); }
  .ach-card.locked { opacity:.5; }

  /* File attachments */
  .file-row {
    display:flex; align-items:center; gap:10px;
    padding:12px 14px; border-bottom:1px solid var(--sep2);
  }
  .file-row:last-child { border-bottom:none; }
  .file-icon {
    width:38px; height:38px; border-radius:var(--radius-sm);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0; background:var(--card2); border:1px solid var(--sep);
    color:var(--label2); font-size:13px; font-weight:700;
  }
  .file-icon.pdf,.file-icon.xlsx,.file-icon.img,.file-icon.other { background:var(--card2); color:var(--label2); }
  .file-info { flex:1; min-width:0; }
  .file-name {
    font-size:14px; font-weight:600; letter-spacing:-0.01em;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .file-meta { font-size:11px; color:var(--label2); font-weight:500; margin-top:2px; }
  .file-actions { display:flex; gap:5px; flex-shrink:0; }
  .file-btn {
    width:32px; height:32px; border-radius:var(--radius-sm);
    display:flex; align-items:center; justify-content:center;
    background:var(--card2); border:1px solid var(--sep);
    transition:border-color .12s;
  }
  .file-btn.dl { color:var(--label2); }
  .file-btn.del { color:var(--crit); }
  .file-btn:hover { border-color:var(--accent-line); }
  .file-upload-zone {
    border:1px dashed var(--accent-line); border-radius:var(--radius);
    padding:18px; text-align:center; cursor:pointer;
    transition:border-color .15s; margin:8px;
  }
  .file-upload-zone:hover { border-color:var(--accent); }
  .file-upload-zone .fu-icon { color:var(--label3); display:flex; justify-content:center; }
  .file-upload-zone .fu-text { font-size:13px; font-weight:600; margin-top:8px; }
  .file-upload-zone .fu-hint { font-size:11px; color:var(--label2); margin-top:2px; }

  .cmp-empty { text-align:center; padding:28px 14px; color:var(--label3); font-size:13px; }

  .lvl-row {
    display:flex; gap:13px; padding:14px 16px;
    border-bottom:1px solid var(--sep2); opacity:.5;
  }
  .lvl-row:last-child { border-bottom:none; }
  .lvl-row.reached { opacity:1; }
  .lvl-row.current { background:var(--accent-soft); opacity:1; }
  .lvl-badge {
    width:40px; height:40px; border-radius:var(--radius); flex-shrink:0;
    background:var(--card2); border:1px solid var(--sep); color:var(--label2);
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:800;
  }
  .lvl-row.reached .lvl-badge { background:var(--accent); border-color:var(--accent); color:#fff; }
  .lvl-info { flex:1; min-width:0; }
  .lvl-title { font-size:14px; font-weight:700; letter-spacing:-0.01em; }
  .lvl-now {
    font-size:10px; font-weight:700; color:#fff;
    background:var(--accent); padding:2px 8px; border-radius:4px; margin-left:6px;
  }
  .lvl-done { font-size:11px; font-weight:700; color:var(--ok); margin-left:6px; }
  .lvl-need { font-size:11px; color:var(--label2); font-weight:500; margin-top:3px; }
  .lvl-reward-sys { font-size:12px; color:var(--label2); font-weight:500; margin-top:5px; }
  .lvl-reward-real {
    font-size:12px; font-weight:600; color:var(--label);
    background:var(--card2); border:1px solid var(--sep); padding:4px 9px;
    border-radius:var(--radius-sm); margin-top:6px; display:inline-block;
  }

  /* Daily quota indicator */
  .quota-pill {
    display:inline-flex; align-items:center; gap:5px;
    font-size:11px; font-weight:700;
    padding:3px 9px; border-radius:10px;
    background:rgba(120,120,128,.12); color:var(--label2);
  }
  .quota-pill.full { background:rgba(255,149,0,.15); color:#EA580C; }

  /* ═══ DASHBOARD ═══ */
  .dash { padding:16px; }
  .dash-layout { display:grid; grid-template-columns:1fr; gap:16px; }
  @media (min-width:1000px){
    .dash-layout { grid-template-columns:minmax(0,1fr) 340px; align-items:start; }
    .dash-side { position:sticky; top:68px; }
  }
  .dash-main { min-width:0; }
  .dash-side { min-width:0; }
  .dcal-box { animation:riseIn var(--t-slow) var(--ease-out) both; }
  .meet-row {
    display:flex; align-items:center; gap:12px;
    padding:11px 16px; cursor:pointer;
    border-bottom:1px solid var(--sep2);
    transition:background var(--t) var(--ease), padding-left var(--t) var(--ease);
  }
  .meet-row:last-child { border-bottom:none; }
  .meet-row:hover { background:var(--warm-soft); padding-left:20px; }
  .meet-date {
    width:42px; height:46px; flex-shrink:0;
    border:1.5px solid var(--sep); border-radius:var(--radius);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:var(--card2);
  }
  .meet-d { font-size:16px; font-weight:800; line-height:1; }
  .meet-m { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; margin-top:2px; }
  .meet-go { color:var(--label3); display:flex; flex-shrink:0;
    transition:transform var(--t) var(--spring); }
  .meet-row:hover .meet-go { transform:translateX(3px); color:var(--warm); }
  .dash-hero {
    display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
    margin-bottom:14px;
  }
  @media (min-width:700px){ .dash-hero { grid-template-columns:repeat(3,1fr); } }
  @media (min-width:900px){ .dash-hero { grid-template-columns:repeat(4,1fr); } }
  @media (min-width:1280px){ .dash-hero { grid-template-columns:repeat(7,1fr); } }
  .dh-card {
    background:var(--card); border:1px solid var(--sep);
    border-radius:16px; padding:15px 13px;
    cursor:pointer; position:relative;
    transition:transform var(--t) var(--ease-out), border-color var(--t) var(--ease), box-shadow var(--t) var(--ease-out);
    animation:riseIn var(--t-slow) var(--ease-out) both;
  }
  .dh-card:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(28,25,23,.08); }
  .dh-card:active { transform:translateY(-1px) scale(.98); }
  .dh-ic { display:none; }
  .dh-val { font-size:25px; font-weight:800; letter-spacing:-0.03em; line-height:1; font-variant-numeric:tabular-nums; }
  .dh-lbl { font-size:11px; color:var(--label2); font-weight:600; margin-top:6px; }
  /* tinted backgrounds within palette — each stat has its own gentle tone */
  .dh-total { background:var(--accent-soft); border-color:var(--accent-line); }
  .dh-total .dh-val { color:var(--accent); }
  .dh-done { background:var(--warm-soft); border-color:var(--warm-line); }
  .dh-done .dh-val { color:var(--warm-deep); }
  .dh-doing { background:rgba(37,99,235,.07); border-color:rgba(37,99,235,.22); }
  .dh-doing .dh-val { color:#1D4ED8; }
  .dh-todo { background:var(--card2); }
  .dh-todo .dh-val { color:var(--label); }
  .dh-soon { background:rgba(217,119,6,.08); border-color:rgba(217,119,6,.22); }
  .dh-soon .dh-val { color:var(--warn); }
  .dh-over { background:rgba(220,38,38,.07); border-color:rgba(220,38,38,.2); }
  .dh-over .dh-val { color:var(--crit); }
  .dh-over[data-alive] { border-color:var(--crit); }
  .dh-over[data-alive]::before {
    content:""; position:absolute; top:11px; right:11px;
    width:7px; height:7px; border-radius:50%; background:var(--crit);
    animation:pulseWarm 2.4s var(--ease) infinite;
  }
  /* Completed early — teal/mint tone (distinct positive achievement) */
  .dh-early { background:rgba(15,148,108,.08); border-color:rgba(15,148,108,.22); }
  .dh-early .dh-val { color:#0F946C; }
  .dash-grid { display:grid; grid-template-columns:1fr; gap:14px; }
  @media (min-width:1280px){ .dash-grid { grid-template-columns:1fr 1fr; } }
  .dash-box {
    background:var(--card); border:1px solid var(--sep);
    border-radius:18px; overflow:hidden;
    animation:riseIn var(--t-slow) var(--ease-out) both;
  }
  .dash-box-head {
    padding:14px 16px; font-size:13px; font-weight:700;
    letter-spacing:-0.01em; border-bottom:1px solid var(--sep);
    color:var(--label); text-transform:none;
    display:flex; align-items:center; gap:8px;
  }
  .dash-box-body { padding:14px 16px; }
  .dash-lead {
    display:flex; align-items:center; gap:11px;
    padding:10px 16px; border-bottom:1px solid var(--sep2);
    transition:background var(--t) var(--ease);
  }
  .dash-lead:last-child { border-bottom:none; }
  .dash-lead.me { background:var(--warm-soft); }
  .dl-rank { width:24px; text-align:center; font-size:13px; font-weight:800; color:var(--label2); flex-shrink:0; }
  .dl-rank.top { color:var(--warm); }
  .dl-coins {
    background:var(--accent); color:#fff;
    padding:4px 10px; border-radius:5px; font-size:12px; font-weight:700;
    flex-shrink:0; font-variant-numeric:tabular-nums;
  }
  .dash-lead.me .dl-coins { background:var(--warm); }
  .dash-person { padding:11px 16px; border-bottom:1px solid var(--sep2); }
  .dash-person:last-child { border-bottom:none; }
  .dash-person-bar {
    display:flex; height:6px; border-radius:99px; overflow:hidden;
    background:var(--card2);
  }
  .dash-person-bar > div { height:100%; transition:width .9s var(--ease-out); }
  .dash-due {
    display:flex; align-items:center; gap:10px;
    padding:11px 16px; border-bottom:1px solid var(--sep2);
    cursor:pointer; transition:background var(--t) var(--ease), padding-left var(--t) var(--ease);
  }
  .dash-due:last-child { border-bottom:none; }
  .dash-due:hover { background:var(--card2); padding-left:20px; }

  /* ═══ MY JOBS CARD ═══ */
  .myjobs-box {
    background:var(--warm-soft); border:1px solid var(--warm-line);
    border-left:4px solid var(--warm);
    border-radius:var(--radius-lg); padding:18px; margin:14px 0;
    animation:riseIn var(--t-slow) var(--ease-out) both;
  }
  .myjobs-head { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; }
  .myjobs-title { font-size:15px; font-weight:800; letter-spacing:-0.02em; }
  .myjobs-sub { font-size:11px; color:var(--label2); font-weight:500; margin-top:3px; }
  .myjobs-all {
    flex-shrink:0; font-size:12px; font-weight:700;
    color:var(--warm-deep); background:var(--card);
    border:1px solid var(--warm-line);
    padding:7px 12px; border-radius:99px;
    transition:border-color .12s, transform var(--t-fast) var(--spring);
  }
  .myjobs-all:hover { border-color:var(--warm); transform:translateY(-1px); }
  .myjobs-stats {
    display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
    margin:14px 0;
  }
  .mj-stat {
    background:var(--card); border:1px solid var(--warm-line);
    border-radius:12px; padding:11px 6px;
    text-align:center;
  }
  .mj-n { display:block; font-size:19px; font-weight:800; letter-spacing:-0.03em; }
  .mj-l { display:block; font-size:10px; color:var(--label2); font-weight:600; margin-top:2px; }
  .myjobs-list {
    background:var(--card); border:1px solid var(--warm-line);
    border-radius:14px; overflow:hidden;
  }
  .myjobs-list .dash-due:last-child { border-bottom:none; }

  /* ═══ DASHBOARD CALENDAR ═══ */
  .cal-nav {
    width:28px; height:28px; border-radius:var(--radius-sm);
    background:var(--card2); border:1px solid var(--sep); color:var(--label);
    font-size:15px; font-weight:700; transition:border-color .12s;
  }
  .cal-nav:hover { border-color:var(--accent-line); }
  .dcal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .dcal-dow {
    text-align:center; font-size:10.5px; font-weight:700;
    color:var(--label2); padding:4px 0; text-transform:uppercase; letter-spacing:.03em;
  }
  .dcal-cell {
    aspect-ratio:1; border-radius:var(--radius-sm);
    background:var(--card2); border:1px solid transparent;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; transition:border-color .12s, background .12s; cursor:pointer;
  }
  .dcal-cell.empty { background:transparent; cursor:default; pointer-events:none; }
  .dcal-cell:not(.empty):hover { border-color:var(--accent-line); }
  .dcal-cell.has-jobs { background:var(--accent-soft); }
  /* v59b: weekends + company holidays get a faint red wash */
  .dcal-cell.dcal-off { background:rgba(220,38,38,.08); }
  .dcal-cell.dcal-off .dcal-num { color:#DC2626; }
  .dcal-cell.dcal-off.has-jobs { background:rgba(220,38,38,.13); }
  .dcal-holiday-dot { position:absolute; top:3px; right:4px; width:5px; height:5px; border-radius:50%; background:#DC2626; }
  .dcal-cell.today { border-color:var(--accent); }
  .dcal-cell.sel { background:var(--accent); border-color:var(--accent); }
  .dcal-cell.sel .dcal-num, .dcal-cell.sel .dcal-cnt { color:#fff; }
  .dcal-num { font-size:13px; font-weight:600; color:var(--label); }
  .dcal-dot {
    width:5px; height:5px; border-radius:50%;
    position:absolute; top:5px; right:5px;
  }
  .dcal-cnt { font-size:10px; font-weight:700; color:var(--label2); margin-top:1px; }
  .dcal-legend {
    display:flex; gap:14px; justify-content:center;
    margin-top:14px; font-size:11px; color:var(--label2); font-weight:500;
    flex-wrap:wrap;
  }
  .dcal-legend span { display:flex; align-items:center; gap:5px; }
  .dcal-legend i { width:8px; height:8px; border-radius:2px; display:inline-block; }
  .dcal-day-detail { margin-top:14px; border-top:1px solid var(--sep); padding-top:10px; }
  .dcal-dd-head { font-size:13px; font-weight:700; padding:4px 4px 10px; }

  /* ═══ HISTORY LOG ═══ */
  .hist { padding:14px 16px 30px; }
  .hist-empty { text-align:center; padding:50px 20px; }
  .hist-day { margin-bottom:18px; }
  .hist-day-label {
    font-size:12px; font-weight:800; color:var(--label2);
    padding:6px 4px; position:sticky; top:0;
    background:var(--bg); z-index:2;
  }
  .hist-item {
    display:flex; align-items:flex-start; gap:11px;
    background:var(--card); border:1px solid var(--sep); border-radius:var(--radius);
    padding:12px 14px; margin-bottom:7px;
    transition:border-color var(--t) var(--ease), transform var(--t) var(--ease-out);
  }
  .hist-item:hover { border-color:var(--accent-line); transform:translateX(3px); }
  .hist-ic {
    width:32px; height:32px; border-radius:var(--radius-sm);
    background:var(--card2); border:1px solid var(--sep);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .hist-body { flex:1; min-width:0; }
  .hist-line { font-size:14px; font-weight:500; line-height:1.4; }
  .hist-line b { font-weight:700; }
  .hist-target { color:var(--label2); font-weight:600; }
  .hist-detail {
    font-size:12px; color:var(--label2); margin-top:3px;
    background:rgba(120,120,128,.08); padding:5px 9px;
    border-radius:7px; display:inline-block; line-height:1.4;
  }
  .hist-time { font-size:11px; color:var(--label3); font-weight:700; flex-shrink:0; white-space:nowrap; }

  /* ═══ PROJECTS SPREADSHEET TABLE ═══ */
  .pj-filterbar {
    padding:8px 16px 0; display:flex; flex-direction:row; gap:10px;
    align-items:flex-start; flex-wrap:wrap;
  }
  .pj-chips {
    display:flex; gap:7px; flex-wrap:wrap;
    overflow-x:auto; -webkit-overflow-scrolling:touch;
    padding-bottom:2px;
  }
  /* v17: combined chips row with separator */
  .pj-chips-combined { flex:1; align-items:center; }
  .pj-chip-sep {
    display:inline-block; width:1px; height:18px; background:var(--sep);
    margin:0 4px; align-self:center;
  }
  .pj-chips::-webkit-scrollbar { height:0; }
  .pj-chip {
    flex-shrink:0; padding:7px 13px; border-radius:var(--radius-sm);
    font-size:12.5px; font-weight:600;
    background:var(--card); color:var(--label2);
    border:1px solid var(--sep);
    transition:border-color .12s, color .12s; white-space:nowrap;
  }
  .pj-chip.sm { padding:6px 11px; font-size:12px; }

  /* v33: Manual-progress slider in the program editor.
     Native <input type="range"> styled with a fat track + colored thumb that's easy
     to grab on touch. Drag → percentage updates live. */
  .prog-slider {
    -webkit-appearance:none; appearance:none;
    height:8px; border-radius:99px; outline:none;
    background:linear-gradient(90deg, #21409a 0%, #4F46E5 50%, #16A34A 100%);
    cursor:pointer;
    transition:opacity var(--t) var(--ease);
  }
  .prog-slider::-webkit-slider-thumb {
    -webkit-appearance:none; appearance:none;
    width:24px; height:24px; border-radius:50%;
    background:#FFFFFF; border:3px solid #21409a;
    cursor:grab;
    box-shadow:0 4px 12px rgba(33,64,154,.35), 0 1px 3px rgba(0,0,0,.18);
    transition:transform var(--t-fast) var(--spring);
  }
  .prog-slider::-webkit-slider-thumb:hover { transform:scale(1.15); }
  .prog-slider::-webkit-slider-thumb:active { cursor:grabbing; transform:scale(1.1); }
  .prog-slider::-moz-range-thumb {
    width:24px; height:24px; border-radius:50%;
    background:#FFFFFF; border:3px solid #21409a;
    cursor:grab;
    box-shadow:0 4px 12px rgba(33,64,154,.35), 0 1px 3px rgba(0,0,0,.18);
  }
  .pj-chip:hover { border-color:var(--accent-line); color:var(--label); }
  .pj-chip.on {
    background:var(--accent); color:#fff; border-color:var(--accent);
  }
  /* v17: view-mode toggle (Table / Card) */
  .pj-viewtoggle {
    display:inline-flex; gap:0; border:1px solid var(--sep);
    border-radius:var(--radius-sm); padding:2px; background:var(--card2);
    flex-shrink:0;
  }
  .pj-vt-btn {
    display:inline-flex; align-items:center; gap:5px;
    padding:5px 10px; font-size:12.5px; font-weight:600;
    color:var(--label2); border-radius:8px;
    transition:background .15s, color .15s;
    background:transparent; border:none;
  }
  .pj-vt-btn:hover { color:var(--label); }
  .pj-vt-btn.on {
    background:var(--card); color:var(--label);
    box-shadow:0 1px 3px rgba(0,0,0,.06);
  }
  .pj-vt-btn svg { stroke:currentColor; }
  @media (max-width:560px){
    .pj-vt-btn span { display:none; }
    .pj-vt-btn { padding:6px 8px; }
  }
  .pj-board { padding:14px 16px 30px; }

  /* ═══ v17: TABLE VIEW (Excel-like) ═══ */
  .pj-table-wrap {
    background:var(--card); border:1px solid var(--sep);
    border-radius:var(--radius-lg);
    box-shadow:0 1px 3px rgba(28,25,23,.04);
  }
  .pj-table {
    width:100%; border-collapse:collapse; table-layout:auto;
    font-size:13px;
  }
  .pj-table thead { background:var(--card2); }
  .pj-th {
    text-align:left; padding:10px 10px; font-weight:700; color:var(--label2);
    font-size:11.5px; letter-spacing:.3px; text-transform:uppercase;
    border-bottom:1px solid var(--sep); white-space:nowrap;
    position:sticky; top:56px; background:var(--card2); z-index:20;
  }
  .pj-th-num { width:36px; text-align:center; }
  .pj-th-title { min-width:200px; }
  .pj-th-act { width:70px; }
  .pj-td {
    padding:8px 10px; border-bottom:1px solid var(--sep);
    vertical-align:middle;
  }
  .pj-tr { transition:background .12s; }
  .pj-tr:hover { background:var(--card2); }
  .pj-tr.s-done { background:rgba(14,124,102,.025); }
  .pj-tr.s-done:hover { background:rgba(14,124,102,.06); }
  .pj-tr.s-doing { background:rgba(37,99,235,.025); }
  .pj-tr.s-doing:hover { background:rgba(37,99,235,.06); }
  .pj-tr.s-overdue { background:rgba(220,38,38,.035); }
  .pj-tr.s-overdue:hover { background:rgba(220,38,38,.07); }
  .pj-tr.s-soon { background:rgba(217,119,6,.03); }
  /* v61: newly-added row/card flashes a blue glow so the user sees it appear */
  @keyframes pjJustAdded {
    0%   { background:rgba(33,64,154,.18); box-shadow:inset 0 0 0 2px var(--blue,#21409a); }
    100% { background:transparent; box-shadow:none; }
  }
  .pj-just-added { animation:pjJustAdded 2.2s ease-out; }
  .pj-tr.is-cancelled { opacity:.55; }
  .pj-tr.is-cancelled .pj-tt-input { text-decoration:line-through; color:var(--label3); }

  .pj-td-num {
    text-align:center; font-size:11.5px; font-weight:700; color:var(--label3);
    font-variant-numeric:tabular-nums; width:36px;
  }
  .pj-tt-wrap { display:flex; flex-direction:column; gap:1px; min-width:0; }
  .pj-tt-input {
    width:100%; border:1px solid transparent; background:none; outline:none;
    font-family:var(--font); font-size:14px; font-weight:700; color:var(--label);
    padding:3px 6px; border-radius:6px; min-width:0;
  }
  .pj-tt-input:hover { border-color:var(--sep); }
  .pj-tt-input:focus { background:var(--card); border-color:var(--accent-line); box-shadow:0 0 0 3px var(--accent-soft); }
  .pj-tt-input.pj-locked { background:transparent; cursor:not-allowed; }
  .pj-tt-sub {
    font-size:11px; color:var(--label3); padding:0 6px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    max-width:340px;
  }
  .pj-tassign-wrap { display:inline-flex; align-items:center; gap:4px; }
  .pj-tassign-btn {
    display:inline-flex; align-items:center; gap:6px; min-width:0;
    padding:4px 10px 4px 4px; border-radius:999px;
    background:var(--card2); border:1px solid var(--sep); color:var(--label);
    font-size:12.5px; font-weight:600; max-width:160px;
    transition:border-color .12s, background .12s;
  }
  .pj-tassign-btn:hover { border-color:var(--accent-line); background:var(--card); }
  .pj-tassign-btn::after {
    content:""; width:5px; height:5px; border-right:1.5px solid currentColor;
    border-bottom:1.5px solid currentColor; transform:rotate(45deg) translateY(-1px);
    opacity:.5; margin-left:auto;
  }
  .pj-tassign-ava {
    width:22px; height:22px; border-radius:50%; color:#fff;
    font-size:11px; font-weight:800; display:inline-flex;
    align-items:center; justify-content:center; flex-shrink:0;
    box-shadow:0 0 0 1.5px rgba(255,255,255,.7);
  }
  .pj-tassign-name {
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    max-width:90px;
  }
  .pj-tassign-collab {
    font-size:10.5px; font-weight:800; color:var(--accent);
    background:var(--accent-soft,rgba(33,64,154,.10));
    padding:1px 6px; border-radius:8px; margin-left:2px;
  }
  .pj-tassign-plus {
    width:22px; height:22px; border-radius:50%;
    background:var(--card2); border:1.5px dashed var(--sep);
    color:var(--accent); display:inline-flex;
    align-items:center; justify-content:center;
    transition:border-color .12s, background .12s, transform .12s;
  }
  .pj-tassign-plus:hover { border-color:var(--accent); background:var(--accent-soft,rgba(33,64,154,.10)); transform:scale(1.08); }
  /* v18: collab avatars stack in table (read-only, hover for tooltip) */
  .pj-tcollab-stack {
    display:inline-flex; align-items:center;
    padding-left:6px; margin-left:2px;
    border-left:1px dashed var(--sep);
  }
  .pj-tcollab-ava {
    width:22px; height:22px; border-radius:50%; color:#fff;
    font-size:10.5px; font-weight:800; display:inline-flex;
    align-items:center; justify-content:center; flex-shrink:0;
    border:2px solid var(--card); margin-left:-7px;
    cursor:default;
  }
  .pj-tcollab-ava:first-child { margin-left:0; }
  .pj-tcollab-more {
    background:var(--label3) !important; font-size:9.5px;
  }
  /* Hide dropdown arrow when assignee is locked (visual "read-only" hint) */
  .pj-dd-btn[disabled]::after,
  .pj-tassign-btn[disabled]::after { display:none; }
  .pj-tassign-btn[disabled] { padding-right:8px; }
  .pj-tdd {
    display:inline-flex; align-items:center; gap:5px;
    padding:4px 10px; border-radius:999px;
    font-size:12.5px; font-weight:700; white-space:nowrap;
    border:1px solid; transition:transform .1s;
  }
  .pj-tdd:hover { transform:translateY(-1px); }
  .pj-tdd-locked {
    opacity:.7; cursor:not-allowed; display:inline-flex; align-items:center; gap:4px;
  }
  .pj-tdd .pj-dd-dot { width:6px; height:6px; border-radius:50%; }
  .pj-tdate-btn { display:inline-block; cursor:pointer; }
  .pj-tdate-pill {
    display:inline-flex; align-items:center; gap:4px;
    padding:4px 10px; border-radius:999px;
    font-size:11.5px; font-weight:700; white-space:nowrap;
    font-variant-numeric:tabular-nums;
    border:1px solid transparent;
    transition:border-color .12s;
  }
  .pj-tdate-btn:hover .pj-tdate-pill { border-color:var(--accent-line); }
  .pj-twarn {
    display:inline-flex; align-items:center;
    padding:4px 10px; border-radius:999px;
    font-size:11.5px; font-weight:700; white-space:nowrap;
  }
  .pj-td-act { white-space:nowrap; text-align:right; }
  .pj-tact-btn {
    width:28px; height:28px; border-radius:7px;
    background:var(--card2); border:1px solid var(--sep);
    color:var(--label2); display:inline-flex; align-items:center; justify-content:center;
    margin-left:3px;
    transition:background .12s, color .12s, border-color .12s;
  }
  .pj-tact-btn:hover { background:var(--card); color:var(--label); border-color:var(--accent-line); }
  .pj-tact-btn.pj-open-btn.open { background:var(--accent); color:#fff; border-color:var(--accent); }
  .pj-tact-lock {
    display:inline-flex; align-items:center; justify-content:center;
    width:28px; height:28px; color:var(--label3); margin-left:3px;
  }
  /* Quick-add row at the top */
  .pj-tr-quickadd td {
    padding:8px 12px; background:linear-gradient(180deg, var(--warm-soft,rgba(33,64,154,.08)) 0%, var(--card) 80%);
    border-bottom:1px solid var(--warm-line,rgba(33,64,154,.3));
  }
  .pj-quickadd-wrap {
    display:flex; align-items:center; gap:10px;
  }
  .pj-quickadd-icon {
    display:inline-flex; align-items:center; justify-content:center;
    width:26px; height:26px; border-radius:7px;
    background:var(--accent); color:#fff;
  }
  .pj-quickadd-input {
    flex:1; border:none; background:transparent; outline:none;
    font-family:var(--font); font-size:14px; font-weight:600; color:var(--label);
    padding:5px 4px; min-width:0;
  }
  .pj-quickadd-input::placeholder { color:var(--label3); font-weight:500; }
  .pj-quickadd-hint {
    font-size:10.5px; font-weight:700; color:var(--accent);
    background:var(--card); padding:3px 8px; border-radius:6px;
    border:1px solid var(--accent-line,rgba(33,64,154,.30));
    font-variant-numeric:tabular-nums; flex-shrink:0;
  }
  /* v19: always allow horizontal scroll when table content overflows */
  .pj-table-wrap {
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
  }
  .pj-table { min-width:1000px; }
  @media (max-width:540px){
    .pj-table { min-width:860px; }
  }

  /* v17: prominent "+ เพิ่มงานใหม่" button */
  .pj-addrow-prominent {
    background:var(--accent) !important;
    border:1px solid var(--accent) !important;
    color:#fff !important; font-weight:700 !important;
    box-shadow:0 4px 12px rgba(33,64,154,.25);
  }
  .pj-addrow-prominent:hover {
    background:#1a3580 !important;
    border-color:#1a3580 !important;
    color:#fff !important;
    transform:translateY(-1px);
    box-shadow:0 6px 16px rgba(33,64,154,.32);
  }
  .pj-addrow-prominent svg { stroke:#fff; }

  /* ─── Inline expand detail panel (inside card) ─── */
  .pj-detail-row {
    max-height:0; opacity:0; overflow:hidden;
    transition:max-height .3s var(--ease-out), opacity .3s var(--ease);
    margin:0 -16px -14px; margin-top:13px;
    border-top:1px solid var(--sep);
    background:var(--card2);
    border-radius:0 0 12px 12px;
  }
  .pj-detail-inner { padding:16px 18px 20px; }
  .pj-detail-inner .sheet-head h2 { font-size:17px !important; }
  .pj-detail-inner .grabber { display:none; }
  .pj-open-btn.open {
    background:var(--warm); transform:rotate(180deg);
  }
  .pj-saveinfo {
    background:var(--accent-soft); color:var(--label2);
    font-size:12px; font-weight:500; line-height:1.5;
    padding:10px 14px; border-radius:var(--radius); margin-bottom:12px;
    display:flex; align-items:center; gap:8px;
    border:1px solid var(--sep);
  }
  /* ─── Project card list (compact, status-tinted) ─── */
  .pj-cardlist { display:flex; flex-direction:column; gap:14px; }
  .pj-card {
    background:var(--card); border:1px solid var(--sep);
    border-left:5px solid var(--accent);  /* stronger left accent for clearer visual separation */
    border-radius:14px; padding:13px 14px 12px;
    transition:border-color var(--t) var(--ease), box-shadow var(--t) var(--ease-out), transform var(--t) var(--ease-out), background var(--t) var(--ease);
    animation:riseIn var(--t-slow) var(--ease-out) both;
    position:relative;
  }
  .pj-card:hover { box-shadow:0 8px 24px rgba(28,25,23,.08); transform:translateY(-2px); }
  /* Status-tinted backgrounds — subtle so info pops without clutter */
  .pj-card.s-todo   { background:linear-gradient(180deg, rgba(120,120,128,.025) 0%, var(--card) 60%); }
  .pj-card.s-doing  { background:linear-gradient(180deg, rgba(37,99,235,.045) 0%, var(--card) 60%); }
  .pj-card.s-done   { background:linear-gradient(180deg, rgba(14,124,102,.045) 0%, var(--card) 60%); }
  .pj-card.s-overdue { background:linear-gradient(180deg, rgba(220,38,38,.055) 0%, var(--card) 60%); border-left-color:var(--crit); }
  .pj-card.s-soon   { background:linear-gradient(180deg, rgba(217,119,6,.045) 0%, var(--card) 60%); }
  .pj-card-cancelled { opacity:.55; }
  .pj-card-cancelled .pj-title-input,
  .pj-card-cancelled .pj-desc-input { text-decoration:line-through; color:var(--label3); }

  /* ─── v31: PROGRAMS PAGE ─── big-project tracking cards. */
  .prog-page-wrap { padding:0 4px 100px; max-width:1100px; }
  .prog-list {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));
    gap:14px;
  }
  @media (max-width:600px){
    .prog-list { grid-template-columns:1fr; gap:12px; }
  }
  .prog-card {
    background:var(--card);
    border:1px solid var(--sep);
    border-left:5px solid #21409a;
    border-radius:14px;
    padding:16px 16px 14px;
    cursor:pointer;
    transition:box-shadow var(--t) var(--ease-out), transform var(--t) var(--ease-out), border-color var(--t) var(--ease);
    display:flex; flex-direction:column; gap:12px;
    animation:riseIn var(--t-slow) var(--ease-out) both;
  }
  .prog-card:hover {
    box-shadow:0 10px 28px rgba(28,25,23,.10);
    transform:translateY(-2px);
  }
  .prog-card:active { transform:translateY(0); }
  .prog-card-top { display:flex; flex-direction:column; gap:6px; }
  .prog-card-title-row {
    display:flex; align-items:flex-start; gap:10px;
    justify-content:space-between;
  }
  .prog-card-name {
    font-size:15.5px; font-weight:700;
    color:var(--label); letter-spacing:-0.01em;
    line-height:1.35; flex:1; min-width:0;
    word-break:break-word;
  }
  .prog-card-desc {
    font-size:12.5px; color:var(--label2);
    line-height:1.5; font-weight:500;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .prog-badge {
    flex-shrink:0;
    font-size:10.5px; font-weight:700;
    padding:4px 9px; border-radius:99px;
    white-space:nowrap; letter-spacing:.01em;
  }
  .prog-card-mid { padding:2px 0; }
  .prog-card-progress { display:flex; flex-direction:column; gap:6px; }
  .prog-progress-head {
    display:flex; justify-content:space-between; align-items:baseline;
    font-size:11.5px; font-weight:600;
  }
  .prog-progress-lbl { color:var(--label2); }
  .prog-progress-val { color:var(--label); font-weight:700; }
  .prog-progress-bar {
    width:100%; height:6px; background:var(--sep2);
    border-radius:99px; overflow:hidden;
  }
  .prog-progress-bar > div {
    height:100%; border-radius:99px;
    transition:width .8s var(--ease-out);
  }
  .prog-card-stats {
    display:flex; flex-wrap:wrap; gap:6px;
  }
  .prog-stat-pill {
    font-size:11px; font-weight:700;
    padding:4px 9px; border-radius:7px;
    letter-spacing:.01em;
  }
  .prog-card-foot {
    display:flex; justify-content:space-between; align-items:center;
    gap:10px;
    padding-top:10px;
    border-top:1px solid var(--sep2);
    font-size:11.5px;
  }
  .prog-foot-due {
    display:flex; align-items:center; gap:5px;
    font-weight:600;
  }
  .prog-foot-owner {
    display:flex; align-items:center; gap:7px;
    color:var(--label2); font-weight:600;
  }

  /* ═══ v32: TIMELINE + KANBAN view for Programs page ═══ */

  /* Empty state */
  .prog-empty {
    text-align:center; padding:64px 20px;
    color:var(--label3);
  }
  .prog-empty-icon { opacity:.5; margin-bottom:12px; }
  .prog-empty-title { font-size:15px; font-weight:700; color:var(--label2); margin-bottom:6px; }
  .prog-empty-sub { font-size:12.5px; }

  /* Section heads */
  .tl-section, .kb-section { margin-bottom:32px; }
  .tl-section-head {
    display:flex; align-items:baseline; gap:12px;
    padding:0 4px; margin-bottom:12px;
  }
  .tl-section-head h3 {
    font-size:16px; font-weight:800; letter-spacing:-0.01em;
    color:var(--label); margin:0;
  }
  .tl-section-sub {
    font-size:12px; color:var(--label3); font-weight:500;
  }

  /* Timeline rows — horizontal progress bars, monday.com-style */
  .tl-rows {
    display:flex; flex-direction:column; gap:10px;
  }
  .tl-row {
    background:var(--card); border:1px solid var(--sep);
    border-radius:14px; padding:14px 18px;
    cursor:pointer;
    transition:box-shadow var(--t) var(--ease), transform var(--t) var(--ease-out), border-color var(--t) var(--ease);
    display:flex; flex-direction:column; gap:10px;
  }
  .tl-row:hover {
    box-shadow:0 8px 24px rgba(28,25,23,.08);
    transform:translateY(-1px);
    border-color:rgba(33,64,154,.20);
  }
  .tl-row-head {
    display:flex; align-items:center; gap:12px;
  }
  .tl-row-emoji {
    width:36px; height:36px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; font-weight:700;
    flex-shrink:0;
  }
  .tl-row-info { flex:1; min-width:0; }
  .tl-row-name {
    font-size:15px; font-weight:700; color:var(--label);
    letter-spacing:-0.01em;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .tl-row-desc {
    font-size:12px; color:var(--label2); font-weight:500;
    margin-top:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  /* Avatar stack — overlapping circles */
  .prog-ava-stack { display:flex; flex-direction:row-reverse; padding-left:6px; }
  .prog-ava {
    width:28px; height:28px; border-radius:50%;
    border:2px solid var(--card);
    margin-left:-8px;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    color:#fff; font-size:12px; font-weight:700;
    flex-shrink:0;
  }
  .prog-ava img { width:100%; height:100%; object-fit:cover; }
  .prog-ava-more {
    background:#E7E5E4 !important;
    color:var(--label2) !important;
    font-size:10.5px;
  }

  /* Timeline bar — the colorful horizontal pill showing % */
  .tl-row-bar-wrap {
    width:100%; height:30px;
    background:var(--sep2);
    border-radius:99px;
    overflow:hidden;
    position:relative;
  }
  .tl-row-bar {
    height:100%; border-radius:99px;
    display:flex; align-items:center; justify-content:flex-end;
    padding-right:14px;
    transition:width 1s var(--ease-out);
    min-width:42px;
  }
  .tl-row-pct {
    font-size:12px; font-weight:800;
    color:#fff;
    letter-spacing:.02em;
    /* v43: Stronger dark shadow so the white % reads on light bars and at low fill */
    text-shadow:0 1px 3px rgba(0,0,0,.5), 0 0 2px rgba(0,0,0,.35);
  }

  .tl-row-foot {
    display:flex; justify-content:space-between; align-items:center;
    flex-wrap:wrap; gap:10px;
    padding-top:2px;
  }
  .tl-row-stats { display:flex; gap:10px; flex-wrap:wrap; }
  .tl-stat {
    font-size:11.5px; font-weight:700; color:var(--label2);
  }
  .tl-stat-doing { color:#21409a; }
  .tl-stat-overdue { color:var(--crit); }
  .tl-row-due {
    display:flex; align-items:center; gap:5px;
    font-size:11.5px; font-weight:600;
    color:var(--label2);
  }
  .tl-row-due-sep { opacity:.5; }
  .tl-row-due-date { color:var(--label3); font-weight:500; }
  .tl-due-overdue { color:var(--crit) !important; font-weight:800; }
  .tl-due-soon    { color:var(--warn) !important; font-weight:800; }
  .tl-due-done    { color:#16A34A !important; font-weight:800; }
  .tl-due-paused  { color:var(--label3) !important; }

  @media (max-width:640px) {
    .tl-row { padding:12px 14px; gap:8px; }
    .tl-row-emoji { width:32px; height:32px; font-size:14px; }
    .tl-row-name { font-size:14px; }
    .tl-row-bar-wrap { height:26px; }
    .tl-row-pct { font-size:11px; }
  }

  /* Kanban board */
  .kb-board {
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:12px;
  }
  @media (max-width:1100px) {
    .kb-board { grid-template-columns:repeat(2, 1fr); }
  }
  @media (max-width:520px) {
    .kb-board { grid-template-columns:1fr; }
  }
  .kb-col {
    background:var(--card2); border-radius:14px;
    padding:8px;
    display:flex; flex-direction:column; gap:8px;
    min-height:120px;
  }
  .kb-col-head {
    display:flex; align-items:center; gap:8px;
    padding:8px 10px; border-radius:10px;
    font-size:12.5px; font-weight:800;
    letter-spacing:.01em;
  }
  .kb-col-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .kb-col-label { flex:1; }
  .kb-col-count {
    background:rgba(255,255,255,.7); color:inherit;
    padding:1px 8px; border-radius:99px;
    font-size:11px; font-weight:800;
  }
  .kb-col-body {
    display:flex; flex-direction:column; gap:8px;
    padding:2px;
  }
  .kb-col-empty {
    font-size:11.5px; color:var(--label3); font-weight:500;
    padding:18px 8px; text-align:center;
    border:1.5px dashed var(--sep);
    border-radius:10px;
  }
  .kb-card {
    background:var(--card);
    border:1px solid var(--sep);
    border-radius:10px;
    padding:11px 12px;
    cursor:pointer;
    transition:box-shadow var(--t) var(--ease), transform var(--t) var(--ease-out);
    display:flex; flex-direction:column; gap:8px;
  }
  .kb-card:hover {
    box-shadow:0 6px 18px rgba(28,25,23,.10);
    transform:translateY(-2px);
  }
  .kb-card-name {
    font-size:13.5px; font-weight:700; color:var(--label);
    line-height:1.3;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .kb-card-desc {
    font-size:11.5px; color:var(--label2); font-weight:500;
    line-height:1.4;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .kb-card-mid {
    display:flex; align-items:center; gap:8px;
  }
  .kb-card-pct {
    font-size:11px; font-weight:800; color:var(--label);
    min-width:32px;
  }
  .kb-card-prog {
    flex:1; height:5px; background:var(--sep2);
    border-radius:99px; overflow:hidden;
  }
  .kb-card-prog > div {
    height:100%; border-radius:99px;
    transition:width .9s var(--ease-out);
  }
  .kb-card-foot {
    display:flex; justify-content:space-between; align-items:center;
  }
  .kb-card-stats {
    display:flex; gap:8px;
    font-size:10.5px; color:var(--label3); font-weight:700;
  }
  .kb-card-stats span {

    flex:1; height:100%;

    position:absolute; top:0; bottom:0; width:1px;

  .gantt-bar {
    position:absolute;
    top:50%; transform:translateY(-50%);
    height:26px;
    border:1px solid;
    border-radius:7px;
    overflow:hidden;
    display:flex; align-items:center;
    transition:transform var(--t) var(--ease), box-shadow var(--t) var(--ease);
  }

    transform:translateY(-50%) scale(1.01);

  .gantt-bar-fill {
    position:absolute; left:0; top:0; bottom:0;
    border-radius:6px 0 0 6px;
    transition:width 1s var(--ease-out);
    z-index:1;
  }
  .gantt-bar-label {
    position:relative; z-index:2;
    margin-left:8px;
    font-size:11px; font-weight:800;
    letter-spacing:.01em;
    /* v43: Label always sits on the colored fill (left side of the bar). Since every
       CARD_COLORS value is a dark, saturated tone, white text + a dark shadow reads
       clearly on ALL of them. The old dark-text-on-dark-fill made 25% invisible. */
    color:#FFFFFF !important;
    text-shadow:0 1px 3px rgba(0,0,0,.55), 0 0 2px rgba(0,0,0,.4);
  }
  /* When the fill is very short (low %), the label may overflow past the fill onto the
     light track. A subtle pill keeps it readable in that case too. */
  .gantt-bar-label::before {
    content:"";
    position:absolute; inset:-2px -5px;
    background:rgba(0,0,0,.18);
    border-radius:5px;
    z-index:-1;
    opacity:0;
    transition:opacity var(--t) var(--ease);

  /* v31: FAB (Floating Action Button) — replaces the long "+ เพิ่มงานใหม่" bars.
     Circular, fixed-position, uses brand blue (#21409a). High visual signal, low chrome.
     A single FAB is unambiguous: one obvious place to add something, always visible. */
  .fab-add {
    position:fixed;
    bottom:84px; right:20px;
    width:60px; height:60px;
    border-radius:50%;
    background:#21409a;
    color:#fff;
    border:none;
    box-shadow:0 8px 24px rgba(33,64,154,.32), 0 3px 8px rgba(0,0,0,.12);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    z-index:90;
    transition:transform var(--t) var(--spring), box-shadow var(--t) var(--ease), background var(--t) var(--ease);
  }
  .fab-add::before {
    content:"+";
    font-size:32px; font-weight:300; line-height:1;
    transition:transform var(--t) var(--ease-out);
  }
  .fab-add:hover {
    transform:scale(1.08);
    box-shadow:0 14px 32px rgba(33,64,154,.4), 0 6px 14px rgba(0,0,0,.16);
    background:#1a3580;
  }
  .fab-add:hover::before { transform:rotate(90deg); }
  .fab-add:active { transform:scale(.95); }
  /* Tooltip label that fades in on hover (desktop only) */
  .fab-add-label {
    position:absolute; right:72px; top:50%; transform:translateY(-50%) translateX(8px);
    background:rgba(15,15,15,.92); color:#fff;
    padding:7px 13px; border-radius:8px;
    font-size:12.5px; font-weight:600; letter-spacing:.01em;
    white-space:nowrap; pointer-events:none;
    opacity:0; transition:opacity var(--t) var(--ease), transform var(--t) var(--ease);
    box-shadow:0 4px 12px rgba(0,0,0,.18);
  }
  .fab-add:hover .fab-add-label { opacity:1; transform:translateY(-50%) translateX(0); }
  @media (min-width: 820px) { .fab-add { bottom:32px; right:32px; } }
  @media (max-width: 819px) {
    .fab-add { width:54px; height:54px; bottom:80px; right:18px; }
    .fab-add::before { font-size:28px; }
    .fab-add-label { display:none; }
  }

<script>
// ═══════════════════════════════════════════════════════════════
//  Project Tracker — Team Workspace v7

const PROJ_KEY  = "bt-tracker-projects-v1";
const USERS_KEY = "bt-users-v1";
const ME_KEY    = "bt-me-v1";
const PAGE_KEY  = "bt-page-v1";
// v49: avatars stored per-member (NOT in users blob) — avoids the 50,000-char
// Google Sheets cell limit and stops one device clobbering another's photo.
const AVATAR_PREFIX = "bt-avatar-";   // + nKey(name) → base64 string
const LOG_KEY   = "bt-history-v1";
const CHAT_KEY  = "bt-chat-v1";   // shared team chat + per-project comments
// v31: "Programs" = big projects (parent initiatives) that group multiple tasks.
//      Stored separately from tasks (PROJ_KEY) so legacy data + scoring is untouched.
//      Each task gains an optional `programId` field linking it to a program.
const PROGRAMS_KEY = "bt-tracker-programs-v1";
let programs = []; // [{id, name, description, color, status, dueDate, createdBy, createdAt, members:[]}]
let chatMsgs = []; // [{id, who, text, ts, scope}]  scope: "team" or project id
const MAX_CHAT = 400;
// Special emoji set unlocked by redeeming "ชุดอิโมจิพิเศษ" (r_emoji)
// Special STICKERS unlocked by redeeming "สติกเกอร์เกียรติยศ" (r_emoji).
// Sent as large framed stickers in chat — visibly different from keyboard emoji,
// and locked behind redemption so they actually mean something.
const SPECIAL_EMOJI = ["🔥","💯","🚀","🏆","🎖️","👑","💎","🌟","⚡","🎊","🦾","🥇"];
const STICKER_PREFIX = "::sticker::"; // messages starting with this render as a big sticker
let history = []; // [{ts, who, action, target, detail}]
const MAX_LOG = 500;
async function addLog(action, target, detail){
  try{
    history.unshift({
      ts:new Date().toISOString(),
      who:myName||"?",
      action, target:target||"", detail:detail||"",
    });
    if(history.length>MAX_LOG) history = history.slice(0,MAX_LOG);
    await sset(LOG_KEY, JSON.stringify(history), true);
  }catch(e){}
}

// v21: Standalone saveHistory — used by import flow + recurring backups
async function saveHistory(){
  try { await sset(LOG_KEY, JSON.stringify(history), true); }
  catch(e) { console.warn("saveHistory failed:", e); }
}

// ─── Team chat ───
async function saveChat(){
  try{
    if(chatMsgs.length>MAX_CHAT) chatMsgs = chatMsgs.slice(-MAX_CHAT);
    await sset(CHAT_KEY, JSON.stringify(chatMsgs), true);
  }catch(e){}
}
async function sendChat(text, scope){
  text=(text||"").trim();
  if(!text) return;
  // v21: Merge in-memory state with storage (not overwrite) so we don't lose
  //      messages that haven't been persisted yet (e.g. after a partial-failed import).
  try{
    const r=await sget(CHAT_KEY,true);
    if(r){
      const stored = JSON.parse(r.value);
      const seen = new Set(chatMsgs.map(m=>m.id));
      stored.forEach(m => { if(m && m.id && !seen.has(m.id)) chatMsgs.push(m); });
    }
  }catch(e){}
  chatMsgs.push({
    id:"c"+Date.now()+Math.random().toString(36).slice(2,6),
    who:myName||"?",
    text:text.slice(0,1000),
    ts:new Date().toISOString(),
    scope:scope||"team",
  });
  // Keep chronological order so render is deterministic
  chatMsgs.sort((a,b) => new Date(a.ts||0) - new Date(b.ts||0));
  await saveChat();
}
async function deleteChat(id){
  // v21: Merge from storage instead of overwriting in-memory
  try{
    const r=await sget(CHAT_KEY,true);
    if(r){
      const stored = JSON.parse(r.value);
      const seen = new Set(chatMsgs.map(m=>m.id));
      stored.forEach(m => { if(m && m.id && !seen.has(m.id)) chatMsgs.push(m); });
    }
  }catch(e){}
  const m=chatMsgs.find(x=>x.id===id);
  if(!m) return;
  if(nKey(m.who)!==nKey(myName)){ toast("ลบได้เฉพาะข้อความของตัวเอง"); return; }
  chatMsgs = chatMsgs.filter(x=>x.id!==id);
  await saveChat();
}
function userHasRedeem(name, rid){
  const u=getUser(name);
  return !!(u && u.redeemed && u.redeemed.includes(rid));
}
function userTitle(name){
  const u=getUser(name);
  return (u && u.profileTitle) ? u.profileTitle : "";
}

// ─── Chat unread counts ───
// chatRead is per-user (synced via users): { scopeId: lastSeenIsoTs }
// A message is "unread" if its ts is after lastSeen for that scope AND it's not from me.
// ─── DM (Direct Message) scope helpers ───
function dmScope(a, b){
  const x = (a||"").trim(), y = (b||"").trim();
  if(!x || !y || nKey(x)===nKey(y)) return null;
  return "dm:" + [x, y].sort((a,b)=>a.localeCompare(b)).join("::");
}
function isDmScope(scope){ return typeof scope === "string" && scope.indexOf("dm:") === 0; }
function dmParticipants(scope){
  if(!isDmScope(scope)) return [];
  return scope.slice(3).split("::");
}
function dmOtherParticipant(scope, me){
  const ps = dmParticipants(scope);
  return ps.find(p => nKey(p) !== nKey(me)) || "";
}
function canSeeScope(userName, scope){
  if(!scope || scope === "team") return true;
  if(isDmScope(scope)){
    return dmParticipants(scope).some(p => nKey(p) === nKey(userName));
  }
  const proj = projects.find(p => p.id === scope);
  if(!proj) return true;
  if(projectInvolves(proj, userName)) return true;
  if(isAdmin(userName)) return true;
  if(nKey(proj.createdBy||"") === nKey(userName)) return true;
  return false;
}

function unreadInScope(scope){
  const u = getUser(myName); if(!u) return 0;
  const lastSeen = (u.chatRead||{})[scope] || "";
  let n = 0;
  for(const m of chatMsgs){
    if((m.scope||"team") !== scope) continue;
    if(nKey(m.who) === nKey(myName)) continue; // own messages don't count
    if(m.ts > lastSeen) n++;
  }
  return n;
}
function unreadTotal(){
  const u = getUser(myName); if(!u) return 0;
  const read = u.chatRead||{};
  let n = 0;
  for(const m of chatMsgs){
    if(nKey(m.who) === nKey(myName)) continue;
    const sc = m.scope||"team";
    if(!canSeeScope(myName, sc)) continue;  // DM not addressed to me — skip
    if(m.ts > (read[sc]||"")) n++;
  }
  return n;
}
async function markChatRead(scope){
  const u = getUser(myName); if(!u) return;
  // Set lastSeen to the latest message ts in this scope (or now if none)
  let latest = "";
  for(const m of chatMsgs){
    if((m.scope||"team") !== scope) continue;
    if(m.ts > latest) latest = m.ts;
  }
  if(!latest) latest = new Date().toISOString();
  u.chatRead = u.chatRead || {};
  if(u.chatRead[scope] !== latest){
    u.chatRead[scope] = latest;
    await saveUsers();
  }
}

// migrate legacy status/priority IDs from older versions
const STATUS_MIGRATE = { "backlog":"todo", "in-progress":"doing", "review":"doing", "blocked":"doing", "done":"done" };
const PRIO_MIGRATE = { "critical":"urgent" };

// ════════════════════════════════════════════════════════════════
// One-time migration — Reset admin XP/coins (admins don't accumulate)
// ════════════════════════════════════════════════════════════════
async function migrateNamesAndAdminStats(){
  try {
    if(localStorage.getItem("bt-admin-reset-v1")) return;
    let reset = false;
    Object.values(users).forEach(u => {
      if(u.role === "admin"){
        if((u.xp||0) > 0 || (u.coins||0) > 0){
          u.xp = 0; u.coins = 0;
          reset = true;
        }
      }
    });
    if(reset){
      const safeToSave = (typeof window.__cloudSyncOK === "undefined") ? true : window.__cloudSyncOK;
      if(safeToSave) await saveUsers();
    }
    localStorage.setItem("bt-admin-reset-v1", "done");
  } catch(e) { console.warn("Admin reset failed:", e); }
}

function migrateProjects(){
  projects.forEach(p=>{
    if(!Array.isArray(p.collaborators)) p.collaborators = [];  // Phase 2: multi-assign
    if(STATUS_MIGRATE[p.status]) p.status = STATUS_MIGRATE[p.status];
    if(!COLUMNS.find(c=>c.id===p.status)) p.status = "todo";
    if(PRIO_MIGRATE[p.priority]) p.priority = PRIO_MIGRATE[p.priority];
    if(!PRIORITIES.find(x=>x.id===p.priority)) p.priority = "medium";
    if(p.actualDate===undefined) p.actualDate = "";
    if(p.cancelled===undefined) p.cancelled = false;
    if(p.autoPriority===undefined) p.autoPriority = false; // legacy = keep manual
    if(p.comparison!==undefined) delete p.comparison; // compare feature removed
    // Performance tracking (v2): auto-tracked work timestamps + manual override
    if(p.startedAt===undefined)    p.startedAt    = ""; // ISO: when status first → "doing"
    if(p.completedAt===undefined)  p.completedAt  = ""; // ISO: when status → "done"
    if(p.manualHours===undefined)  p.manualHours  = null; // number (hours) | null = use auto
    if(!Array.isArray(p.statusHistory)) p.statusHistory = []; // [{status, ts, by}]
    // Backfill: if already "done" and has actualDate but no completedAt, set it
    if(p.status==="done" && !p.completedAt && p.actualDate){
      p.completedAt = new Date(p.actualDate+"T17:00:00").toISOString();
    }
    if(p.status==="done" && !p.startedAt && p.createdAt){
      p.startedAt = p.createdAt; // best guess for legacy data
    }
    // v30: Anti-exploit — XP is granted ONCE per project lifetime.
    //   Backfill: any project already in "done" status counts as already-granted
    //   so it can no longer be reopened+reclosed to farm XP.
    if(p.xpGranted===undefined) p.xpGranted = (p.status==="done");
    // Same for subtasks — each subtask can grant XP only once.
    if(Array.isArray(p.tasks)){
      p.tasks.forEach(t=>{
        if(t.xpGranted===undefined) t.xpGranted = !!t.done;
      });
    }
    // v31: Optional link to a parent "program" (big project). null/empty = standalone task.
    if(p.programId===undefined) p.programId = "";
  });
  // v32: Migrate programs to have a members[] array (multi-collaborator support).
  //      Existing programs that only had `owner` keep working — members is additive.
  if(Array.isArray(programs)){
    programs.forEach(prog => {
      if(!Array.isArray(prog.members)) prog.members = [];
      // If owner exists but isn't in members, keep them separate (members = collaborators only)
      if(prog.color===undefined || !prog.color) prog.color = "#21409a";
      if(prog.status===undefined) prog.status = "active";
    });
  }
}

// effectiveHours: returns number (hours) | null. Uses manual override first; falls back to auto-tracked.
function effectiveHours(p){
  if(!p) return null;
  if(typeof p.manualHours === "number" && p.manualHours > 0) return p.manualHours;
  if(p.startedAt && p.completedAt){
    const s = new Date(p.startedAt).getTime();
    const e = new Date(p.completedAt).getTime();
    if(!isNaN(s) && !isNaN(e) && e > s){
      return Math.round((e-s)/3600000 * 100) / 100; // 2dp
    }
  }
  return null;
}
function fmtHours(h){
  if(h===null || h===undefined) return "—";
  if(h < 1) return Math.round(h*60) + " นาที";
  if(h < 24) return h.toFixed(h < 10 ? 1 : 0) + " ชม.";
  const d = Math.floor(h/24);
  const r = Math.round(h - d*24);
  return r > 0 ? `${d} วัน ${r} ชม.` : `${d} วัน`;
}
// Apply a status transition: stamps startedAt / completedAt + appends to history.
// Returns { changed:boolean } — caller still owns save + log.
function applyStatusTransition(p, newStatus, byName){
  if(!p) return {changed:false};
  const prev = p.status;
  if(prev === newStatus) return {changed:false};
  const now = new Date().toISOString();
  p.status = newStatus;
  if(newStatus === "doing" && !p.startedAt) p.startedAt = now;
  if(newStatus === "done"){
    p.completedAt = now;
    if(!p.startedAt) p.startedAt = p.createdAt || now;
  }
  if(prev === "done" && newStatus !== "done"){
    p.completedAt = "";
  }
  p.statusHistory = p.statusHistory || [];
  p.statusHistory.push({ status:newStatus, ts:now, by:byName||"" });
  p.updatedAt = now;
  return {changed:true, prev};
}
function rangeFor(key){
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if(key === "today"){
    return { from:today, to:new Date(today.getTime()+86400000) };
  }
  if(key === "week"){
    const wkStart = new Date(today); wkStart.setDate(today.getDate() - today.getDay());
    return { from:wkStart, to:new Date(wkStart.getTime()+7*86400000) };
  }
  if(key === "month"){
    return { from:new Date(today.getFullYear(), today.getMonth(), 1),
             to:  new Date(today.getFullYear(), today.getMonth()+1, 1) };
  }
  if(key === "quarter"){
    const q = Math.floor(today.getMonth()/3);
    return { from:new Date(today.getFullYear(), q*3, 1),
             to:  new Date(today.getFullYear(), q*3+3, 1) };
  }
  if(key === "year"){
    return { from:new Date(today.getFullYear(), 0, 1),
             to:  new Date(today.getFullYear()+1, 0, 1) };
  }
  return { from:null, to:null };
}
function inRange(iso, range){
  if(!range.from && !range.to) return true;
  if(!iso) return false;
  const t = new Date(iso).getTime();
  if(range.from && t < range.from.getTime()) return false;
  if(range.to   && t >= range.to.getTime()) return false;
  return true;
}
function aggregatePerformance(range){
  const out = {};
  Object.values(users).forEach(u=>{
    out[nKey(u.name)] = {
      name:u.name, role:u.role||"member",
      assigned:0, active:0, done:0, cancelled:0,
      hoursTotal:0, hoursCount:0,
      onTime:0, late:0, withDeadline:0,
      fastestH:null, slowestH:null,
      byPriority:{urgent:0,high:0,medium:0,low:0},
      budget:0, spent:0,
      // v16: collab tracking — projects where this person is collaborator, not primary
      collabAssigned:0, collabDone:0, collabActive:0,
    };
  });
  projects.forEach(p=>{
    if(!p.assignee) return;
    const inCreate = inRange(p.createdAt, range);
    const inDone   = inRange(p.completedAt, range);
    if(!inCreate && !inDone) return;

    // ── Primary path ──
    const k = nKey(p.assignee);
    if(out[k]){
      const o = out[k];
      o.assigned++;
      if(p.cancelled){ o.cancelled++; }
      else if(p.status === "done"){
        o.done++;
        o.byPriority[p.priority] = (o.byPriority[p.priority]||0) + 1;
        const h = effectiveHours(p);
        if(h !== null){
          o.hoursTotal += h;
          o.hoursCount++;
          if(o.fastestH===null || h < o.fastestH) o.fastestH = h;
          if(o.slowestH===null || h > o.slowestH) o.slowestH = h;
        }
        if(p.dueDate && p.completedAt){
          o.withDeadline++;
          const due = new Date(p.dueDate); due.setHours(23,59,59,999);
          const done = new Date(p.completedAt);
          if(done.getTime() <= due.getTime()) o.onTime++;
          else o.late++;
        }
      } else {
        o.active++;
      }
      o.budget += p.budget||0;
      o.spent  += p.spent ||0;
    }

    // ── Collaborator path (v16) — credit collab stats without inflating primary totals ──
    if(Array.isArray(p.collaborators) && p.collaborators.length > 0){
      p.collaborators.forEach(cn => {
        const ck = nKey(cn);
        if(!ck || ck === k) return;
        if(!out[ck]) return;
        const oc = out[ck];
        oc.collabAssigned++;
        if(p.cancelled) return;
        if(p.status === "done") oc.collabDone++;
        else oc.collabActive++;
      });
    }
  });
  return out;
}

function levelInfo(coins){
  coins = coins||0;
  let lv = 1;
  for(let i=LEVELS.length-1;i>=0;i--){
    if(coins >= LEVELS[i].at){ lv = LEVELS[i].lv; break; }
  }
  const info = LEVELS[lv-1];
  const isMax = lv >= LEVELS.length;
  const curAt = info.at;
  const nextAt = isMax ? info.at : LEVELS[lv].at;
  const progress = coins - curAt;          // points earned within current level
  const span = isMax ? 1 : (nextAt - curAt); // points needed to fill this level
  return {
    lv, title:info.title, emoji:info.emoji,
    progress, next:span, isMax,
    nextAt, toNext: isMax ? 0 : Math.max(0, nextAt - coins),
    pct: isMax ? 100 : Math.min(100, Math.round(progress/span*100)),
  };
}

// Deadline countdown bar
function deadlineBar(dueDate, createdAt) {
  if(!dueDate) {
    return `<div class="dl-bar" style="background:rgba(120,120,128,.05)">
      <div class="dl-top">
        <div class="dl-pulse" style="background:#C7C7CC"></div>
        <span class="dl-count" style="color:var(--label3)">ยังไม่กำหนดวันส่ง</span>
      </div>
    </div>`;
  }
  const days = daysUntil(dueDate);
  let color, label, urgency = false;
  if (days < 0) { color = "#DC2626"; label = `เกินกำหนด ${Math.abs(days)} วัน`; urgency = true; }
  else if (days === 0) { color = "#DC2626"; label = "ครบกำหนดวันนี้"; urgency = true; }
  else if (days <= 3) { color = "#EA580C"; label = `เหลือ ${days} วัน`; urgency = true; }
  else if (days <= 7) { color = "#D97706"; label = `เหลือ ${days} วัน`; }
  else if (days <= 14) { color = "#CA8A04"; label = `เหลือ ${days} วัน`; }
  else { color = "#16A34A"; label = `เหลือ ${days} วัน`; }

  let pct = 0;
  if (createdAt) {
    const now = Date.now();
    const due = new Date(dueDate); due.setHours(23,59,59);
    const created = new Date(createdAt).getTime();
    const totalMs = due.getTime() - created;
    const elapsedMs = now - created;
    if (totalMs > 0) pct = Math.min(100, Math.max(2, (elapsedMs/totalMs)*100));
    if (days < 0) pct = 100;
  } else {
    pct = Math.max(0, Math.min(100, 100 - (days/30)*100));
  }

  return `
    <div class="dl-bar">
      <div class="dl-top">
        <div class="dl-pulse ${urgency?"live":""}" style="background:${color}"></div>
        <span class="dl-count" style="color:${color}">${label}</span>
        <span class="dl-date">${fmtDateShort(dueDate)}</span>
      </div>
      <div class="dl-track">
        <div class="dl-fill" style="width:${pct}%;background:${color}"></div>
      </div>
    </div>
  `;
}

async function resizeImage(file,maxSize=144,quality=0.72){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let {width,height}=img;
        if(width>height){ if(width>maxSize){ height*=maxSize/width; width=maxSize; } }
        else { if(height>maxSize){ width*=maxSize/height; height=maxSize; } }
        const cvs=document.createElement("canvas");
        cvs.width=width; cvs.height=height;
        cvs.getContext("2d").drawImage(img,0,0,width,height);
        // v50: keep base64 well under Google Sheets' ~50,000-char cell limit.
        let out = cvs.toDataURL("image/jpeg",quality);
        let q = quality;
        while(out.length > 40000 && q > 0.4){ q -= 0.1; out = cvs.toDataURL("image/jpeg", q); }
        if(out.length > 40000){
          const c2=document.createElement("canvas");
          c2.width=Math.round(width*0.7); c2.height=Math.round(height*0.7);
          c2.getContext("2d").drawImage(img,0,0,c2.width,c2.height);
          out = c2.toDataURL("image/jpeg", 0.6);
        }
        res(out);
      };
      img.onerror=rej; img.src=e.target.result;
    };
    r.onerror=rej; r.readAsDataURL(file);
  });
}

// ═══════════════════════════════════════════════════════════════
//  STORAGE LAYER — works in Claude.ai (window.storage) AND as a
//  downloaded local file (localStorage fallback). This is what makes
//  data actually persist when you open the file from your computer.
// ═══════════════════════════════════════════════════════════════
const HAS_WS = (typeof window !== "undefined" && window.storage &&
  typeof window.storage.get === "function");

// ─── Google Sheet sync layer ───
// SHEET_URL_KEY stores the Apps Script Web App URL (set by admin in Settings).
// When set, data syncs to a shared Google Sheet so the whole team sees the same data.
// localStorage is always kept as an offline cache / fallback.
const SHEET_URL_KEY = "bt-sheet-url-v1";
const SHEET_KEY_KEY = "bt-sheet-key-v1";  // v22: shared key for auth
let SHEET_URL = "";
let SHEET_SHARED_KEY = "";
try{ SHEET_URL = localStorage.getItem(SHEET_URL_KEY) || ""; }catch(e){}
try{ SHEET_SHARED_KEY = localStorage.getItem(SHEET_KEY_KEY) || ""; }catch(e){}
// connection state: 'offline' (no URL), 'online', 'syncing', 'error'
let SHEET_STATE = SHEET_URL ? "online" : "offline";
let SHEET_LAST_SYNC = null;

function setSheetState(s){
  SHEET_STATE = s;
  const el = document.getElementById("syncDot");
  if(el){
    const map = {
      online:{c:"#0E7C66",t:"เชื่อมต่อแล้ว"},
      syncing:{c:"#D97706",t:"กำลังซิงค์..."},
      error:{c:"#DC2626",t:"ออฟไลน์ (ข้อมูลจะซิงค์เมื่อกลับมา)"},
      offline:{c:"#A8A29E",t:"โหมดในเครื่อง (ยังไม่เชื่อม Sheet)"},
    };
    const m=map[s]||map.offline;
    el.style.background=m.c;
    el.title=m.t;
    const lbl=document.getElementById("syncLabel");
    if(lbl) lbl.textContent=m.t;
  }
}

// Call Apps Script Web App. action: 'get' | 'set' | 'del' | 'ping'. Returns parsed value or null.
async function sheetCall(action, key, value){
  if(!SHEET_URL) return undefined; // not configured → caller falls back to local
  try{
    setSheetState("syncing");
    const res = await fetch(SHEET_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"}, // text/plain avoids CORS preflight
      body: JSON.stringify({ action, key, value, sharedKey: SHEET_SHARED_KEY }),
    });
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    if(data && data.error === "invalid_key"){
      setSheetState("error");
      console.warn("Cloud Sync: รหัสร่วม (SHARED_KEY) ไม่ถูกต้อง");
      return null;
    }
    SHEET_LAST_SYNC = Date.now();
    setSheetState("online");
    return data;
  }catch(e){
    setSheetState("error");
    return null;
  }
}

// v52: fetch many keys in ONE request (with fallback if backend lacks getmany).
let _getManyUnsupported = false;
async function sheetGetMany(keys){
  if(!SHEET_URL) return null;
  if(_getManyUnsupported) return null;
  try{
    setSheetState("syncing");
    const res = await fetch(SHEET_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({ action:"getmany", keys, sharedKey: SHEET_SHARED_KEY }),
    });
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    if(data && data.error === "invalid_key"){ setSheetState("error"); return null; }
    if(!data || !data.ok || !data.values){ _getManyUnsupported = true; return null; }
    SHEET_LAST_SYNC = Date.now();
    setSheetState("online");
    return data.values;
  }catch(e){ setSheetState("error"); return null; }
}

async function sget(key, shared){
  if(HAS_WS){
    try{ return await window.storage.get(key, shared); }
    catch(e){ return null; }
  }
  // Try Google Sheet first (if configured), fall back to localStorage cache
  if(SHEET_URL && shared){
    const r = await sheetCall("get", key);
    if(r && r.ok){
      if(r.value===null || r.value===undefined) {
        // not in sheet — check local cache as last resort
        try{ const v=localStorage.getItem(key); return v===null?null:{value:v}; }catch(e){ return null; }
      }
      try{ localStorage.setItem(key, r.value); }catch(e){} // refresh cache
      return { value:r.value };
    }
    // sheet unreachable → use local cache (offline mode)
  }
  try{ const v=localStorage.getItem(key); return v===null?null:{value:v}; }
  catch(e){ return null; }
}
async function sset(key, val, shared){
  if(HAS_WS){
    try{ return await window.storage.set(key, val, shared); }
    catch(e){ return null; }
  }
  // v30: INSTANT save — local cache writes immediately, cloud push is fire-and-forget.
  //      UI no longer waits for the Google Sheet round-trip, so every save feels
  //      instant like a real web app. If the cloud push fails (offline / network blip),
  //      it gets queued and retried automatically by flushPendingWrites().
  let localOk = true;
  try{ localStorage.setItem(key, val); }catch(e){ localOk = false; }
  if(!localOk) return null;
  if(SHEET_URL && shared){
    // Fire and forget — do NOT await
    sheetCall("set", key, val).then(r => {
      if(r === null) queuePendingWrite(key, val);
    }).catch(() => queuePendingWrite(key, val));
  }
  return { value:val };
}
async function sdel(key, shared){
  if(HAS_WS){
    try{ return await window.storage.delete(key, shared); }
    catch(e){ return null; }
  }
  try{ localStorage.removeItem(key); }catch(e){}
  if(SHEET_URL && shared){ await sheetCall("del", key); }
  return { deleted:true };
}

// Offline write queue — retries when connection returns
const PENDING_KEY = "bt-pending-writes-v1";
function queuePendingWrite(key, val){
  let q={};
  try{ q=JSON.parse(localStorage.getItem(PENDING_KEY)||"{}"); }catch(e){}
  q[key]=val; // last value wins
  try{ localStorage.setItem(PENDING_KEY, JSON.stringify(q)); }catch(e){}
}
async function flushPendingWrites(){
  if(!SHEET_URL) return;
  let q={};
  try{ q=JSON.parse(localStorage.getItem(PENDING_KEY)||"{}"); }catch(e){ return; }
  const keys=Object.keys(q);
  if(keys.length===0) return;
  let allOk=true;
  for(const k of keys){
    const r=await sheetCall("set", k, q[k]);
    if(r===null){ allOk=false; break; }
    delete q[k];
  }
  try{ localStorage.setItem(PENDING_KEY, JSON.stringify(q)); }catch(e){}
  if(allOk && keys.length>0) toast("ซิงค์ข้อมูลที่ค้างไว้สำเร็จ");
}

// ============================================================
// v53: Wipe-tombstone — make "ล้างข้อมูลทั้งหมด" propagate to every device.
// ============================================================
// Every data key that should be erased on a full wipe. Per-member avatar keys
// (AVATAR_PREFIX + nKey) are handled separately since they're dynamic.
const WIPE_DATA_KEYS = [PROJ_KEY, PROGRAMS_KEY, USERS_KEY, LOG_KEY, CHAT_KEY,
  REWARDS_KEY, ACHV_REWARDS_KEY, REDEEM_KEY, ADMIN_PIN_KEY, YEAR_KEY];

// Erase every local trace of team DATA on THIS device (does not touch the cloud).
// v53: avatars (bt-avatar-*) are deliberately preserved — a wipe removes
// jobs/points/history/chat, not profile photos.
function wipeLocalData(){
  try{
    WIPE_DATA_KEYS.forEach(k=>{ try{ localStorage.removeItem(k); }catch(e){} });
    try{ localStorage.removeItem(PENDING_KEY); }catch(e){}   // drop queued stale writes
  }catch(e){}
  // reset in-memory state too (avatars get re-attached from cloud on next sync)
  projects=[]; programs=[]; users={}; history=[]; chatMsgs=[];
  levelRewards={}; achvRewards={}; redeemCatalog=null;
}

// Check the cloud tombstone. If the cloud was wiped more recently than this device
// has acknowledged, follow the wipe: clear local cache + memory and DON'T push back.
// Returns true if a wipe was just applied (caller should re-render / reload).
async function checkWipeTombstone(){
  if(!SHEET_URL) return false;
  let cloudStamp = null;
  try{
    const r = await sheetCall("get", WIPE_KEY);
    if(r && r.ok && r.value!=null) cloudStamp = String(r.value);
  }catch(e){ return false; }   // network blip — do nothing, never wipe on error
  if(!cloudStamp) return false;                 // no wipe has ever happened
  let localStamp = null;
  try{ localStamp = localStorage.getItem(WIPE_KEY); }catch(e){}
  if(localStamp === cloudStamp) return false;   // already acknowledged this wipe
  // A newer (or first-seen) wipe stamp → the wipe was intentional. Follow it.
  wipeLocalData();
  try{ localStorage.setItem(WIPE_KEY, cloudStamp); }catch(e){}
  window.__cloudSyncOK = true;                  // memory is now authoritative-empty
  return true;
}

// v24: Cache-first loading — "stale-while-revalidate" pattern
// Step 1: load from localStorage instantly → show UI in <1s
// Step 2: sync from cloud in background → silently update if changed
function _loadFromLocal(){
  try{ const v=localStorage.getItem(USERS_KEY);       if(v) users=JSON.parse(v); }catch(e){ users={}; }
  try{ const v=localStorage.getItem(PROJ_KEY);        if(v) projects=JSON.parse(v); }catch(e){ projects=[]; }
  try{ const v=localStorage.getItem(PROGRAMS_KEY);    if(v) programs=JSON.parse(v); }catch(e){ programs=[]; }
  try{ const v=localStorage.getItem(REWARDS_KEY);     if(v) levelRewards=JSON.parse(v); }catch(e){ levelRewards={}; }
  try{ const v=localStorage.getItem(ACHV_REWARDS_KEY);if(v) achvRewards=JSON.parse(v); }catch(e){ achvRewards={}; }
  try{ const v=localStorage.getItem(REDEEM_KEY);      if(v) redeemCatalog=JSON.parse(v); }catch(e){ redeemCatalog=null; }
  try{ const v=localStorage.getItem(LOG_KEY);         if(v) history=JSON.parse(v); }catch(e){ history=[]; }
  try{ const v=localStorage.getItem(CHAT_KEY);        if(v) chatMsgs=JSON.parse(v); }catch(e){ chatMsgs=[]; }
}
async function syncFromCloud(){
  if(!SHEET_URL) return false;
  try{
    // v51: one parallel wave for core keys + all avatars (was 2 waves → photos ~5s late).
    const avNames = Object.keys(users);
    const coreKeys = [USERS_KEY,PROJ_KEY,PROGRAMS_KEY,REWARDS_KEY,ACHV_REWARDS_KEY,REDEEM_KEY,LOG_KEY,CHAT_KEY];
    const avKeys = avNames.map(k=>AVATAR_PREFIX + k);
    // v52: one request for everything (getmany), fall back to parallel GETs if unsupported.
    let valuesMap = await sheetGetMany([...coreKeys, ...avKeys]);
    let usedGetMany = !!valuesMap;
    let R = {};
    if(usedGetMany){
      [...coreKeys, ...avKeys].forEach(k=>{ R[k] = { ok:true, value:(valuesMap[k]!=null?valuesMap[k]:null) }; });
    }else{
      const all = await Promise.allSettled([...coreKeys, ...avKeys].map(k=>sheetCall("get", k)));
      [...coreKeys, ...avKeys].forEach((k,i)=>{ const res=all[i]; R[k]=(res.status==="fulfilled"&&res.value)?res.value:{ok:false,value:null}; });
    }
    const anyOk = coreKeys.some(k => R[k] && R[k].ok && R[k].value!=null) || usedGetMany;
    if(!anyOk) return false;   // v47: all failed → don't risk overwriting cloud
    let changed = false;
    const apply = (key, setter) => {
      const r = R[key];
      if(r && r.ok && r.value!=null){
        const cloudValue = r.value;
        const localValue = localStorage.getItem(key);
        if(cloudValue === localValue) return;
        try{
          const fresh = JSON.parse(cloudValue);
          setter(fresh);
          try{ localStorage.setItem(key, cloudValue); }catch(e){}
          changed = true;
        }catch(e){}
      }
    };
    apply(USERS_KEY,        v=>{ users=v; });
    apply(PROJ_KEY,         v=>{ projects=v; });
    apply(PROGRAMS_KEY,     v=>{ programs=v; });
    apply(REWARDS_KEY,      v=>{ levelRewards=v; });
    apply(ACHV_REWARDS_KEY, v=>{ achvRewards=v; });
    apply(REDEEM_KEY,       v=>{ redeemCatalog=v; });
    apply(LOG_KEY,          v=>{ history=v; });
    apply(CHAT_KEY,         v=>{ chatMsgs=v; });
    // v52: overlay avatars from the same response.
    const beforeAv = JSON.stringify(avNames.map(k=>users[k]&&users[k].avatar||""));
    avNames.forEach(k=>{
      const r = R[AVATAR_PREFIX + k];
      if(r && r.ok && r.value){ if(users[k]) users[k].avatar = r.value; }
    });
    const missing = Object.keys(users).filter(k=>avNames.indexOf(k)===-1);
    if(missing.length){ await loadAvatars(); }
    const afterAv = JSON.stringify(Object.keys(users).map(k=>users[k]&&users[k].avatar||""));
    if(afterAv !== beforeAv) changed = true;
    try{ localStorage.setItem(USERS_KEY, JSON.stringify(users)); }catch(e){}
    if(changed){ migrateProjects(); render(); }
    return true;   // v47: cloud pull succeeded
  }catch(e){ return false; }
}
async function loadAll(resetPage){
  try{ const r=await sget(ME_KEY,false); if(r) myName=r.value; }catch(e){}
  // v53: only jump to dashboard on the FIRST load (app open). Background syncs
  // (tab refocus, manual refresh) must keep the user on their current page —
  // otherwise typing a new task and briefly switching apps bounces them home.
  if(resetPage) currentPage="dashboard";

  // Step 1: Show from cache instantly (no waiting) → UI appears in <1s
  _loadFromLocal();
  render();   // paint immediately with whatever we have locally

  // ── v47: CRITICAL ORDER FIX — pull cloud FIRST before any save, so stale local
  //         data can't overwrite fresh cloud (was wiping avatars/data).
  let cloudOK = true;
  if(SHEET_URL){
    // v53: before syncing, check whether an admin wiped everything. If so, clear
    // this device to match instead of pulling/merging (and never push stale data).
    const wiped = await checkWipeTombstone();
    if(wiped){
      window.__cloudSyncOK = true;
      render();                       // show the now-empty board immediately
      await bootstrapTeam();          // recreate the fresh (zeroed) team roster
      await loadAvatars();            // v53: re-attach kept profile photos from cloud
      render();
      return;                         // skip the normal sync+migrate for this load
    }
    cloudOK = await syncFromCloud();
  }
  window.__cloudSyncOK = cloudOK;

  await checkYearReset();
  migrateProjects();
  await migrateNamesAndAdminStats();
}

// Reset everyone's points & achievements to 0 when a new calendar year starts.
// Each year is a fresh evaluation cycle. Previous-year totals are archived per user.
async function checkYearReset(){
  const nowYear = new Date().getFullYear();
  let storedYear = null;
  try{ const r=await sget(YEAR_KEY,true); if(r) storedYear=parseInt(r.value); }catch(e){}
  if(storedYear===null){
    // first run — record current year, no reset
    try{ await sset(YEAR_KEY,String(nowYear),true); }catch(e){}
    return;
  }
  if(nowYear>storedYear){
    // year rolled over — archive last year's score, reset to 0
    Object.values(users).forEach(u=>{
      u.history = u.history || {};
      u.history[String(storedYear)] = {
        coins: u.coins||0,
        xp: u.xp||0,
        level: levelInfo(u.xp||0).lv,
        achievements: (u.achievements||[]).slice(),
        redeemed: (u.redeemed||[]).slice(),
      };
      u.coins = 0;
      u.xp = 0;
      u.achievements = [];
      u.redeemed = [];
      u.redeemLog = {};
      u.stats = { tasksDone:0, projectsDone:0, notesAdded:0 };
      u.streak = 0;
    });
    try{ await saveUsers(); }catch(e){}
    try{ await sset(YEAR_KEY,String(nowYear),true); }catch(e){}
    try{ await addLog("reward","รีเซ็ตแต้มประจำปี",`เริ่มรอบประเมินใหม่ปี ${nowYear+543} — แต้มปี ${storedYear+543} ถูกเก็บเป็นประวัติ`); }catch(e){}
  }
}

function mergeUsers(cloud, local){
  const out = {};
  const keys = new Set([...Object.keys(cloud||{}), ...Object.keys(local||{})]);
  const meK = nKey(myName||"");
  keys.forEach(k=>{
    const c = (cloud||{})[k], l = (local||{})[k];
    if(!c){ out[k] = l; return; }
    if(!l){ out[k] = c; return; }
    if(k === meK){ out[k] = l; return; }
    const m = Object.assign({}, c);
    if(!m.avatar && l.avatar) m.avatar = l.avatar;
    m.xp    = Math.max(c.xp||0,    l.xp||0);
    m.coins = Math.max(c.coins||0, l.coins||0);
    out[k] = m;
  });
  return out;
}

      if(r && r.ok && r.value){ users = mergeUsers(JSON.parse(r.value), users); }

  await sset(USERS_KEY, JSON.stringify(slim), true);
}

// v57: cache avatars in localStorage so they appear INSTANTLY on the next app
// open (no waiting for the slow Sheet round-trip), then refresh in the
// background and update the cache. This kills the "blank avatars on login" wait.

  try{
    const raw = localStorage.getItem(AVATAR_LS);
    if(!raw) return;
    const cache = JSON.parse(raw);
    Object.keys(cache).forEach(k=>{ if(users[k] && cache[k]) users[k].avatar = cache[k]; });
  }catch(e){}

    const cache = {};
    Object.keys(users).forEach(k=>{ if(users[k] && users[k].avatar) cache[k] = users[k].avatar; });
    localStorage.setItem(AVATAR_LS, JSON.stringify(cache));
  }catch(e){ /* quota or disabled — ignore */ }

  const names = Object.keys(users);
  await Promise.allSettled(names.map(async k=>{
    try{ const r = await sheetCall("get", AVATAR_PREFIX + k);
      if(r && r.ok && r.value){ if(users[k]) users[k].avatar = r.value; } }catch(e){}
  }));
  saveAvatarsToCache(); // refresh cache with cloud result
}

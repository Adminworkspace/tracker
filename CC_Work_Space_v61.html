      return inRange(p.createdAt, range) || inRange(p.completedAt, range);
    })
    .sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0))
    .map((p,i)=>{
      const h = effectiveHours(p);
      const hSrc = (typeof p.manualHours==="number" && p.manualHours>0) ? "บันทึกเอง"
                 : (p.startedAt && p.completedAt) ? "อัตโนมัติ" : "—";
      const done = (p.tasks||[]).filter(t=>t.done).length;
      const total = (p.tasks||[]).length;
      const pct = total>0 ? Math.round(done/total*100) : 0;
      // on-time / lateness
      let onTime = "", lateDays = "";
      if(p.dueDate && p.completedAt){
        const due = new Date(p.dueDate); due.setHours(23,59,59,999);
        const dn  = new Date(p.completedAt);
        const diffMs = dn.getTime() - due.getTime();
        const diffDays = Math.round(diffMs / 86400000);
        onTime = diffMs <= 0 ? "✓ ตรงเวลา" : "✗ ล่าช้า";
        lateDays = diffDays > 0 ? diffDays : 0;
      }
      const collabStr = Array.isArray(p.collaborators) ? p.collaborators.filter(Boolean).join(", ") : "";
      return [
        i+1, p.title||"", p.assignee||"", collabStr,
        colObj(p.status).label, prioObj(p.priority).label,
        p.createdAt ? fmtDateFull(p.createdAt) : "",
        p.dueDate ? fmtDateFull(p.dueDate) : "",
        p.startTime || "", p.endTime || "",
        p.startedAt || "", p.completedAt || "",
        p.actualDate ? fmtDateFull(p.actualDate) : "",
        h===null ? "" : h, hSrc, onTime, lateDays,
        p.budget||0, p.spent||0, (p.budget||0)-(p.spent||0),
        total, done, pct/100,
        p.cancelled ? "ยกเลิก" : "",
        p.createdBy || "",
        (p.description||"").replace(/[\r\n]+/g," "),
      ];
    });
  const ws1 = XLSX.utils.aoa_to_sheet([rawHeader, ...rawRows]);
  ws1["!cols"] = [
    {wch:6},{wch:32},{wch:14},{wch:20},{wch:10},{wch:10},
    {wch:18},{wch:18},{wch:8},{wch:8},
    {wch:22},{wch:22},{wch:18},
    {wch:10},{wch:10},{wch:10},{wch:10},
    {wch:12},{wch:12},{wch:12},{wch:8},{wch:8},{wch:8},
    {wch:8},{wch:14},{wch:40}
  ];
  // Apply pct format to col W (index 22 — one position shifted by new ทีมร่วม column)
  for(let r=1; r<=rawRows.length; r++){
    const addr = XLSX.utils.encode_cell({r, c:22});
    if(ws1[addr]) ws1[addr].z = "0%";
  }

  // ─── SHEET 2: Per-Person Summary ───
  const perf = aggregatePerformance(range);
  const sumHeader = [
    "ลำดับ","ชื่อ","บทบาท",
    "งานที่ได้รับ","กำลังทำ","เสร็จแล้ว","ยกเลิก",
    "ชม.รวม","เฉลี่ย ชม./งาน","เร็วสุด(ชม.)","ช้าสุด(ชม.)",
    "งบรับผิดชอบ","ใช้ไป"
  ];
  const sumRows = Object.values(perf)
    .filter(o=>o.assigned>0)
    .sort((a,b)=>b.done-a.done || b.assigned-a.assigned)
    .map((o,i)=>{
      const avg = o.hoursCount>0 ? Math.round(o.hoursTotal/o.hoursCount*100)/100 : "";
      return [
        i+1, o.name, o.role==="admin"?"หัวหน้า":"สมาชิก",
        o.assigned, o.active, o.done, o.cancelled,
        Math.round(o.hoursTotal*100)/100, avg,
        o.fastestH===null ? "" : o.fastestH,
        o.slowestH===null ? "" : o.slowestH,
        o.budget, o.spent
      ];
    });
  const ws2 = XLSX.utils.aoa_to_sheet([sumHeader, ...sumRows]);
  ws2["!cols"] = [
    {wch:6},{wch:18},{wch:10},
    {wch:10},{wch:10},{wch:10},{wch:10},
    {wch:10},{wch:14},{wch:12},{wch:12},
    {wch:14},{wch:14}
  ];

  // ─── SHEET 3: Performance KPI ───
  const kpiHeader = [
    "ลำดับ","ชื่อ",
    "งานเสร็จ","มีกำหนดส่ง","ตรงเวลา","ล่าช้า","%ตรงเวลา",
    "งานด่วนมาก","งานด่วน","งานปานกลาง","งานทั่วไป",
    "ชม.รวม","เฉลี่ย ชม./งาน","Productivity Score"
  ];
  const kpiRows = Object.values(perf)
    .filter(o=>o.assigned>0)
    .map(o=>{
      const onTimePct = o.withDeadline>0 ? (o.onTime/o.withDeadline) : null;
      // Productivity Score = done × on-time-rate × priority-weight (simple, transparent)
      const prioWeight = (o.byPriority.urgent*4 + o.byPriority.high*3 + o.byPriority.medium*2 + o.byPriority.low*1);
      const score = Math.round(prioWeight * (onTimePct===null ? 1 : (0.5 + onTimePct*0.5)));
      return { o, onTimePct, score, prioWeight };
    })
    .sort((a,b)=>b.score-a.score)
    .map((x,i)=>{
      const o = x.o;
      const avg = o.hoursCount>0 ? Math.round(o.hoursTotal/o.hoursCount*100)/100 : "";
      return [
        i+1, o.name,
        o.done, o.withDeadline, o.onTime, o.late,
        x.onTimePct===null ? "" : x.onTimePct,
        o.byPriority.urgent, o.byPriority.high, o.byPriority.medium, o.byPriority.low,
        Math.round(o.hoursTotal*100)/100, avg, x.score
      ];
    });
  const ws3 = XLSX.utils.aoa_to_sheet([kpiHeader, ...kpiRows]);
  ws3["!cols"] = [
    {wch:6},{wch:18},
    {wch:10},{wch:12},{wch:10},{wch:10},{wch:10},
    {wch:11},{wch:10},{wch:12},{wch:11},
    {wch:10},{wch:14},{wch:16}
  ];
  // Format on-time-pct col G (index 6) as %
  for(let r=1; r<=kpiRows.length; r++){
    const addr = XLSX.utils.encode_cell({r, c:6});
    if(ws3[addr] && ws3[addr].v !== "") ws3[addr].z = "0%";
  }

  // ─── SHEET 4: Timeline (chronological activity) ───
  // Build from statusHistory across all projects + completion log
  const timeline = [];
  projects.forEach(p=>{
    (p.statusHistory||[]).forEach(h=>{
      timeline.push({
        ts: h.ts,
        type: "status",
        who: h.by || p.assignee || "",
        project: p.title || "(ไม่มีชื่อ)",
        detail: `เปลี่ยนสถานะ → ${colObj(h.status).label}`,
        priority: prioObj(p.priority).label
      });
    });
    if(p.createdAt){
      timeline.push({
        ts: p.createdAt,
        type: "create",
        who: p.createdBy || "",
        project: p.title || "(ไม่มีชื่อ)",
        detail: "สร้างงาน",
        priority: prioObj(p.priority).label
      });
    }
    if(p.completedAt){
      const h = effectiveHours(p);
      timeline.push({
        ts: p.completedAt,
        type: "done",
        who: p.assignee || "",
        project: p.title || "(ไม่มีชื่อ)",
        detail: `เสร็จงาน${h!==null?` · ใช้เวลา ${fmtHours(h)}`:""}`,
        priority: prioObj(p.priority).label
      });
    }
  });
  // Filter by range
  const filteredTl = timeline.filter(t=>inRange(t.ts, range));
  filteredTl.sort((a,b)=>new Date(b.ts)-new Date(a.ts));
  const tlHeader = ["วันเวลา","ประเภท","ผู้กระทำ","ชื่องาน","ความสำคัญ","รายละเอียด"];
  const tlRows = filteredTl.map(t=>{
    const d = new Date(t.ts);
    const stamp = `${d.getFullYear()+543}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    const typeLbl = ({create:"สร้าง", status:"เปลี่ยนสถานะ", done:"เสร็จ"})[t.type] || t.type;
    return [stamp, typeLbl, t.who, t.project, t.priority, t.detail];
  });
  const ws4 = XLSX.utils.aoa_to_sheet([tlHeader, ...tlRows]);
  ws4["!cols"] = [{wch:20},{wch:14},{wch:14},{wch:32},{wch:10},{wch:40}];

  // ─── Assemble & download ───
  // ─────────────────────────────────────────────────────────
  // SHEET 0 (default view): "Easy View" — monitoring summary
  // 8 columns with colored cells for at-a-glance reading
  // ─────────────────────────────────────────────────────────
  const evHeader = ["Task Name","Owner","Status","Priority","Deadline","Actual Date","Days Left","Warning"];

  const fmtMonitor = (d) => {
    if(!d) return "";
    const dt = new Date(d);
    if(isNaN(dt.getTime())) return "";
    const pad = n => String(n).padStart(2,"0");
    return `${pad(dt.getDate())}-${pad(dt.getMonth()+1)}-${String(dt.getFullYear()).slice(-2)}`;
  };
  const statusEN = (p) => {
    if(p.cancelled) return "Cancelled";
    if(p.status === "done") return "Done";
    if(p.status === "doing") return "Doing";
    return "To do";
  };
  const priorityEN = (p) => ({low:"Low",medium:"Medium",high:"High",urgent:"Urgent"})[p.priority||"medium"]||"Medium";
  const daysBetween = (a,b) => {
    const da = new Date(a), db = new Date(b);
    if(isNaN(da.getTime())||isNaN(db.getTime())) return null;
    da.setHours(0,0,0,0); db.setHours(0,0,0,0);
    return Math.round((da.getTime()-db.getTime())/86400000);
  };
  const computeDaysLeft = (p) => {
    if(!p.dueDate) return "";
    if(p.cancelled) return "";
    const refIso = (p.status === "done")
      ? (p.completedAt || p.actualDate || new Date().toISOString())
      : new Date().toISOString();
    const v = daysBetween(p.dueDate, refIso);
    return v === null ? "" : v;
  };
  // Rich warning info: includes icon + day count + style key
  const computeWarningInfo = (p) => {
    if(p.cancelled) return { key:"cancelled", text:"— Cancelled" };
    if(p.status === "done") {
      const ref = p.completedAt || p.actualDate;
      if(!p.dueDate || !ref) return { key:"complete", text:"✓ Complete" };
      const v = daysBetween(p.dueDate, ref);
      if(v === null) return { key:"complete", text:"✓ Complete" };
      if(v > 0)  return { key:"complete",  text:`✓ Complete · ${v} d เร็ว` };
      if(v === 0) return { key:"complete", text:"✓ Complete · ตรงวัน" };
      return { key:"done-late", text:`⚠ Done late · ${-v} d` };
    }
    if(!p.dueDate) return { key:"on-track", text:"☑ On Track" };
    const dl = daysBetween(p.dueDate, new Date().toISOString());
    if(dl === null) return { key:"on-track", text:"☑ On Track" };
    if(dl < 0)      return { key:"overdue",  text:`✗ Overdue · ${-dl} d` };
    if(dl === 0)    return { key:"due-today",text:"⏰ Due today" };
    if(dl <= 3)     return { key:"due-soon", text:`⏰ Due soon · ${dl} d` };
    return            { key:"on-track", text:`☑ On Track · ${dl} d` };
  };
  // Legacy single-string warning (for compat if used elsewhere)
  const computeWarning = (p) => computeWarningInfo(p).text;

  // Same data source as raw sheet (respect range filter)
  const evSource = projects
    .filter(p => inRange(p.createdAt, range) || inRange(p.completedAt, range))
    .sort((a,b)=>{
      // Active first, then done/cancelled (matches in-app sort)
      const aDone = a.status === "done" || a.cancelled;
      const bDone = b.status === "done" || b.cancelled;
      if(aDone !== bDone) return aDone ? 1 : -1;
      const da = a.dueDate ? new Date(a.dueDate).getTime() : Infinity;
      const db = b.dueDate ? new Date(b.dueDate).getTime() : Infinity;
      return da - db;
    });

  // Build rows + remember each row's warning info (for cell styling)
  const evRowsRich = evSource.map(p => {
    const wi = computeWarningInfo(p);
    return {
      row: [
        p.title || "(ไม่มีชื่อ)",
        p.assignee || "",
        statusEN(p),
        priorityEN(p),
        fmtMonitor(p.dueDate),
        fmtMonitor(p.completedAt || p.actualDate),
        computeDaysLeft(p),
        wi.text,
      ],
      warning: wi,
    };
  });
  const evRows = evRowsRich.map(x => x.row);

  const wsEV = XLSX.utils.aoa_to_sheet([evHeader, ...evRows]);
  wsEV["!cols"] = [
    {wch:48},{wch:14},{wch:10},{wch:10},
    {wch:11},{wch:11},{wch:10},{wch:20},  // Warning wider for icon + day count
  ];

  // ─── Color tables (match the monitoring-friendly style) ───
  const STATUS_STYLE = {
    "Done":      { fill: "9ECF9E", text: "0A5C0A" },
    "Doing":     { fill: "FFD680", text: "7A4500" },
    "To do":     { fill: "B8DCEC", text: "0D47A1" },
    "Cancelled": { fill: "E0E0E0", text: "616161" },
  };
  const PRIORITY_TEXT = {
    "Low":     "2A8E2A",
    "Medium":  "C9991A",
    "High":    "E07015",
    "Urgent":  "D32F2F",
  };
  const WARNING_STYLE = {
    "complete":  { fill: "A2D8A2", text: "0A5C0A", bold: false },  // green - done on time / early
    "done-late": { fill: "FFD680", text: "7A4500", bold: true  },  // amber - done after deadline
    "due-today": { fill: "FFB070", text: "5C2E00", bold: true  },  // strong orange - urgent today
    "due-soon":  { fill: "FFE0B2", text: "7A4500", bold: false },  // light orange - 1-3 days
    "on-track":  { fill: "C5E8C5", text: "1B5E20", bold: false },  // light green - plenty of time
    "overdue":   { fill: "E64545", text: "FFFFFF", bold: true  },  // strong red - past deadline
    "cancelled": { fill: "E0E0E0", text: "616161", bold: false },  // gray
  };

  const thinBorder = (rgb) => ({
    top:    { style: "thin", color: { rgb } },
    bottom: { style: "thin", color: { rgb } },
    left:   { style: "thin", color: { rgb } },
    right:  { style: "thin", color: { rgb } },
  });
  const dataBorder = thinBorder("D8D8D8");
  const headerBorder = thinBorder("888888");

  // Header row style
  const headerStyle = {
    font: { bold: true, sz: 12, color: { rgb: "000000" }, name: "Calibri" },
    fill: { patternType: "solid", fgColor: { rgb: "F2F2F2" } },
    alignment: { horizontal: "center", vertical: "center", wrapText: true },
    border: headerBorder,
  };
  for(let c = 0; c < evHeader.length; c++){
    const addr = XLSX.utils.encode_cell({r:0, c});
    if(wsEV[addr]) wsEV[addr].s = headerStyle;
  }
  // Highlight "Actual Date" header (col 5) — slightly emphasized like the example
  const actualHdr = XLSX.utils.encode_cell({r:0, c:5});
  if(wsEV[actualHdr]) wsEV[actualHdr].s = {
    ...headerStyle,
    fill: { patternType: "solid", fgColor: { rgb: "9ECF9E" } },
    font: { ...headerStyle.font, color: { rgb: "FFFFFF" } },
  };

  // Data rows
  for(let r = 1; r <= evRows.length; r++){
    // Col 0: Task Name (left-aligned)
    let addr = XLSX.utils.encode_cell({r, c:0});
    if(wsEV[addr]) wsEV[addr].s = {
      font: { sz: 11, name: "Calibri" },
      alignment: { horizontal: "left", vertical: "center", wrapText: false },
      border: dataBorder,
    };
    // Col 1: Owner (center)
    addr = XLSX.utils.encode_cell({r, c:1});
    if(wsEV[addr]) wsEV[addr].s = {
      font: { sz: 11, name: "Calibri" },
      alignment: { horizontal: "center", vertical: "center" },
      border: dataBorder,
    };
    // Col 2: Status — filled background
    addr = XLSX.utils.encode_cell({r, c:2});
    if(wsEV[addr]){
      const sc = STATUS_STYLE[wsEV[addr].v] || STATUS_STYLE["To do"];
      wsEV[addr].s = {
        font: { sz: 11, bold: true, color: { rgb: sc.text }, name: "Calibri" },
        fill: { patternType: "solid", fgColor: { rgb: sc.fill } },
        alignment: { horizontal: "center", vertical: "center" },
        border: dataBorder,
      };
    }
    // Col 3: Priority — colored text only
    addr = XLSX.utils.encode_cell({r, c:3});
    if(wsEV[addr]){
      const pc = PRIORITY_TEXT[wsEV[addr].v] || PRIORITY_TEXT["Medium"];
      wsEV[addr].s = {
        font: { sz: 11, bold: true, color: { rgb: pc }, name: "Calibri" },
        alignment: { horizontal: "center", vertical: "center" },
        border: dataBorder,
      };
    }
    // Cols 4 + 5: Dates (center, monospace-feel) — col 4 (Deadline) tinted by urgency
    for(const col of [4, 5]){
      addr = XLSX.utils.encode_cell({r, c:col});
      if(wsEV[addr]) wsEV[addr].s = {
        font: { sz: 11, bold: (col===5), name: "Calibri" },
        alignment: { horizontal: "center", vertical: "center" },
        border: dataBorder,
      };
    }
    // v20: Tint Deadline cell (col 4) by urgency — mirrors HTML pill colors
    addr = XLSX.utils.encode_cell({r, c:4});
    if(wsEV[addr] && wsEV[addr].v){
      const p = evSource[r-1];
      const dlVal = computeDaysLeft(p);
      let dlFill = null, dlText = "000000", dlBold = false;
      if(p.cancelled){ /* default */ }
      else if(p.status === "done"){ /* default */ }
      else if(typeof dlVal === "number"){
        if(dlVal < 0){      dlFill = "FECACA"; dlText = "991B1B"; dlBold = true; }
        else if(dlVal === 0){ dlFill = "FECACA"; dlText = "991B1B"; dlBold = true; }
        else if(dlVal <= 3){  dlFill = "FED7AA"; dlText = "9A3412"; dlBold = true; }
        else if(dlVal <= 14){ dlFill = "FEF3C7"; dlText = "92400E"; dlBold = false; }
        else {                dlFill = "D1FAE5"; dlText = "065F46"; dlBold = false; }
      }
      if(dlFill){
        wsEV[addr].s = {
          font: { sz: 11, bold: dlBold, color: { rgb: dlText }, name: "Calibri" },
          fill: { patternType: "solid", fgColor: { rgb: dlFill } },
          alignment: { horizontal: "center", vertical: "center" },
          border: dataBorder,
        };
      }
    }
    // Col 6: Days Left (colored number) — v20 matches HTML thresholds (≤3 → orange)
    addr = XLSX.utils.encode_cell({r, c:6});
    if(wsEV[addr]){
      const v = wsEV[addr].v;
      let color = "000000", fill = null, bold = true;
      if(typeof v === "number"){
        if(v < 0){      color = "FFFFFF"; fill = "DC2626"; }
        else if(v === 0){ color = "FFFFFF"; fill = "DC2626"; }
        else if(v <= 3){  color = "9A3412"; fill = "FED7AA"; }
        else if(v <= 14){ color = "92400E"; fill = "FEF3C7"; }
        else            { color = "065F46"; fill = "D1FAE5"; }
      }
      const style = {
        font: { sz: 11, bold: bold, color: { rgb: color }, name: "Calibri" },
        alignment: { horizontal: "center", vertical: "center" },
        border: dataBorder,
      };
      if(fill) style.fill = { patternType: "solid", fgColor: { rgb: fill } };
      wsEV[addr].s = style;
    }
    // Col 7: Warning — filled background, color matches status key
    addr = XLSX.utils.encode_cell({r, c:7});
    if(wsEV[addr]){
      const wi = evRowsRich[r-1].warning;
      const wc = WARNING_STYLE[wi.key] || WARNING_STYLE["on-track"];
      wsEV[addr].s = {
        font: { sz: 11, bold: !!wc.bold, color: { rgb: wc.text }, name: "Calibri" },
        fill: { patternType: "solid", fgColor: { rgb: wc.fill } },
        alignment: { horizontal: "center", vertical: "center" },
        border: dataBorder,
      };
    }
  }

  // Auto-filter (dropdown arrows in header)
  wsEV["!autofilter"] = { ref: `A1:H${evRows.length + 1}` };
  // Freeze top row (header always visible while scrolling)
  wsEV["!freeze"] = { ySplit: 1 };
  // Row heights — taller header
  wsEV["!rows"] = [{ hpt: 32 }];
  for(let i = 0; i < evRows.length; i++) wsEV["!rows"].push({ hpt: 22 });

  const wb = XLSX.utils.book_new();
  // Cover/meta sheet
  const metaRows = [
    ["Project & Jobs Tracker — รายงาน Performance"],
    [],
    ["ช่วงเวลา", rangeLabel],
    ["สร้างรายงานเมื่อ", new Date().toLocaleString("th-TH")],
    ["สร้างโดย", myName||""],
    ["งานในรายงาน (Raw Data)", rawRows.length],
    ["สมาชิกในสรุป", sumRows.length],
    ["กิจกรรมใน Timeline", tlRows.length],
    [],
    ["คำอธิบายแผ่นงาน:"],
    ["1. Easy View", "สรุป monitoring — สีเข้าใจง่าย เห็นสถานะปุ๊บรู้ปั๊บ"],
    ["2. ข้อมูลดิบ", "ทุกงานพร้อมทุกฟิลด์ — ใช้ pivot ต่อได้"],
    ["3. สรุปต่อคน", "Workload + ชั่วโมงเฉลี่ย/รวม ของแต่ละคน"],
    ["4. Performance KPI", "ตรงเวลา / Score ตามน้ำหนัก priority — เรียงจากคะแนนสูงสุด"],
    ["5. Timeline", "เส้นทางกิจกรรมเรียงตามเวลาล่าสุด"],
    [],
    ["ที่มาของชั่วโมงทำงาน:"],
    ["อัตโนมัติ", "นับจากเวลาที่เปลี่ยนสถานะ doing → done"],
    ["บันทึกเอง", "ค่าที่ผู้ใช้กรอกใน edit sheet (override)"],
  ];
  const ws0 = XLSX.utils.aoa_to_sheet(metaRows);
  ws0["!cols"] = [{wch:28},{wch:48}];
  // merge title row
  ws0["!merges"] = [{s:{r:0,c:0},e:{r:0,c:1}}];

  XLSX.utils.book_append_sheet(wb, wsEV, "Easy View");      // ← default tab (opens first)
  XLSX.utils.book_append_sheet(wb, ws0, "ภาพรวม");

// ════════════════════════════════════════════════════════════════
// LOCAL FILE-SHARE — Export / Import / Backup / Restore (v1)
// ════════════════════════════════════════════════════════════════
const BACKUP_PREFIX = "bt-backup-";       // e.g. "bt-backup-"
const LAST_IMPORT_KEY = "bt-last-import-v1";
const TOOL_ID = "bt";                     // "bt" | "pt"
const TOOL_NAME = "BeautyTeam";                 // "BeautyTeam" | "ABI"
const WORKSPACE_NAME = "CC Workspace";       // User-facing brand name (v16)
const MAX_BACKUPS = 10;

// ─── filename + timestamp helpers ───
function _safeFilename(s){
  return (s||"unnamed").replace(/[^a-zA-Z0-9\u0e00-\u0e7f_-]/g, "_").slice(0, 40);
}
function _nowStamp(){
  const d = new Date();
  const pad = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}`;
}
function _fmtBackupStamp(iso){
  if(!iso) return "—";
  const d = new Date(iso);
  if(isNaN(d.getTime())) return "—";
  const pad = n => String(n).padStart(2,"0");
  return `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${(d.getFullYear()+543)%100} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ─── current state snapshot (used by export + backup) ───
function getCurrentSnapshot(opts){
  opts = opts || {};
  const scope = opts.scope || "all";
  const projectList = scope === "mine"
    ? projects.filter(p => nKey(p.assignee) === nKey(myName))
    : projects;
  return {
    schemaVersion: 2,
    toolId: TOOL_ID,
    toolName: TOOL_NAME,
    exportedAt: new Date().toISOString(),
    exportedBy: myName,
    exportScope: scope,
    note: opts.note || "",
    projects: projectList,
    // v31: include big projects (programs) in backups + exports
    programs: programs,
    users: users,
    history: history,
    chatMsgs: chatMsgs,
    levelRewards: levelRewards,
    achvRewards: achvRewards,
    redeemCatalog: redeemCatalog,
  };
}

// Enhanced exportJSON — supports {scope:"all"|"mine"} for partial exports
function exportJSON(opts){
  opts = opts || {};
  const data = getCurrentSnapshot(opts);
  const cleanName = _safeFilename(myName);
  const scopeSuffix = opts.scope === "mine" ? "_เฉพาะของฉัน" : "";
  const fname = `${TOOL_NAME}_${cleanName}${scopeSuffix}_${_nowStamp()}.json`;
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = fname;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 200);
  toast(`📦 บันทึกแล้ว — ${fname}`);
}

// ════════════════════════════════════════════════════════════════
// BACKUP SYSTEM — auto-backup before risky operations + manual snapshots
// ════════════════════════════════════════════════════════════════
function _listBackupKeys(){
  const out = [];
  for(let i = 0; i < localStorage.length; i++){
    const k = localStorage.key(i);
    if(k && k.startsWith(BACKUP_PREFIX)) out.push(k);
  }
  return out.sort().reverse(); // newest first (ISO timestamps sort naturally)
}
function _pruneBackups(){
  const keys = _listBackupKeys();
  if(keys.length > MAX_BACKUPS){
    keys.slice(MAX_BACKUPS).forEach(k => {
      try{ localStorage.removeItem(k); }catch(e){}
    });
  }
}
async function backupNow(source, note){
  source = source || "manual";
  const stamp = new Date().toISOString().replace(/[:.]/g, "-");
  const key = `${BACKUP_PREFIX}${stamp}`;
  const snapshot = getCurrentSnapshot();
  snapshot._backupSource = source;
  snapshot._backupNote = note || "";
  try {
    localStorage.setItem(key, JSON.stringify(snapshot));
    _pruneBackups();
    return { key, ok: true };
  } catch(e) {
    return { key: null, ok: false, error: e.message };
  }
}
function getBackupList(){
  return _listBackupKeys().map(k => {
    try {
      const raw = localStorage.getItem(k);
      if(!raw) return null;
      const parsed = JSON.parse(raw);
      return {
        key: k,
        ts: parsed.exportedAt || "",
        by: parsed.exportedBy || "—",
        source: parsed._backupSource || "auto",
        note: parsed._backupNote || "",
        sizeKb: Math.round(raw.length / 1024),
        projectCount: (parsed.projects || []).length,
      };
    } catch(e) { return null; }
  }).filter(x => x);
}
async function restoreFromBackup(backupKey){
  try {
    const raw = localStorage.getItem(backupKey);
    if(!raw) return { ok: false, error: "ไม่พบ backup" };
    const parsed = JSON.parse(raw);
    // Safety net: backup current state BEFORE restoring (so the restore itself is reversible)
    await backupNow("pre-restore", `ก่อนกู้คืน ${backupKey.slice(0,28)}…`);
    if(Array.isArray(parsed.projects)) projects = parsed.projects;
    if(parsed.users) users = parsed.users;
    if(Array.isArray(parsed.history)) history = parsed.history;
    if(Array.isArray(parsed.chatMsgs)) chatMsgs = parsed.chatMsgs;
    if(parsed.levelRewards) levelRewards = parsed.levelRewards;
    if(parsed.achvRewards) achvRewards = parsed.achvRewards;
    if(parsed.redeemCatalog !== undefined) redeemCatalog = parsed.redeemCatalog;
    migrateProjects();
    // v21: resilient saves — see comment in import flow
    const saveErrors = [];
    try { await saveProjects(); } catch(e){ console.error("saveProjects failed:", e); saveErrors.push("projects"); }
    try { await saveUsers(); }    catch(e){ console.error("saveUsers failed:", e);    saveErrors.push("users"); }
    try { await saveHistory(); }  catch(e){ console.error("saveHistory failed:", e);  saveErrors.push("history"); }
    try { await saveChat(); }     catch(e){ console.error("saveChat failed:", e);     saveErrors.push("chat"); }
    if(saveErrors.length > 0){
      return { ok: true, warning: `บันทึกบางส่วนไม่สำเร็จ: ${saveErrors.join(", ")}` };
    }
    return { ok: true };
  } catch(e) {
    return { ok: false, error: e.message };
  }
}
async function deleteBackup(backupKey){
  try{ localStorage.removeItem(backupKey); return true; }catch(e){ return false; }
}
function getLastImportInfo(){
  try { return JSON.parse(localStorage.getItem(LAST_IMPORT_KEY) || "null"); }
  catch(e) { return null; }
}

// ════════════════════════════════════════════════════════════════
// IMPORT — open file picker, parse, validate, show preview
// ════════════════════════════════════════════════════════════════
function importJSON(){
  const input = document.createElement("input");
  input.type = "file";
  input.accept = "application/json,.json";
  input.onchange = async (e) => {
    const file = e.target.files && e.target.files[0];
    if(!file) return;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      if(typeof parsed !== "object" || parsed === null || parsed.schemaVersion === undefined){
        toast("ไฟล์นี้ไม่ใช่ export จากระบบ");
        return;
      }
      if(parsed.schemaVersion > 2){
        toast("ไฟล์มาจากเวอร์ชันใหม่กว่า — อัพเดทเครื่องมือก่อน");
        return;
      }
      if(parsed.toolId && parsed.toolId !== TOOL_ID){
        const warn = `⚠ ไฟล์นี้มาจากระบบ "${parsed.toolName || parsed.toolId}"\n` +
                     `คุณกำลังอยู่ในระบบ "${TOOL_NAME}"\n\n` +
                     `สมาชิกและรายชื่ออาจไม่ตรงกัน ต้องการดำเนินการต่อ?`;
        if(!confirm(warn)) return;
      }
      const preview = computeMergePreview(parsed);
      preview._fileName = file.name;
      preview._fileSize = Math.round(file.size / 1024);
      preview._parsed = parsed;
      openImportPreviewSheet(preview);
    } catch(err) {
      toast(`อ่านไฟล์ไม่สำเร็จ: ${err.message}`);
    }
  };
  input.click();
}

function computeMergePreview(incoming){
  const localById = {};
  projects.forEach(p => { localById[p.id] = p; });
  const adds = [], updates = [], conflicts = [];
  (incoming.projects || []).forEach(inP => {
    const localP = localById[inP.id];
    if(!localP){ adds.push(inP); return; }
    const localTs = new Date(localP.updatedAt || 0).getTime();
    const inTs = new Date(inP.updatedAt || 0).getTime();
    if(inTs > localTs){
      updates.push({ id: inP.id, title: inP.title || localP.title, local: localP, incoming: inP, winner: "incoming" });
    } else if(inTs < localTs){
      updates.push({ id: inP.id, title: inP.title || localP.title, local: localP, incoming: inP, winner: "local" });
    } else if(JSON.stringify(localP) !== JSON.stringify(inP)){
      conflicts.push({ id: inP.id, title: inP.title || localP.title, local: localP, incoming: inP });
    }
  });
  const localChatIds = new Set(chatMsgs.map(m => m.id));
  const newChats = (incoming.chatMsgs || []).filter(m => m && m.id && !localChatIds.has(m.id));
  const localHistKey = h => h.id || `${h.ts}|${h.type}|${h.title}`;
  const localHistIds = new Set(history.map(localHistKey));
  const newHistory = (incoming.history || []).filter(h => h && !localHistIds.has(localHistKey(h)));
  const incomingUsers = incoming.users || {};
  const userUpdates = [];
  Object.keys(incomingUsers).forEach(k => {
    const inU = incomingUsers[k];
    const localU = users[k];
    if(!localU){ userUpdates.push({ key: k, name: inU.name, type: "new" }); return; }
    const inXp = inU.xp || 0, localXp = localU.xp || 0;
    const inCoins = inU.coins || 0, localCoins = localU.coins || 0;
    const inAch = new Set(inU.achievements || []);
    const localAch = new Set(localU.achievements || []);
    let achDiff = 0; inAch.forEach(a => { if(!localAch.has(a)) achDiff++; });
    if(inXp > localXp || inCoins > localCoins || achDiff > 0){
      userUpdates.push({ key: k, name: inU.name, type: "update",
        xpDiff: Math.max(0, inXp - localXp), coinDiff: Math.max(0, inCoins - localCoins), achDiff });
    }
  });
  return {
    meta: {
      from: incoming.exportedBy || "—",
      at: incoming.exportedAt || "",
      scope: incoming.exportScope || "all",
      toolName: incoming.toolName || incoming.toolId || "—",
      note: incoming.note || "",
    },
    adds, updates, conflicts, newChats, newHistory, userUpdates,
    schemaOk: true,
  };
}

// ════════════════════════════════════════════════════════════════
// APPLY IMPORT — commits changes per chosen mode + decisions
// ════════════════════════════════════════════════════════════════
async function applyImport(preview, state){
  if(state.backup){
    await backupNow("pre-import", `ก่อน import จาก ${preview.meta.from}`);
  }
  const inc = preview._parsed;

  if(state.mode === "replace"){
    if(Array.isArray(inc.projects)) projects = inc.projects;
    if(inc.users) users = inc.users;
    // chats + history are union-only (we never silently drop history)
    const cMap = {};
    chatMsgs.forEach(m => { if(m && m.id) cMap[m.id] = m; });
    (inc.chatMsgs || []).forEach(m => { if(m && m.id) cMap[m.id] = m; });
    chatMsgs = Object.values(cMap).sort((a,b) => new Date(a.ts||0) - new Date(b.ts||0));
    const hKey = h => h.id || `${h.ts}|${h.type}|${h.title}`;
    const hMap = {};
    history.forEach(h => { hMap[hKey(h)] = h; });
    (inc.history || []).forEach(h => { hMap[hKey(h)] = h; });
    history = Object.values(hMap).sort((a,b) => new Date(b.ts||0) - new Date(a.ts||0));
    if(inc.levelRewards) levelRewards = inc.levelRewards;
    if(inc.achvRewards) achvRewards = inc.achvRewards;
    if(inc.redeemCatalog !== undefined) redeemCatalog = inc.redeemCatalog;
  } else {
    // Smart merge mode
    const byId = {};
    projects.forEach(p => byId[p.id] = p);
    preview.adds.forEach(p => { byId[p.id] = p; });
    preview.updates.forEach(u => { if(u.winner === "incoming") byId[u.id] = u.incoming; });
    preview.conflicts.forEach(c => {
      const d = state.conflictChoices[c.id] || "mine";
      if(d === "theirs") byId[c.id] = c.incoming;
    });
    projects = Object.values(byId);

    // Users — additive merge (max for stats, union for achievements). Never silently sum coins.
    const incomingUsers = inc.users || {};
    Object.keys(incomingUsers).forEach(k => {
      const inU = incomingUsers[k];
      if(!users[k]){ users[k] = inU; return; }
      const u = users[k];
      u.xp = Math.max(u.xp || 0, inU.xp || 0);
      u.coins = Math.max(u.coins || 0, inU.coins || 0);
      u.streak = Math.max(u.streak || 0, inU.streak || 0);
      const allAch = new Set([...(u.achievements || []), ...(inU.achievements || [])]);
      u.achievements = [...allAch];
      if(inU.stats){
        u.stats = u.stats || {};
        Object.keys(inU.stats).forEach(sk => {
          u.stats[sk] = Math.max(u.stats[sk] || 0, inU.stats[sk] || 0);
        });
      }
    });

    // Chats + history union (same as replace)
    const cMap = {};
    chatMsgs.forEach(m => { if(m && m.id) cMap[m.id] = m; });
    preview.newChats.forEach(m => { if(m && m.id) cMap[m.id] = m; });
    chatMsgs = Object.values(cMap).sort((a,b) => new Date(a.ts||0) - new Date(b.ts||0));
    const hKey = h => h.id || `${h.ts}|${h.type}|${h.title}`;
    const hMap = {};
    history.forEach(h => { hMap[hKey(h)] = h; });
    preview.newHistory.forEach(h => { hMap[hKey(h)] = h; });
    history = Object.values(hMap).sort((a,b) => new Date(b.ts||0) - new Date(a.ts||0));

    if(inc.levelRewards) levelRewards = inc.levelRewards;
    if(inc.achvRewards) achvRewards = inc.achvRewards;
    if(inc.redeemCatalog !== undefined) redeemCatalog = inc.redeemCatalog;
  }

  migrateProjects();
  // v21: Make each save resilient — partial failure must not skip later saves
  // (a previous bug where saveHistory threw caused saveChat to never run,
  //  leaving chat in localStorage stale → user's incoming messages "disappeared")
  const saveErrors = [];
  try { await saveProjects(); } catch(e){ console.error("saveProjects failed:", e); saveErrors.push("projects"); }
  try { await saveUsers(); }    catch(e){ console.error("saveUsers failed:", e);    saveErrors.push("users"); }
  try { await saveHistory(); }  catch(e){ console.error("saveHistory failed:", e);  saveErrors.push("history"); }
  try { await saveChat(); }     catch(e){ console.error("saveChat failed:", e);     saveErrors.push("chat"); }
  if(saveErrors.length > 0){
    toast(`⚠ บันทึกบางส่วนไม่สำเร็จ: ${saveErrors.join(", ")} — โปรด Export สำรองข้อมูลทันที`);
  }

  // Remember last import (shown in banner)
  try {
    localStorage.setItem(LAST_IMPORT_KEY, JSON.stringify({
      from: preview.meta.from,
      at: preview.meta.at,
      importedAt: new Date().toISOString(),
      mode: state.mode,
      counts: {
        added: preview.adds.length,
        updated: preview.updates.length,
        conflicts: preview.conflicts.length,
      },
    }));
  } catch(e) {}

  toast(`📥 นำเข้าสำเร็จจาก ${preview.meta.from}`);
}

            <div class="rc-row-top">

              <span class="rc-source ${b.source==='manual'?'manual':b.source==='pre-import'?'imp':b.source==='pre-restore'?'res':''}">${
                b.source==='manual'?'manual':
                b.source==='pre-import'?'ก่อน import':
                b.source==='pre-restore'?'ก่อนกู้คืน':

            <div class="rc-row-meta">${b.projectCount} โปรเจค · บันทึกโดย ${esc(b.by)}${b.note ? ` · ${esc(b.note)}` : ""}</div>

              <button class="rc-btn del" data-rc-del="${b.key}">🗑 ลบ</button>
            </div>
          </div>
        `).join("")}
      <div style="height:14px"></div>

      const note = prompt("จดโน้ตสำหรับ backup ครั้งนี้ (เว้นว่างได้):") || "";
      if(note === null) return;
      const r = await backupNow("manual", note);
      if(r.ok) { toast("✓ Backup เรียบร้อย"); rerender(); }
      else toast(`Backup ล้มเหลว: ${r.error}`);
    };
    sheet.querySelectorAll("[data-rc-restore]").forEach(b => {
      b.onclick = async () => {
        if(!confirm("กู้คืนข้อมูลเป็น snapshot นี้?\n\nสถานะปัจจุบันจะถูก backup ไว้ก่อนอัตโนมัติ\nกู้คืนซ้ำได้ทุกเมื่อ")) return;
        const r = await restoreFromBackup(b.dataset.rcRestore);
        if(r.ok){ closeSheet(); render(); toast("✓ กู้คืนเรียบร้อย"); }
        else toast(`กู้คืนล้มเหลว: ${r.error}`);
      };
    });
    sheet.querySelectorAll("[data-rc-del]").forEach(b => {
      b.onclick = async () => {
        if(!confirm("ลบ backup นี้ถาวร? ไม่สามารถกู้คืนได้")) return;
        await deleteBackup(b.dataset.rcDel);
        rerender();
      };
    });
  }
  sheetShell(`<div></div>`);
  rerender();
}

function closeSheet(){
  const overlays=document.querySelectorAll(".overlay");
  if(overlays.length===0) return;
  const o = overlays[overlays.length-1];
  const sh=o.querySelector(".sheet");
  if(sh) sh.style.animation="sheetUp .28s cubic-bezier(.4,0,1,1) reverse";
  o.style.animation="fadeIn .28s ease reverse";
  setTimeout(()=>{ if(o.parentNode) o.remove(); },250);
}
function sheetShell(inner, extraClass){
  const o=document.createElement("div");
  o.className="overlay"+((extraClass||"").includes("sheet-detail")?" detail-overlay":"");
  o.innerHTML=`<div class="sheet ${extraClass||""}"><div class="grabber"></div>${inner}</div>`;
  o.addEventListener("click",e=>{ if(e.target===o) closeSheet(); });
  document.body.appendChild(o);
  return o;
}

function wireAvatarUpload(onResize){
  const file=$("#avFile"), pick=$("#avPick");
  pick.onclick=(e)=>{ if(e.target.tagName!=="INPUT") file.click(); };
  file.onchange=async()=>{
    const f=file.files[0]; if(!f) return;
    if(f.size > 8*1024*1024){ toast("❌ ไฟล์ใหญ่เกินไป (สูงสุด 8MB)"); return; }
    try{
      const data=await resizeImage(f,144,.72);
      pick.innerHTML=`<span class="cam">📷</span><input type="file" accept="image/*" id="avFile" hidden/>`;
      const img=document.createElement("img"); img.src=data;
      pick.insertBefore(img,pick.firstChild);
      wireAvatarUpload(onResize);
      onResize(data);
    } catch(e){ toast("❌ โหลดรูปไม่สำเร็จ"); }
  };
}

// DATE PICKER — uses element refs in topmost sheet
function openDatePicker(currentValue, onPick, opts){
  opts = opts || {};
  const withTime = !!opts.withTime;       // show a time field under the calendar
  let timeValue = opts.time || "";        // "HH:MM" or ""
  let viewYear, viewMonth;
  let selected = currentValue || null;
  const today = new Date();
  const todayISO = today.toISOString().slice(0,10);

  if(selected){
    const d=new Date(selected);
    viewYear=d.getFullYear(); viewMonth=d.getMonth();
  } else {
    viewYear=today.getFullYear(); viewMonth=today.getMonth();
  }

  const overlay = sheetShell(`<div></div>`);
  const sheet = overlay.querySelector(".sheet");

  function rerender(){
    const first = new Date(viewYear, viewMonth, 1);
    const startOffset = first.getDay();
    const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
    const prevDays = new Date(viewYear, viewMonth, 0).getDate();
    const selISO = selected ? new Date(selected).toISOString().slice(0,10) : null;

    let cells=[];
    for(let i=startOffset-1;i>=0;i--) cells.push({day:prevDays-i,current:false});
    for(let d=1;d<=daysInMonth;d++){
      const iso=`${viewYear}-${String(viewMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      cells.push({day:d,current:true,iso,isToday:iso===todayISO,isSel:iso===selISO});
    }
    while(cells.length<42){
      const d=cells.length-startOffset-daysInMonth+1;
      cells.push({day:d,current:false});
    }

    sheet.innerHTML=`
      <div class="grabber"></div>
      <div class="sheet-head">
        <h2>เลือกวันที่</h2>
        <button class="sheet-close" id="dpClose">✕</button>
      </div>
      <div class="cal-head">
        <button class="cal-nav" id="dpPrev">‹</button>
        <div class="cal-month">${MONTHS_TH[viewMonth]} ${viewYear+543}</div>
        <button class="cal-nav" id="dpNext">›</button>
      </div>
      <div class="cal-card">
        <div class="cal-day-labels">
          ${DAYS_TH.map(d=>`<div class="cal-day-label">${d}</div>`).join("")}
        </div>
        <div class="cal-grid">
          ${cells.map((c,idx)=>{
            if(!c.current) return `<div class="cal-cell other">${c.day}</div>`;
            const dow = idx % 7;
            const isWeekend = (dow===0||dow===6);
            const hol = holidayName(viewYear, viewMonth, c.day);
            let cls=""; if(c.isToday)cls+=" today"; if(c.isSel)cls+=" selected";
            if(isWeekend||hol) cls+=" cal-off";
            return `<div class="cal-cell${cls}" data-iso="${c.iso}" ${hol?`title="${esc(hol)}"`:""}>${c.day}</div>`;
          }).join("")}
        </div>
      </div>
      <div style="display:flex;justify-content:center;gap:14px;font-size:11px;color:var(--label3);margin:2px 0 8px">
        <span style="display:flex;align-items:center;gap:4px"><i style="width:10px;height:10px;border-radius:3px;background:rgba(220,38,38,.14);display:inline-block"></i> เสาร์-อาทิตย์ / วันหยุดบริษัท</span>
      </div>
      ${selected?`<div style="text-align:center;font-size:14px;color:var(--label2);font-weight:600;margin-bottom:10px">เลือก: <span style="color:var(--blue);font-weight:800">${fmtDateFull(selected)}</span></div>`:`<div style="text-align:center;font-size:13px;color:var(--label3);font-weight:500;margin-bottom:10px">ยังไม่ได้เลือกวันที่</div>`}
      ${withTime?(()=>{
        const [hh,mm] = (timeValue||"").split(":");
        const hOpts = Array.from({length:24},(_,i)=>{const v=String(i).padStart(2,"0");return `<option value="${v}" ${v===hh?"selected":""}>${v}</option>`;}).join("");
        const mOpts = Array.from({length:12},(_,i)=>{const v=String(i*5).padStart(2,"0");return `<option value="${v}" ${v===mm?"selected":""}>${v}</option>`;}).join("");
        return `
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin:2px 0 12px">
        <span style="font-size:14px;font-weight:600;color:var(--label2)">${esc(opts.timeLabel||"เวลา")}</span>
        <select id="dpTimeH" class="dp-time-sel">${hOpts}</select>
        <span style="font-weight:800;color:var(--label2)">:</span>
        <select id="dpTimeM" class="dp-time-sel">${mOpts}</select>
        ${timeValue?`<button class="cal-btn" id="dpTimeClear" style="padding:6px 10px;font-size:12px">ล้าง</button>`:""}
      </div>`;})():""}
      <div class="cal-actions">
        <button class="cal-btn danger" id="dpClear">ล้าง</button>
        <button class="cal-btn" id="dpToday">📍 วันนี้</button>
        <button class="cal-btn primary" id="dpDone">ตกลง</button>
      </div>
      <div style="height:6px"></div>
    `;

    sheet.querySelector("#dpClose").onclick=()=>{ closeSheet(); };
    sheet.querySelector("#dpPrev").onclick=()=>{ viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} rerender(); };
    sheet.querySelector("#dpNext").onclick=()=>{ viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} rerender(); };
    sheet.querySelectorAll("[data-iso]").forEach(c=>{
      c.onclick=()=>{ selected = c.dataset.iso; rerender(); };
    });
    sheet.querySelector("#dpClear").onclick=()=>{ selected=null; rerender(); };
    if(withTime){
      const hEl = sheet.querySelector("#dpTimeH");
      const mEl = sheet.querySelector("#dpTimeM");
      const readTime = ()=>{ if(hEl && mEl) timeValue = `${hEl.value}:${mEl.value}`; };
      if(hEl) hEl.onchange = readTime;
      if(mEl) mEl.onchange = readTime;
      const tClr = sheet.querySelector("#dpTimeClear");
      if(tClr) tClr.onclick=()=>{ timeValue=""; rerender(); };
    }
    sheet.querySelector("#dpToday").onclick=()=>{
      selected = todayISO;
      viewYear=today.getFullYear(); viewMonth=today.getMonth();
      rerender();
    };
    sheet.querySelector("#dpDone").onclick=()=>{
      if(withTime){ const h=sheet.querySelector("#dpTimeH"),m=sheet.querySelector("#dpTimeM"); if(h&&m) timeValue=`${h.value}:${m.value}`; }
      const val = selected;
      closeSheet();
      if(withTime) onPick(val, timeValue);
      else onPick(val);
    };
  }
  rerender();
}

// ADD SHEET — uses CLOSURE STATE so date picker won't lose form values
function openAddSheet(defaultStatus){
  const state = {
    selColor: CARD_COLORS[6],
    selDue: "",
    selStatus: defaultStatus || "backlog",
    selPrio: "medium",
    selAssignee: myName,
  };

  sheetShell(`
    <div class="sheet-head">
      <h2>โปรเจคใหม่</h2>
      <button class="sheet-close" id="aClose">✕</button>
    </div>
    <div class="group-label">ชื่อโปรเจค</div>
    <div class="group"><div class="row"><input class="ios-input" id="fTitle" placeholder="เช่น CDR Dashboard v3"/></div></div>
    <div class="group-label">รายละเอียด</div>
    <div class="group"><textarea class="ios-textarea" id="fDesc" placeholder="อธิบายโปรเจคสั้นๆ..."></textarea></div>
    <div class="group-label">ข้อมูล</div>
    <div class="group">
      <div class="row">
        <span class="key">สถานะ</span>
        <select class="ios-select" id="fStatus">
          ${COLUMNS.map(c=>`<option value="${c.id}" ${c.id===state.selStatus?"selected":""}>${c.emoji} ${c.label}</option>`).join("")}
        </select>
      </div>
      <div class="row">
        <span class="key">ความสำคัญ</span>
        <select class="ios-select" id="fPrio">
          ${PRIORITIES.map(p=>`<option value="${p.id}" ${p.id===state.selPrio?"selected":""}>${p.label}</option>`).join("")}
        </select>
      </div>
      <div class="row">
        <span class="key">ผู้รับผิดชอบ ${!meIsAdmin()?'<span style="font-size:10px;color:var(--label3);font-weight:600">· ล็อก</span>':''}</span>
        <select class="ios-select" id="fAssignee" ${!meIsAdmin()?'disabled title="เฉพาะหัวหน้ามอบหมายงานได้"':''}>
          ${(!meIsAdmin()
            ? `<option value="${esc(myName)}" selected>${esc(myName)}</option>`
            : sortTeam(Object.values(users)).map(u=>`<option value="${esc(u.name)}" ${nKey(u.name)===nKey(state.selAssignee)?"selected":""}>${esc(u.name)}</option>`).join(""))}
        </select>
      </div>
      <div class="row clickable" id="fDueRow">
        <span class="key">กำหนดส่ง</span>
        <span class="val" id="fDueVal">แตะเพื่อเลือก ›</span>
      </div>
    </div>
    <div class="group-label">งบประมาณ (บาท)</div>
    <div class="group">
      <div class="row">
        <span class="key">งบ</span>
        <input class="ios-num" id="fBudget" type="number" min="0" placeholder="0"/>
      </div>
      <div class="row">
        <span class="key">ใช้ไปแล้ว</span>
        <input class="ios-num" id="fSpent" type="number" min="0" placeholder="0"/>
      </div>
    </div>
    <div class="group-label">สีประจำโปรเจค</div>
    <div class="group">
      <div class="color-grid" id="fColors">
        ${CARD_COLORS.map(c=>`<div class="color-dot ${c===state.selColor?"sel":""}" data-color="${c}" style="background:${c};color:${c}"></div>`).join("")}
      </div>
    </div>
    <button class="btn-primary" id="fSubmit">เพิ่มโปรเจค</button>
    <div style="height:8px"></div>
  `);

  $("#aClose").onclick=closeSheet;
  $("#fTitle").focus();
  $("#fStatus").onchange=e=>state.selStatus=e.target.value;
  $("#fPrio").onchange=e=>state.selPrio=e.target.value;
  $("#fAssignee").onchange=e=>state.selAssignee=e.target.value;
  $("#fDueRow").onclick=()=>{
    openDatePicker(state.selDue, (date)=>{
      state.selDue = date || "";
      // Update ONLY the value cell — never rebuild the whole form
      const v = $("#fDueVal");
      if(v) {
        v.textContent = state.selDue ? fmtDateFull(state.selDue) : "แตะเพื่อเลือก ›";
        if (state.selDue) v.classList.add("set"); else v.classList.remove("set");
      }
    });
  };
  $("#fColors").querySelectorAll(".color-dot").forEach(d=>{
    d.onclick=()=>{
      $("#fColors").querySelectorAll(".color-dot").forEach(x=>x.classList.remove("sel"));
      d.classList.add("sel"); state.selColor=d.dataset.color;
    };
  });
  const submit=async()=>{
    const title=$("#fTitle").value.trim();
    if(!title){ toast("กรุณาใส่ชื่อโปรเจค"); $("#fTitle").focus(); return; }
    projects.push({
      id:genId(), title,
      description:$("#fDesc").value.trim(),
      status:state.selStatus, priority:state.selPrio, assignee:state.selAssignee,
      dueDate:state.selDue, color:state.selColor,
      budget:Number($("#fBudget").value)||0,
      spent:Number($("#fSpent").value)||0,
      createdBy:myName,
      createdAt:new Date().toISOString(),
      updatedAt:new Date().toISOString(),
      tasks:[], notes:[],
    });
    await saveProjects(); closeSheet(); render();
    toast("เพิ่มโปรเจคแล้ว");
  };
  $("#fSubmit").onclick=submit;
  $("#fTitle").onkeydown=e=>{ if(e.key==="Enter") submit(); };
}

function openDetailSheet(id, jumpToEdit, inlineHost){
  let tab="tasks", editMode=!!jumpToEdit;
  const inline = !!inlineHost;
  // editState lives in closure
  const editState = { dueDate: "" };
  if(editMode){ tab="details"; }

  function rerender(){
    const p=projects.find(x=>x.id===id);
    if(!p){ closeSheet(); return; }
    const col=colObj(p.status);
    const accent=p.color||col.color;
    const done=(p.tasks||[]).filter(t=>t.done).length;
    const total=(p.tasks||[]).length;
    // v46: Ownership lock — only the CREATOR of a task can edit its details
    //      (title, priority, due date). Admin keeps an override so the team lead can
    //      still manage/reassign. Everyone else sees the fields locked.
    const _lock = !meIsAdmin() && nKey(p.createdBy)!==nKey(myName);

    let body="";
    if(tab==="tasks"){
      body=`
        <div class="inline-add">
          <input class="ios-input" id="newTask" placeholder="พิมพ์งานย่อยแล้วกด Enter..."/>
          <button class="inline-add-btn" id="addTask">เพิ่ม</button>
        </div>
        <div style="padding:0 8px 8px;font-size:11px;color:var(--label2);font-weight:500">
          ทำ task เสร็จได้ ${COIN_TASK} แต้มทุกชิ้น
        </div>
        <div class="group" style="margin-bottom:12px">
          ${total===0?`<div class="empty-hint">ยังไม่มีงานย่อย — เพิ่มด้านบนได้เลย</div>`:
            p.tasks.map(t=>`
              <div class="list-item">
                <div class="check ${t.done?"on":""}" data-task="${t.id}">${t.done?icon("check",13):""}</div>
                <span class="task-text ${t.done?"done":""}">${esc(t.title)}</span>
                ${avatarHTML(t.assignee,22)}
                <button class="mini-del" data-deltask="${t.id}">✕</button>
              </div>`).join("")}
        </div>
        ${total>0?`
          <div class="group" style="padding:14px">
            <div style="display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--label2);margin-bottom:5px">
              <span>ความคืบหน้า</span><span style="color:var(--label)">${Math.round((done/total)*100)}%</span>
            </div>
            <div class="tl-progress-bar"><div class="tl-progress-fill" style="width:${(done/total)*100}%;background:${accent}"></div></div>
            ${done===total && total>0 && p.status!=="done"?`
              <div style="margin-top:10px;text-align:center;padding:8px;background:rgba(255,184,0,.12);border-radius:10px;font-size:13px;font-weight:700;color:#B87900">
                🎁 ทุก task เสร็จแล้ว! ย้ายไป "เสร็จแล้ว" เพื่อรับของขวัญ
              </div>`:""}
          </div>`:""}
      `;
    } else if(tab==="files"){
      const files = p.attachments||[];
      body=`
        <div class="file-upload-zone" id="fileDrop">
          <input type="file" id="fileInput" hidden accept=".pdf,.xlsx,.xls,.csv,.doc,.docx,.png,.jpg,.jpeg,.gif"/>
          <div class="fu-icon">${icon("file",20)}</div>
          <div class="fu-text">แตะเพื่อเลือกไฟล์</div>
          <div class="fu-hint">PDF, Excel, Word, รูปภาพ — สูงสุด ${fmtFileSize(MAX_FILE_SIZE)}</div>
        </div>
        <div class="group" style="margin-top:12px">
          ${files.length===0?`<div class="empty-hint">ยังไม่มีไฟล์แนบ — อัปโหลดใบเสนอราคา/เอกสารได้ที่นี่</div>`:
            files.map(f=>`
              <div class="file-row">
                <div class="file-icon ${fileIconClass(f.type)}">${fileIconEmoji(f.type)}</div>
                <div class="file-info">
                  <div class="file-name">${esc(f.name)}</div>
                  <div class="file-meta">${fmtFileSize(f.size)} · ${esc(f.uploadedBy)} · ${relTime(f.uploadedAt)}</div>
                </div>
                <div class="file-actions">
                  <button class="file-btn dl" data-dlfile="${f.id}" title="ดาวน์โหลด">⬇️</button>
                  <button class="file-btn del" data-delfile="${f.id}" title="ลบ">${icon("cancel",13)}</button>
                </div>
              </div>`).join("")}
        </div>

    } else if(tab==="notes"){

        <div class="inline-add" style="align-items:stretch">

            [...p.notes].reverse().map(n=>`

              </select>
            </div>

              <span class="key">บันทึกเอง (override)</span>

              <span class="val" style="font-weight:700">${fmtHours(effectiveHours(p))}</span>

              // v31: show linked program name (if any) in detail view

              return `<div class="row"><span class="key">โปรเจกต์</span><span class="val" style="display:flex;align-items:center;gap:6px;justify-content:flex-end"><span style="width:8px;height:8px;border-radius:50%;background:${prog.color||'#21409a'};flex-shrink:0"></span><span style="color:var(--label);font-weight:600">${esc(prog.name||"(ไม่มีชื่อ)")}</span></span></div>`;
            })()}
            <div class="row"><span class="key">กำหนดส่ง</span><span class="val">${p.dueDate?fmtDateFull(p.dueDate):"—"}</span></div>
            <div class="row"><span class="key">วันที่เสร็จจริง</span><span class="val" style="color:${p.actualDate?'#16A34A':'var(--label2)'};font-weight:${p.actualDate?'700':'400'}">${p.actualDate?fmtDateFull(p.actualDate):"— ยังไม่เสร็จ"}</span></div>
            <div class="row"><span class="key">ชั่วโมงทำงาน</span><span class="val" style="font-weight:700;color:${effectiveHours(p)!==null?'var(--accent)':'var(--label3)'}">${fmtHours(effectiveHours(p))}${typeof p.manualHours==='number'&&p.manualHours>0?' <span style="font-size:10px;color:var(--label3);font-weight:600">(บันทึกเอง)</span>':p.startedAt&&p.completedAt?' <span style="font-size:10px;color:var(--label3);font-weight:600">(อัตโนมัติ)</span>':''}</span></div>
            <div class="row"><span class="key">สร้างโดย</span><span class="val">${esc(p.createdBy)||"—"}</span></div>
            <div class="row"><span class="key">อัปเดตล่าสุด</span><span class="val">${relTime(p.updatedAt)}</span></div>
          </div>
          ${budget>0?`
            <div class="group-label">งบประมาณ</div>
            <div class="group">
              <div class="row"><span class="key">งบ</span><span class="val" style="color:var(--label);font-weight:700">${fmtMoney(budget)}</span></div>
              <div class="row"><span class="key">ใช้ไป</span><span class="val" style="color:var(--orange);font-weight:700">${fmtMoney(spent)}</span></div>
              <div class="row"><span class="key">คงเหลือ</span><span class="val" style="color:${budget-spent<0?'var(--red)':'var(--green)'};font-weight:800">${fmtMoney(budget-spent)}</span></div>
            </div>
          `:""}
          ${p.description?`<div class="group-label">รายละเอียด / หมายเหตุ</div><div class="group"><div style="padding:14px;font-size:15px;line-height:1.5;color:var(--label)">${esc(p.description)}</div></div>`:""}
          ${p.cancelled?`
            <div class="group" style="padding:14px;text-align:center;background:rgba(255,149,0,.08)">
              <div style="font-size:13px;font-weight:700;color:var(--warn)">งานนี้ถูกยกเลิก</div>
              <div style="font-size:12px;color:var(--label2);margin-top:3px">โดย ${esc(p.cancelledBy||"—")} · ${p.cancelledAt?relTime(p.cancelledAt):""}</div>
              ${p.cancelReason?`<div style="font-size:12px;color:var(--label);margin-top:8px;background:var(--card);padding:8px 11px;border-radius:8px;text-align:left">เหตุผล: ${esc(p.cancelReason)}</div>`:""}
            </div>
            <div style="height:10px"></div>
            ${(meIsAdmin()||nKey(p.createdBy)===nKey(myName))
              ? `<button class="btn-secondary" id="dRestore" style="color:#15803D">↩︎ กู้คืนงานนี้</button><div style="height:8px"></div>`
              : `<div style="text-align:center;font-size:12px;color:var(--label3);padding:8px">🔒 เฉพาะคนสร้างงานหรือหัวหน้าทีมเท่านั้นที่กู้คืนได้</div>`}
          `:`
            <button class="btn-secondary" id="dChat">💬 คุยเรื่องงานนี้${(()=>{const n=unreadInScope(p.id);return n>0?` <span class="chat-scope-badge">${n>99?"99+":n}</span>`:"";})()}</button>
            <div style="height:8px"></div>
            ${(meIsAdmin()||nKey(p.createdBy)===nKey(myName))
              ? `<button class="btn-secondary" id="dEdit">✏️ แก้ไขงาน</button>
                 <div style="height:8px"></div>
                 <button class="btn-danger-text" id="dCancel">ยกเลิกงาน (ต้องใส่เหตุผล)</button><div style="height:8px"></div>`
              : `<div style="text-align:center;font-size:12px;color:var(--label3);padding:10px;background:rgba(120,120,128,.08);border-radius:10px">🔒 เฉพาะผู้สร้างงาน (${esc(p.createdBy||"—")}) หรือหัวหน้าทีมเท่านั้นที่แก้ไข/ยกเลิกได้<br><span style="font-size:11px">คุณยังเปลี่ยนสถานะและทำงานย่อยได้ตามปกติ</span></div>`}
          `}
        `;
      }
    }

    let sheet;
    if(inline){
      sheet = inlineHost;
    } else {
      const overlay = document.querySelectorAll(".overlay");
      sheet = overlay[overlay.length-1].querySelector(".sheet");
    }
    sheet.innerHTML=`
      ${inline?"":'<div class="grabber"></div>'}
      <div class="sheet-head">
        <div style="display:flex;align-items:center;gap:10px;flex:1">
          <div class="tl-proj-dot" style="background:${accent};width:26px;height:26px"></div>
          <h2 style="font-size:19px">${esc(p.title)}</h2>
        </div>
        <button class="sheet-close" id="dClose">✕</button>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin:0 0 16px">
        ${statusPill(p.status)} ${prioPill(p.priority)}
      </div>
      <div class="group-label">ย้ายไปที่</div>
      <div class="move-grid" style="margin-bottom:16px">
        ${COLUMNS.filter(c=>c.id!==p.status).map(c=>`
          <button class="move-chip" data-move="${c.id}"><span class="d" style="background:${c.color}"></span>${c.label}</button>
        `).join("")}
      </div>
      <div class="segmented">
        <button class="seg ${tab==="tasks"?"active":""}" data-tab="tasks">งานย่อย${total>0?` ${done}/${total}`:""}</button>
        <button class="seg ${tab==="files"?"active":""}" data-tab="files">ไฟล์${(p.attachments||[]).length>0?` ${p.attachments.length}`:""}</button>
        <button class="seg ${tab==="notes"?"active":""}" data-tab="notes">บันทึก${(p.notes||[]).length>0?` ${p.notes.length}`:""}</button>
        <button class="seg ${tab==="details"?"active":""}" data-tab="details">ข้อมูล</button>
      </div>
      ${body}
    `;
    wireDetail(id);
  }

  function wireDetail(id){
    const p=projects.find(x=>x.id===id);
    const closeThis = ()=>{ if(inline){ closeInlineDetail(); } else { closeSheet(); } };
    $("#dClose").onclick=closeThis;
    document.querySelectorAll("[data-tab]").forEach(b=>{
      b.onclick=()=>{ tab=b.dataset.tab; editMode=false; editState.dueDate=""; rerender(); };
    });
    document.querySelectorAll("[data-move]").forEach(b=>{
      b.onclick=async()=>{
        const prev=p.status;
        const wasNotDone=p.status!=="done";
        applyStatusTransition(p, b.dataset.move, myName);
        if(p.status==="done" && !p.actualDate){ p.actualDate=todayDate(); }
        await saveProjects();
        if(p.status==="done"&&wasNotDone){
          if(!p.xpGranted){
            // v30: First-time completion → grant XP, then lock the flag forever
            await addLog("done", p.title||"(ไม่มีชื่อ)", `ความสำคัญ ${prioObj(p.priority).label}`);
            await completeProject(p);
            p.xpGranted = true;
            await saveProjects();
          } else {
            // v30: Reopened-then-reclosed → log only, no XP (anti-exploit)
            await addLog("status", p.title||"(ไม่มีชื่อ)", `${colObj(prev).label} → ${colObj(p.status).label} (ปิดงานซ้ำ — ไม่มอบ XP)`);
            toast("งานนี้เคยปิดและรับ XP ไปแล้ว — ปิดซ้ำไม่ได้รับ XP เพิ่ม");
          }
        } else if(prev!==p.status){
          await addLog("status", p.title||"(ไม่มีชื่อ)", `${colObj(prev).label} → ${colObj(p.status).label}`);
        }
        rerender(); render();
      };
    });

    if(tab==="tasks"){
      const add=async()=>{
        const v=$("#newTask").value.trim(); if(!v) return;
        p.tasks=p.tasks||[];
        p.tasks.push({id:genId(),title:v,done:false,assignee:myName,createdAt:new Date().toISOString()});
        p.updatedAt=new Date().toISOString();
        await saveProjects();
        $("#newTask").value="";
        rerender(); render();
      };
      $("#addTask").onclick=add;
      $("#newTask").onkeydown=e=>{ if(e.key==="Enter") add(); };
      document.querySelectorAll("[data-task]").forEach(c=>{
        c.onclick=async()=>{
          const t=p.tasks.find(t=>t.id===c.dataset.task);
          const wasDone=t.done;
          t.done=!t.done;
          p.updatedAt=new Date().toISOString();
          await saveProjects();
          if(!wasDone && t.done && !t.xpGranted){
            // v16: Distribute XP — primary (assignee) gets full, collabs get half
            // v30: Anti-exploit — only grant XP the FIRST time this subtask is checked.
            //      Unchecking and re-checking will not award XP again.
            const combo = awardProjectCoins(p, COIN_TASK, "task");
            t.xpGranted = true;
            await saveUsers();
            await saveProjects(); // persist the xpGranted flag
            await addLog("task", p.title||"(ไม่มีชื่อ)", `งานย่อย: ${t.title}`);
            // Compute MY share for visual feedback (floatCoins, toast, achievement popup)
            let myShare = 0, myResult = null;
            if(nKey(myName) === nKey(p.assignee)){
              myShare = combo.primaryAmount || 0;
              myResult = combo.primary;
            } else {
              const mc = (combo.collabs||[]).find(c => nKey(c.name) === nKey(myName));
              if(mc){ myShare = mc.amount; myResult = mc.result; }
            }
            if(myShare > 0){
              const rect=c.getBoundingClientRect();
              floatCoins(rect.left+rect.width/2, rect.top, myShare);
              const enc = ENCOURAGEMENTS[Math.floor(Math.random()*ENCOURAGEMENTS.length)];
              toast(`${enc} +${myShare} แต้ม`);
              if(myResult){
                myResult.newAchievements.forEach(a=>showAchievementUnlock(a));
                if(myResult.leveledUp) setTimeout(()=>showLevelUp(myResult.newLevel),900);
              }
            } else {
              // Admin or non-participant clicked — quiet confirmation
              toast(`บันทึก ✓ ทีมได้รับแต้ม`);
            }
          }
          rerender(); render();
        };
      });
      document.querySelectorAll("[data-deltask]").forEach(b=>{
        b.onclick=async()=>{
          p.tasks=p.tasks.filter(t=>t.id!==b.dataset.deltask);
          p.updatedAt=new Date().toISOString();
          await saveProjects(); rerender(); render();
        };
      });
    }
    if(tab==="files"){
      const fileInput=$("#fileInput"), drop=$("#fileDrop");
      if(drop){
        drop.onclick=(e)=>{ if(e.target.tagName!=="INPUT") fileInput.click(); };
      }
      if(fileInput){
        fileInput.onchange=async()=>{
          const f=fileInput.files[0]; if(!f) return;
          if(f.size>MAX_FILE_SIZE){ toast(`❌ ไฟล์ใหญ่เกิน ${fmtFileSize(MAX_FILE_SIZE)}`); fileInput.value=""; return; }
          toast(`⏳ กำลังอัปโหลด ${f.name}...`);
          try{
            const dataUrl = await fileToBase64(f);
            const attId = genId();
            const payload = { id:attId, name:f.name, type:f.type||"application/octet-stream", size:f.size, data:dataUrl, uploadedBy:myName, uploadedAt:new Date().toISOString() };
            const ok = await saveAttachment(attId, payload);
            if(!ok){ toast("❌ บันทึกไฟล์ไม่สำเร็จ"); return; }
            p.attachments = p.attachments||[];
            p.attachments.push({ id:attId, name:f.name, type:f.type||"application/octet-stream", size:f.size, uploadedBy:myName, uploadedAt:payload.uploadedAt });
            p.updatedAt=new Date().toISOString();
            await saveProjects();
            fileInput.value="";
            toast(`✅ อัปโหลด "${f.name}" สำเร็จ`);
            rerender(); render();
          } catch(e){ toast("❌ อัปโหลดล้มเหลว: "+e.message); }
        };
      }
      document.querySelectorAll("[data-dlfile]").forEach(b=>{
        b.onclick=async()=>{
          const fid=b.dataset.dlfile;
          const payload=await loadAttachment(fid);
          if(!payload){ toast("❌ ไม่พบไฟล์"); return; }
          const a=document.createElement("a");
          a.href=payload.data; a.download=payload.name;
          document.body.appendChild(a); a.click(); a.remove();
          toast(`⬇️ ดาวน์โหลด ${payload.name}`);
        };
      });
      document.querySelectorAll("[data-delfile]").forEach(b=>{
        b.onclick=async()=>{
          const fid=b.dataset.delfile;
          const f=(p.attachments||[]).find(x=>x.id===fid);
          if(!f) return;
          if(!confirm(`ลบไฟล์ "${f.name}"?`)) return;
          await deleteAttachment(fid);
          p.attachments=(p.attachments||[]).filter(x=>x.id!==fid);
          p.updatedAt=new Date().toISOString();
          await saveProjects();
          toast("ลบไฟล์แล้ว"); rerender(); render();
        };
      });
    }
    if(tab==="notes"){
      const add=async()=>{
        const v=$("#newNote").value.trim(); if(!v) return;
        p.notes=p.notes||[];
        p.notes.push({id:genId(),text:v,author:myName,date:new Date().toISOString()});
        p.updatedAt=new Date().toISOString();
        await saveProjects();
        const result = awardCoins(myName, COIN_NOTE, "note");
        await saveUsers();
        await addLog("note", p.title||"(ไม่มีชื่อ)", v.length>50?v.slice(0,50)+"…":v);
        result.newAchievements.forEach(a=>showAchievementUnlock(a));
        rerender(); render();
      };
      $("#addNote").onclick=add;
    }
    if(tab==="details"){
      if(editMode){
        let selC=p.color;
        $("#eColors").querySelectorAll(".color-dot").forEach(d=>{
          d.onclick=()=>{
            $("#eColors").querySelectorAll(".color-dot").forEach(x=>x.classList.remove("sel"));
            d.classList.add("sel"); selC=d.dataset.color;
          };
        });
        $("#eDueRow").onclick=()=>{
          if(_lock){ toast("เฉพาะผู้สร้างงานเท่านั้นที่แก้ไขได้"); return; }
          openDatePicker(editState.dueDate, (date)=>{
            editState.dueDate = date || "";
            const v = $("#eDueVal");
            if(v) {
              v.textContent = editState.dueDate ? fmtDateFull(editState.dueDate) : "แตะเพื่อเลือก ›";
              if (editState.dueDate) v.classList.add("set"); else v.classList.remove("set");
            }
          });
        };
        $("#eSave").onclick=async()=>{
          if(!_lock){
            p.title=$("#eTitle").value.trim()||p.title;
            p.priority=$("#ePrio").value;
            p.dueDate=editState.dueDate;
          }
          p.description=$("#eDesc").value.trim();
          p.assignee=$("#eAssignee").value;
          // v31: Save program link (empty string = no link)
          { const ep=$("#eProgram"); if(ep) p.programId = ep.value || ""; }
          p.budget=Number($("#eBudget").value)||0;
          p.spent=Number($("#eSpent").value)||0;
          { const mh=$("#eManualH"); const v=mh?mh.value.trim():"";
            p.manualHours = v==="" ? null : (Number(v)||null); }
          p.color=selC;
          p.updatedAt=new Date().toISOString();
          await saveProjects();
          // v30: After saving edits, close the detail panel and return to the project
          //      list. Previously it just toggled out of edit mode and stayed open, which
          //      felt like "did it actually save?" — now the panel closes immediately and
          //      the list re-renders so the user sees their changes reflected on the card.
          toast("บันทึกแล้ว");
          editMode=false; editState.dueDate="";
          closeThis();
          render();
        };
        $("#eCancel").onclick=()=>{ editMode=false; editState.dueDate=""; rerender(); };
      } else {
        const ed=$("#dEdit");
        if(ed) ed.onclick=()=>{ editMode=true; editState.dueDate=p.dueDate||""; rerender(); };
        const dch=$("#dChat");
        if(dch) dch.onclick=async()=>{ closeThis(); chatScope=p.id; await savePage("chat"); render(); };
        const dc=$("#dCancel");
        if(dc) dc.onclick=()=>{ closeThis(); openCancelReason(p); };
        const dr=$("#dRestore");
        if(dr) dr.onclick=async()=>{
          p.cancelled=false; p.updatedAt=new Date().toISOString();
          await saveProjects();
          await addLog("restore", p.title||"(ไม่มีชื่อ)", "");
          closeThis(); render();
          toast("กู้คืนงานแล้ว");
        };
      }
    }
  }
  if(!inline) sheetShell(`<div></div>`, "sheet-detail");
  rerender();
}

// ─── Inline expand: detail panel inside the card ───
let _inlineDetailId=null;
function closeInlineDetail(){
  const ex=document.querySelector(".pj-detail-row");
  if(ex){
    ex.style.maxHeight="0px"; ex.style.opacity="0";
    setTimeout(()=>{ if(ex.parentNode) ex.remove(); },260);
  }
  document.querySelectorAll(".pj-open-btn.open").forEach(b=>b.classList.remove("open"));
  _inlineDetailId=null;
}
function toggleInlineDetail(id, btn){
  const wasOpen = _inlineDetailId===id;
  closeInlineDetail();
  if(wasOpen) return; // toggle off
  // v17: table mode rows can't host inline panels — open as modal sheet instead
  const tableRow = document.querySelector(`.pj-tr[data-row="${id}"]`);
  if(tableRow){
    if(btn) btn.classList.add("open");
    openDetailSheet(id, false);
    return;
  }
  const card=document.querySelector(`.pj-card[data-row="${id}"]`);
  if(!card) return;
  const panel=document.createElement("div");
  panel.className="pj-detail-row";
  panel.innerHTML=`<div class="pj-detail-inner"></div>`;
  card.appendChild(panel);
  if(btn) btn.classList.add("open");
  _inlineDetailId=id;
  const inner=panel.querySelector(".pj-detail-inner");
  openDetailSheet(id, false, inner);
  requestAnimationFrame(()=>{
    panel.style.maxHeight=panel.scrollHeight+"px";
    panel.style.opacity="1";
    setTimeout(()=>{ if(panel) panel.style.maxHeight="none"; },320);
  });
  setTimeout(()=>{ card.scrollIntoView({behavior:"smooth",block:"nearest"}); },180);
}

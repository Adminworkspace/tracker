// ═══════════════════════════════════════════════════════════════════
// v31: PROGRAMS PAGE — Big projects (parent initiatives) that group tasks.
//   Each program has: name, description, color, status, dueDate, owner.
//   Progress is computed from linked tasks (projects with programId === program.id).
//   This is purely a tracking/grouping layer; XP/scoring is unchanged.
// ═══════════════════════════════════════════════════════════════════
let programStatusFilter = ""; // "" = all active, "done", "paused", "all"
// v34: Programs page view mode — toggle between Progress bars / Gantt timeline / Kanban
let programViewMode = (typeof localStorage!=="undefined" && localStorage.getItem("bt-prog-viewmode")) || "progress";

// Compute progress + stats for a single program from its linked tasks
function programStats(prog){
  const linked = projects.filter(p => !p.cancelled && p.programId === prog.id);
  const total = linked.length;
  const done = linked.filter(p => p.status==="done").length;
  const doing = linked.filter(p => p.status==="doing").length;
  const todo = linked.filter(p => p.status==="todo").length;
  const overdue = linked.filter(p => {
    if(p.status==="done") return false;
    const d = daysUntil(p.dueDate);
    return d!==null && d<0;
  }).length;

  // v33: Progress resolution order:
  //   1. Manual override (user explicitly set a %) — wins over everything
  //   2. Program status === "done" → 100% (so a marked-done project always shows full bar,
  //      even if no tasks are linked yet — fixes the "0% bug" the user saw on a done project)
  //   3. Otherwise → auto-compute from linked tasks (or 0 if none)
  let pct;
  let pctSource = "auto";
  if(prog.manualProgress != null && !isNaN(prog.manualProgress)){
    pct = Math.max(0, Math.min(100, Math.round(prog.manualProgress)));
    pctSource = "manual";
  } else if(prog.status === "done"){
    pct = 100;
    pctSource = "status-done";
  } else {
    pct = total>0 ? Math.round(done/total*100) : 0;
    pctSource = "auto";
  }
  return { total, done, doing, todo, overdue, pct, pctSource, linked };
}

function programStatusBadge(prog, stats){
  // If all linked tasks done → "เสร็จสิ้น"; else respect prog.status
  if(prog.status==="done" || (stats.total>0 && stats.done===stats.total)){
    return `<span class="prog-badge" style="background:#16A34A1a;color:#16A34A">✓ เสร็จสิ้น</span>`;
  }
  if(prog.status==="paused"){
    return `<span class="prog-badge" style="background:#A8A29E22;color:#78716C">⏸ พักไว้</span>`;
  }
  if(stats.overdue > 0){
    return `<span class="prog-badge" style="background:#DC26261a;color:#DC2626">⚠ เกินกำหนด</span>`;
  }
  if(stats.doing > 0){
    return `<span class="prog-badge" style="background:#21409a1a;color:#21409a">● กำลังดำเนินการ</span>`;
  }
  return `<span class="prog-badge" style="background:#F59E0B1a;color:#B45309">○ ยังไม่เริ่ม</span>`;
}

function renderProgramsPage(me){
  // Filter programs
  const all = programs.slice();
  let visible = all;
  if(programStatusFilter==="active"){
    visible = all.filter(p => p.status!=="done" && p.status!=="paused");
  } else if(programStatusFilter==="done"){
    visible = all.filter(p => {
      const s = programStats(p);
      return p.status==="done" || (s.total>0 && s.done===s.total);
    });
  } else if(programStatusFilter==="paused"){
    visible = all.filter(p => p.status==="paused");
  }

  // Sort: active first (by deadline), then paused, then done
  visible.sort((a,b)=>{
    const aDone = a.status==="done", bDone = b.status==="done";
    if(aDone !== bDone) return aDone ? 1 : -1;
    const aPaused = a.status==="paused", bPaused = b.status==="paused";
    if(aPaused !== bPaused) return aPaused ? 1 : -1;
    const aD = a.dueDate ? new Date(a.dueDate).getTime() : Infinity;
    const bD = b.dueDate ? new Date(b.dueDate).getTime() : Infinity;
    return aD - bD;
  });

  const totalCount = all.length;
  const activeCount = all.filter(p => p.status!=="done" && p.status!=="paused").length;
  const doneCount = all.filter(p => {
    const s = programStats(p);
    return p.status==="done" || (s.total>0 && s.done===s.total);
  }).length;

  // v32: Helper — render avatar stack (owner + members) for a program.
  //      Shows up to 4 avatars stacked, with "+N" if more.
  const renderAvaStack = (prog) => {
    const all = [prog.owner].concat(prog.members||[]).filter((n,i,a)=>n && a.indexOf(n)===i);
    if(all.length === 0) return "";
    const show = all.slice(0, 4);
    const extra = all.length - show.length;
    return `
      <div class="prog-ava-stack">
        ${show.map((name, i) => `
          <div class="prog-ava" title="${esc(name)}" style="background:${avatarColor(name)};z-index:${10-i}">
            ${(()=>{
              const u = getUser(name);
              if(u && u.avatar) return `<img src="${u.avatar}" alt=""/>`;
              return `<span>${esc((name||"?").charAt(0).toUpperCase())}</span>`;
            })()}
          </div>
        `).join("")}
        ${extra > 0 ? `<div class="prog-ava prog-ava-more">+${extra}</div>` : ""}
      </div>
    `;
  };

  // v32: TIMELINE ROW — horizontal progress bar with name, %, avatars, deadline.
  //      Inspired by the reference image's multicolored timeline bars.
  const renderTimelineRow = (prog) => {
    const s = programStats(prog);
    const accent = prog.color || "#21409a";
    const dueText = prog.dueDate ? fmtDateFull(prog.dueDate) : "ไม่มีกำหนด";
    const dueDays = prog.dueDate ? daysUntil(prog.dueDate) : null;
    let dueLabel = "—";
    let dueClass = "";
    if(prog.status === "done" || (s.total>0 && s.done===s.total)){
      dueLabel = "เสร็จสิ้น"; dueClass = "tl-due-done";
    } else if(dueDays !== null){
      if(dueDays < 0)       { dueLabel = `เกิน ${Math.abs(dueDays)} วัน`; dueClass = "tl-due-overdue"; }
      else if(dueDays === 0){ dueLabel = "วันนี้"; dueClass = "tl-due-soon"; }
      else if(dueDays <= 7) { dueLabel = `อีก ${dueDays} วัน`; dueClass = "tl-due-soon"; }
      else                  { dueLabel = `อีก ${dueDays} วัน`; dueClass = ""; }
    } else if(prog.status === "paused"){
      dueLabel = "พักไว้"; dueClass = "tl-due-paused";
    }

    const statusEmoji = (()=>{
      if(prog.status === "done" || (s.total>0 && s.done===s.total)) return "✓";
      if(prog.status === "paused") return "⏸";
      if(s.overdue > 0) return "⚠";
      if(s.doing > 0) return "●";
      return "○";
    })();

    return `
      <div class="tl-row" data-progopen="${prog.id}">
        <div class="tl-row-head">
          <div class="tl-row-emoji" style="background:${accent}22;color:${accent}">${statusEmoji}</div>
          <div class="tl-row-info">
            <div class="tl-row-name">${esc(prog.name||"(ไม่มีชื่อ)")}</div>
            ${prog.description ? `<div class="tl-row-desc">${esc(prog.description)}</div>` : ""}
          </div>
          ${renderAvaStack(prog)}
        </div>
        <div class="tl-row-bar-wrap">
          <div class="tl-row-bar" style="background:linear-gradient(90deg, ${accent} 0%, ${accent}cc 100%); width:${Math.max(s.pct, 6)}%;">
            <span class="tl-row-pct">${s.pct}%${s.pctSource==="manual"?' <span style="font-size:9.5px;font-weight:600;opacity:.85;margin-left:4px">(บันทึกเอง)</span>':""}</span>
          </div>
        </div>
        <div class="tl-row-foot">
          <div class="tl-row-stats">
            <span class="tl-stat">${s.done}/${s.total} งาน</span>
            ${s.doing>0 ? `<span class="tl-stat tl-stat-doing">● ${s.doing} กำลังทำ</span>` : ""}
            ${s.overdue>0 ? `<span class="tl-stat tl-stat-overdue">⚠ ${s.overdue} เกิน</span>` : ""}
          </div>
          <div class="tl-row-due ${dueClass}">
            ${icon("calendar",12)} <span>${dueLabel}</span>
            <span class="tl-row-due-sep">·</span>
            <span class="tl-row-due-date">${dueText}</span>
          </div>
        </div>
      </div>
    `;
  };

  // v32: KANBAN COLUMNS — group programs by status (similar to reference image bottom section)
  //      Columns: ยังไม่เริ่ม (todo) · กำลังดำเนินการ (doing) · เสร็จสิ้น (done)
  const kanbanCols = [
    { id:"todo",   label:"ยังไม่เริ่ม",       color:"#78716C", bg:"#F5F4F2" },
    { id:"doing",  label:"กำลังดำเนินการ",  color:"#21409a", bg:"#EEF1FA" },
    { id:"paused", label:"พักไว้",          color:"#A8A29E", bg:"#F0EFEC" },
    { id:"done",   label:"เสร็จสิ้น",         color:"#16A34A", bg:"#E8F5EE" },
  ];
  const kanbanGroup = (col) => {
    return visible.filter(prog => {
      const s = programStats(prog);
      const isDone = prog.status==="done" || (s.total>0 && s.done===s.total);
      const isPaused = prog.status==="paused";
      if(col.id === "done")   return isDone;
      if(col.id === "paused") return isPaused && !isDone;
      if(col.id === "doing")  return !isDone && !isPaused && s.doing > 0;
      // todo: not done, not paused, no tasks-in-progress yet
      return !isDone && !isPaused && s.doing === 0;
    });
  };

  const renderKanbanCard = (prog) => {
    const s = programStats(prog);
    const accent = prog.color || "#21409a";
    return `
      <div class="kb-card" data-progopen="${prog.id}" style="border-left:3px solid ${accent}">
        <div class="kb-card-name">${esc(prog.name||"(ไม่มีชื่อ)")}</div>
        ${prog.description ? `<div class="kb-card-desc">${esc(prog.description)}</div>` : ""}
        <div class="kb-card-mid">
          <div class="kb-card-pct">${s.pct}%</div>
          <div class="kb-card-prog"><div style="width:${s.pct}%;background:${accent}"></div></div>
        </div>
        <div class="kb-card-foot">
          ${renderAvaStack(prog)}
          <div class="kb-card-stats">
            <span title="งานที่ผูกอยู่">${icon("tasks",12)} ${s.total}</span>
            ${s.overdue>0 ? `<span style="color:var(--crit)" title="งานเกินกำหนด">${icon("alert",12)} ${s.overdue}</span>` : ""}
          </div>
        </div>
      </div>
    `;
  };

  // v34: GANTT TIMELINE renderer — proper time-based chart.
  //   • X-axis = real calendar dates
  //   • Each program is a horizontal bar spanning from createdAt → dueDate
  //   • Bar fill % shows current progress; remaining = lighter
  //   • "Today" marker is a vertical line
  //   • Auto-zoom: shows the timespan covering all active programs (min 30 days)
  const renderGanttChart = () => {
    const ganttList = visible.filter(p => p.dueDate); // need a deadline to chart
    if(ganttList.length === 0){
      return `
        <div class="prog-empty" style="padding:36px 16px">
          <div class="prog-empty-icon">${icon("calendar",32)}</div>
          <div class="prog-empty-title">ไม่มีโปรเจกต์ที่มีกำหนดเสร็จ</div>
          <div class="prog-empty-sub">เพิ่ม "กำหนดเสร็จ" ในโปรเจกต์เพื่อแสดงบน Gantt timeline</div>
        </div>`;
    }

    // Compute timeline window
    const now = new Date(); now.setHours(0,0,0,0);
    let minDate = now.getTime();
    let maxDate = now.getTime();
    ganttList.forEach(p => {
      const start = p.createdAt ? new Date(p.createdAt).getTime() : now.getTime();
      const end = new Date(p.dueDate).getTime();
      if(start < minDate) minDate = start;
      if(end > maxDate) maxDate = end;
    });
    // Pad by 3 days on each side
    minDate -= 3 * 86400000;
    maxDate += 3 * 86400000;
    // Ensure at least 30 days visible
    const minSpan = 30 * 86400000;
    if(maxDate - minDate < minSpan){
      const extra = (minSpan - (maxDate - minDate)) / 2;
      minDate -= extra; maxDate += extra;
    }
    const totalMs = maxDate - minDate;
    const totalDays = Math.ceil(totalMs / 86400000);

    // Pixel mapping: % from left
    const pctOf = (d) => Math.max(0, Math.min(100, ((d - minDate) / totalMs) * 100));

    // Month markers — list of {pct, label} for each month boundary in the window
    const monthMarkers = [];
    {
      const start = new Date(minDate);
      const cur = new Date(start.getFullYear(), start.getMonth(), 1);
      while(cur.getTime() <= maxDate){
        const next = new Date(cur.getFullYear(), cur.getMonth()+1, 1);
        // Position at the middle of the visible portion of this month
        const segStart = Math.max(cur.getTime(), minDate);
        const segEnd = Math.min(next.getTime(), maxDate);
        const midPct = pctOf((segStart + segEnd) / 2);
        const monthNames = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
        monthMarkers.push({
          pct: midPct,
          startPct: pctOf(cur.getTime()),
          label: monthNames[cur.getMonth()] + " " + ((cur.getFullYear()+543)%100).toString().padStart(2,"0")
        });
        cur.setMonth(cur.getMonth() + 1);
      }
    }

    const todayPct = pctOf(now.getTime());
    const showTodayMarker = todayPct >= 0 && todayPct <= 100;

    // Render each row
    const rows = ganttList.map(prog => {
      const s = programStats(prog);
      const accent = prog.color || "#21409a";
      const start = prog.createdAt ? new Date(prog.createdAt).getTime() : minDate;
      const end = new Date(prog.dueDate).getTime();
      const leftPct = pctOf(start);
      const rightPct = pctOf(end);
      const widthPct = Math.max(rightPct - leftPct, 1.5);
      const isDone = prog.status==="done" || (s.total>0 && s.done===s.total);
      const isOverdue = !isDone && (end < now.getTime());
      const barFill = Math.max(0, Math.min(100, s.pct));
      const dueLabel = (()=>{
        const d = daysUntil(prog.dueDate);
        if(isDone) return "เสร็จ";
        if(d === null) return "";
        if(d < 0) return `เกิน ${Math.abs(d)} วัน`;
        if(d === 0) return "วันนี้";
        return `อีก ${d} วัน`;
      })();
      return `
        <div class="gantt-row" data-progopen="${prog.id}">
          <div class="gantt-row-label">
            <div class="gantt-row-name">${esc(prog.name||"(ไม่มีชื่อ)")}</div>
            <div class="gantt-row-sub">${s.pct}% · ${dueLabel}</div>
          </div>
          <div class="gantt-row-track">
            <!-- background grid: month dividers -->
            ${monthMarkers.map(m => m.startPct > 0 ? `<div class="gantt-grid-line" style="left:${m.startPct}%"></div>` : "").join("")}
            <!-- today line is rendered on top via gantt-today-line in the chart -->
            <!-- The bar -->
            <div class="gantt-bar ${isOverdue?'gantt-bar-overdue':''} ${isDone?'gantt-bar-done':''} ${barFill < 22 ? 'gantt-bar-lowfill' : ''}"
                 style="left:${leftPct}%; width:${widthPct}%; background:${accent}22; border-color:${accent}66"
                 title="${esc(prog.name)} · ${fmtDateFull(new Date(start).toISOString().slice(0,10))} → ${fmtDateFull(prog.dueDate)}">
              <div class="gantt-bar-fill" style="width:${barFill}%; background:${isDone?'#16A34A':accent}"></div>
              <div class="gantt-bar-label">${s.pct}%</div>
            </div>
          </div>
        </div>
      `;
    }).join("");

    return `
      <div class="gantt-chart">
        <div class="gantt-head">
          <div class="gantt-head-label">โปรเจกต์</div>
          <div class="gantt-head-track">
            ${monthMarkers.map(m => `
              <div class="gantt-month-marker" style="left:${m.pct}%">${m.label}</div>
            `).join("")}
            ${monthMarkers.map(m => m.startPct > 0 ? `<div class="gantt-grid-line gantt-grid-line-head" style="left:${m.startPct}%"></div>` : "").join("")}
          </div>
        </div>
        <div class="gantt-body">
          ${showTodayMarker ? `<div class="gantt-today-line" style="left:calc(220px + (100% - 220px) * ${todayPct/100}); "><span>วันนี้</span></div>` : ""}
          ${rows}
        </div>
        <div class="gantt-foot">
          ช่วงเวลา ${fmtDateFull(new Date(minDate).toISOString().slice(0,10))} — ${fmtDateFull(new Date(maxDate).toISOString().slice(0,10))} · รวม ${totalDays} วัน
        </div>
      </div>
    `;
  };

  // v34: Choose body content based on view mode
  let viewBody;
  if(visible.length === 0){
    viewBody = `
      <div class="prog-empty">
        <div class="prog-empty-icon">${icon("folder",36)}</div>
        <div class="prog-empty-title">ยังไม่มีโปรเจกต์ในหมวดนี้</div>
        <div class="prog-empty-sub">แตะปุ่ม + วงกลมมุมขวาล่างเพื่อสร้างโปรเจกต์ใหม่</div>
      </div>`;
  } else if(programViewMode === "gantt"){
    viewBody = `
      <div class="tl-section">
        <div class="tl-section-head">
          <h3>Gantt Timeline</h3>
          <span class="tl-section-sub">เห็นภาพรวมตามช่วงเวลาจริง · แถบยาวตาม start → deadline · สีเข้ม = ความคืบหน้า</span>
        </div>
        ${renderGanttChart()}
      </div>`;
  } else if(programViewMode === "kanban"){
    viewBody = `
      <div class="kb-section">
        <div class="tl-section-head">
          <h3>มุมมอง Kanban</h3>
          <span class="tl-section-sub">จัดกลุ่มตามสถานะ — คลิกการ์ดเพื่อดูรายละเอียด</span>
        </div>
        <div class="kb-board">
          ${kanbanCols.map(col => {
            const items = kanbanGroup(col);
            return `
              <div class="kb-col">
                <div class="kb-col-head" style="background:${col.bg};color:${col.color}">
                  <span class="kb-col-dot" style="background:${col.color}"></span>
                  <span class="kb-col-label">${col.label}</span>
                  <span class="kb-col-count">${items.length}</span>
                </div>
                <div class="kb-col-body">
                  ${items.length === 0
                    ? `<div class="kb-col-empty">ไม่มีโปรเจกต์</div>`
                    : items.map(renderKanbanCard).join("")}
                </div>
              </div>
            `;
          }).join("")}
        </div>
      </div>`;
  } else {
    // "progress" — the default horizontal-bar view
    viewBody = `
      <div class="tl-section">
        <div class="tl-section-head">
          <h3>ภาพรวมความคืบหน้า</h3>
          <span class="tl-section-sub">โปรเจกต์ทั้งหมดในรูปแบบ progress bar</span>
        </div>
        <div class="tl-rows">
          ${visible.map(renderTimelineRow).join("")}
        </div>
      </div>`;
  }

  return `
    ${topbarHTML("โปรเจกต์", `ทั้งหมด ${totalCount} · กำลังดำเนินการ ${activeCount} · เสร็จสิ้น ${doneCount}`, me)}

    <div class="prog-page-wrap">
      <!-- v34: Filter chips + view-mode toggle on the same row.
           Progress = horizontal % bars (default) · Gantt = time-based · Kanban = grouped by status. -->
      <div class="prog-toolbar">
        <div class="pj-chip-row" style="display:flex;flex-wrap:wrap;gap:8px;flex:1">
          <button class="pj-chip ${programStatusFilter===""?"on":""}" data-progfilter="">ทั้งหมด</button>
          <button class="pj-chip ${programStatusFilter==="active"?"on":""}" data-progfilter="active">กำลังดำเนินการ</button>
          <button class="pj-chip ${programStatusFilter==="done"?"on":""}" data-progfilter="done">เสร็จสิ้น</button>
          <button class="pj-chip ${programStatusFilter==="paused"?"on":""}" data-progfilter="paused">พักไว้</button>
        </div>
        <div class="prog-view-toggle">
          <button class="prog-vt-btn ${programViewMode==='progress'?'on':''}" data-progview="progress" title="Progress bars">
            ${icon("analytics",13)} <span>Progress</span>
          </button>
          <button class="prog-vt-btn ${programViewMode==='gantt'?'on':''}" data-progview="gantt" title="Gantt timeline">
            ${icon("calendar",13)} <span>Gantt</span>
          </button>
          <button class="prog-vt-btn ${programViewMode==='kanban'?'on':''}" data-progview="kanban" title="Kanban board">
            ${icon("cards",13)} <span>Kanban</span>
          </button>
        </div>
      </div>

      ${viewBody}

      <div class="foot-note" style="margin-top:24px">
        ภาพรวมความคืบหน้าคำนวณจากงานที่ผูกอยู่ในแต่ละโปรเจกต์ · หรือกรอกเองในหน้าแก้ไขโปรเจกต์<br>
        Gantt timeline ใช้ข้อมูล "วันที่สร้าง" และ "กำหนดเสร็จ" — กรอกกำหนดเสร็จเพื่อแสดงบนแถบ
      </div>
    </div>

    <button class="fab-add" id="progAddFab" aria-label="สร้างโปรเจกต์ใหม่" title="สร้างโปรเจกต์ใหม่">
      <span class="fab-add-label">สร้างโปรเจกต์ใหม่</span>
    </button>
  `;
}

function wirePrograms(){
  // Filter chips
  document.querySelectorAll("[data-progfilter]").forEach(b=>{
    b.onclick=()=>{ programStatusFilter=b.dataset.progfilter; render(); };
  });

  // v34: View mode toggle (Progress / Gantt / Kanban)
  document.querySelectorAll("[data-progview]").forEach(b => {
    b.onclick = () => {
      programViewMode = b.dataset.progview;
      try{ localStorage.setItem("bt-prog-viewmode", programViewMode); }catch(e){}
      render();
    };
  });

  // Card click → open editor
  document.querySelectorAll("[data-progopen]").forEach(c=>{
    c.onclick=()=>openProgramEditor(c.dataset.progopen);
  });

  // FAB → new program
  const fab = $("#progAddFab");
  if(fab) fab.onclick = ()=>openProgramEditor(null);
}

function openProgramEditor(progId){
  const isNew = !progId;
  const prog = isNew
    ? {
        id: genId(),
        name: "",
        description: "",
        color: "#21409a",
        status: "active", // active | done | paused
        dueDate: "",
        owner: myName,
        members: [], // v32: multi-collaborator support
        createdBy: myName,
        createdAt: new Date().toISOString(),
      }
    : programs.find(p => p.id === progId);

  if(!prog){ toast("ไม่พบโปรเจกต์นี้"); return; }
  // Ensure members array exists (in case of legacy program created in v31)
  if(!Array.isArray(prog.members)) prog.members = [];

  let selC = prog.color;
  let selDue = prog.dueDate || "";
  // v32: working copy of member selections (mutated by checkbox toggles)
  let selMembers = prog.members.slice();

  const teamOpts = sortTeam(Object.values(users))
    .map(u => `<option value="${esc(u.name)}" ${nKey(u.name)===nKey(prog.owner)?"selected":""}>${esc(u.name)}</option>`)
    .join("");

  // List of tasks already linked to this program (for context)
  const linkedTasks = isNew ? [] : projects.filter(p => p.programId === prog.id);

  sheetShell(`
    <div class="sheet-head">
      <h2>${isNew ? "สร้างโปรเจกต์ใหม่" : "แก้ไขโปรเจกต์"}</h2>
      <button class="sheet-close" id="prClose">✕</button>
    </div>

    <div class="group-label">ชื่อโปรเจกต์</div>
    <div class="group"><div class="row">
      <input class="ios-input" id="prName" value="${esc(prog.name)}" placeholder="ชื่อโปรเจกต์ใหญ่..." maxlength="80"/>
    </div></div>

    <div class="group-label">คำอธิบายสั้นๆ (เพิ่มเติม)</div>
    <div class="group"><textarea class="ios-textarea" id="prDesc" placeholder="เป้าหมาย / ภาพรวมโปรเจกต์...">${esc(prog.description||"")}</textarea></div>

    <div class="group-label">ข้อมูล</div>
    <div class="group">
      <!-- v33: Custom rounded dropdowns instead of native <select>.
           The native browser <select> popup is rectangular and out of our visual control;
           pj-dd-btn + openCustomDropdown gives a consistent rounded look. -->
      <div class="row">
        <span class="key">สถานะ</span>
        <button class="pj-dd-btn" id="prStatusBtn" data-prval="${prog.status}">
          <span class="pj-dd-dot" style="background:${prog.status==='done'?'#16A34A':(prog.status==='paused'?'#A8A29E':'#21409a')}"></span>
          <span class="pj-dd-lbl" id="prStatusLbl">${prog.status==='done'?'เสร็จสิ้น':(prog.status==='paused'?'พักไว้ชั่วคราว':'กำลังดำเนินการ')}</span>
        </button>
      </div>
      <div class="row">
        <span class="key">ผู้ดูแลหลัก</span>
        <button class="pj-dd-btn" id="prOwnerBtn" data-prval="${esc(prog.owner)}">
          <span class="pj-dd-dot" style="background:${avatarColor(prog.owner)}"></span>
          <span class="pj-dd-lbl" id="prOwnerLbl">${esc(prog.owner||"—")}</span>
        </button>
      </div>
      <div class="row clickable" id="prDueRow">
        <span class="key">กำหนดเสร็จ</span>
        <span class="val ${selDue?"set":""}" id="prDueVal">${selDue?fmtDateFull(selDue):"แตะเพื่อเลือก ›"}</span>
      </div>
    </div>

    <!-- v33: Manual progress slider — lets users update the bar visually without needing
         linked tasks. E.g. "อัปเดตราคา → 20%", "สรุปผู้รับเหมา → 40%", etc. -->
    <div class="group-label">ความคืบหน้า (กรอกเอง)</div>
    <div class="group" style="padding:14px">
      <div style="display:flex;align-items:center;gap:14px">
        <input type="range" min="0" max="100" step="5"
               value="${prog.manualProgress != null ? prog.manualProgress : ''}"
               id="prManualSlider" class="prog-slider"
               style="flex:1;${prog.manualProgress != null ? '' : 'opacity:.55'}"/>
        <div style="min-width:80px;text-align:right;font-weight:800;font-size:18px;color:${prog.manualProgress != null ? '#21409a' : 'var(--label3)'}" id="prManualVal">
          ${prog.manualProgress != null ? prog.manualProgress + '%' : '— อัตโนมัติ'}
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
        <button class="pj-chip sm" data-prquick="0">0%</button>
        <button class="pj-chip sm" data-prquick="25">25%</button>
        <button class="pj-chip sm" data-prquick="50">50%</button>
        <button class="pj-chip sm" data-prquick="75">75%</button>
        <button class="pj-chip sm" data-prquick="100">100%</button>
        <button class="pj-chip sm" data-prquick="auto" style="border-color:var(--label3);color:var(--label3)">↻ ใช้อัตโนมัติ</button>
      </div>
      <div style="font-size:11.5px;color:var(--label3);margin-top:10px;line-height:1.5">
        เลื่อนแถบเพื่อกำหนดความคืบหน้าเอง · ปุ่ม "ใช้อัตโนมัติ" จะคำนวณจากงานที่ผูกอยู่<br>
        เหมาะกับเหตุการณ์เช่น "อัปเดตราคา 20%", "สรุปผู้รับเหมา 40%", "ทำงานไปแล้ว 50%"
      </div>
    </div>

    <!-- v32: Multi-collaborator picker for programs. Owner is excluded from this list
         (they're already the leader); checkboxes for everyone else on the team. -->
    <div class="group-label">ผู้ร่วมโปรเจกต์ (เลือกได้หลายคน)</div>
    <div class="group" style="padding:6px">
      <div class="member-check-grid" id="prMembers">
        ${sortTeam(Object.values(users)).map(u => {
          const checked = selMembers.some(m => nKey(m) === nKey(u.name));
          const isOwner = nKey(u.name) === nKey(prog.owner);
          return `
            <label class="member-check ${checked?"on":""} ${isOwner?"is-owner":""}" data-mname="${esc(u.name)}">
              <input type="checkbox" data-mcheck="${esc(u.name)}" ${checked?"checked":""} ${isOwner?"disabled":""}/>
              <div class="mc-check-ava" style="background:${avatarColor(u.name)}">
                ${u.avatar ? `<img src="${u.avatar}" alt=""/>` : `<span>${esc((u.name||"?").charAt(0).toUpperCase())}</span>`}
              </div>
              <div class="mc-check-info">
                <div class="mc-check-name">${esc(u.name)}</div>
                <div class="mc-check-role">${isOwner ? "ผู้ดูแล (เลือกแล้วโดยอัตโนมัติ)" : (u.role==="admin" ? "หัวหน้าทีม" : "สมาชิกทีม")}</div>
              </div>
            </label>
          `;
        }).join("")}
      </div>
      <div style="font-size:11px;color:var(--label3);padding:8px 8px 4px;line-height:1.5">
        ผู้ดูแลจะเป็นสมาชิกของโปรเจกต์โดยอัตโนมัติ · เลือกเพิ่มเติมได้เพื่อให้คนอื่นร่วมติดตามโปรเจกต์นี้
      </div>
    </div>

    <div class="group-label">สีประจำโปรเจกต์</div>
    <div class="group">
      <div class="color-grid" id="prColors">
        ${CARD_COLORS.map(c=>`<div class="color-dot ${c===selC?"sel":""}" data-color="${c}" style="background:${c};color:${c}"></div>`).join("")}
      </div>
    </div>

    ${!isNew && linkedTasks.length>0 ? `
      <div class="group-label">งานที่ผูกกับโปรเจกต์นี้ (${linkedTasks.length})</div>
      <div class="group" style="padding:8px">
        ${linkedTasks.slice(0,20).map(t=>`
          <div style="display:flex;align-items:center;gap:10px;padding:9px 8px;border-bottom:1px solid var(--sep2);font-size:13px">
            <span style="width:8px;height:8px;border-radius:50%;background:${colObj(t.status).color};flex-shrink:0"></span>
            <span style="flex:1;color:${t.status==='done'?'var(--label3)':'var(--label)'};${t.status==='done'?'text-decoration:line-through':''}">${esc(t.title||"(ไม่มีชื่อ)")}</span>
            <span style="font-size:11px;color:var(--label2)">${colObj(t.status).label}</span>
          </div>
        `).join("")}
        ${linkedTasks.length>20 ? `<div style="text-align:center;padding:8px;font-size:11px;color:var(--label3)">และอีก ${linkedTasks.length-20} งาน...</div>` : ""}
      </div>
    ` : ""}

    ${!isNew ? `
      <div class="group-label">การจัดการ</div>
      <div class="group" style="padding:8px">
        <div style="font-size:12px;color:var(--label2);padding:8px;line-height:1.5">
          ลบโปรเจกต์นี้จะไม่ลบงานที่ผูกอยู่ — เพียงแต่งานเหล่านั้นจะกลายเป็นงานเดี่ยว ไม่อยู่ในโปรเจกต์ใด
        </div>
      </div>
    ` : ""}

    <button class="btn-primary" id="prSave">${isNew ? "สร้างโปรเจกต์" : "บันทึกการแก้ไข"}</button>
    <div style="height:8px"></div>
    ${!isNew ? `<button class="btn-secondary" id="prDelete" style="color:var(--crit)">🗑 ลบโปรเจกต์นี้</button><div style="height:8px"></div>` : ""}
    <button class="btn-secondary" id="prCancel">ยกเลิก</button>
    <div style="height:12px"></div>
  `);

  $("#prClose").onclick = closeSheet;
  $("#prCancel").onclick = closeSheet;

  // Color picker
  $("#prColors").querySelectorAll(".color-dot").forEach(d=>{
    d.onclick = ()=>{
      $("#prColors").querySelectorAll(".color-dot").forEach(x=>x.classList.remove("sel"));
      d.classList.add("sel");
      selC = d.dataset.color;
    };
  });

  // v32: Member checkboxes — toggle selection
  document.querySelectorAll("[data-mcheck]").forEach(cb => {
    cb.onchange = (e) => {
      const name = cb.dataset.mcheck;
      const label = cb.closest(".member-check");
      if(cb.checked){
        if(!selMembers.some(m => nKey(m) === nKey(name))) selMembers.push(name);
        if(label) label.classList.add("on");
      } else {
        selMembers = selMembers.filter(m => nKey(m) !== nKey(name));
        if(label) label.classList.remove("on");
      }
    };
  });

  // v33: Track current selections via local vars (custom dropdowns don't fire onchange)
  let selStatus = prog.status;
  let selOwner = prog.owner;
  let selManual = (prog.manualProgress != null) ? prog.manualProgress : null;

  // v33: Refresh the member checkbox list when the owner changes (owner is implicit member)
  const refreshMemberList = (newOwner) => {
    selMembers = selMembers.filter(m => nKey(m) !== nKey(newOwner));
    document.querySelectorAll("[data-mcheck]").forEach(cb => {
      const name = cb.dataset.mcheck;
      const label = cb.closest(".member-check");
      const isNewOwner = nKey(name) === nKey(newOwner);
      cb.disabled = isNewOwner;
      cb.checked = isNewOwner ? true : selMembers.some(m => nKey(m) === nKey(name));
      if(label){
        label.classList.toggle("is-owner", isNewOwner);
        label.classList.toggle("on", cb.checked);
        const roleEl = label.querySelector(".mc-check-role");
        if(roleEl){
          const u = getUser(name);
          roleEl.textContent = isNewOwner
            ? "ผู้ดูแล (เลือกแล้วโดยอัตโนมัติ)"
            : (u && u.role==="admin" ? "หัวหน้าทีม" : "สมาชิกทีม");
        }
      }
    });
  };

  // v33: Custom rounded dropdown for status
  $("#prStatusBtn").onclick = (e) => {
    e.stopPropagation();
    openCustomDropdown($("#prStatusBtn"), [
      { value:"active", label:"กำลังดำเนินการ", color:"#21409a" },
      { value:"paused", label:"พักไว้ชั่วคราว",  color:"#A8A29E" },
      { value:"done",   label:"เสร็จสิ้น",        color:"#16A34A" },
    ], selStatus, (newVal) => {
      selStatus = newVal;
      const btn = $("#prStatusBtn");
      const lbl = $("#prStatusLbl");
      const dot = btn.querySelector(".pj-dd-dot");
      lbl.textContent = newVal==="done"?"เสร็จสิ้น":(newVal==="paused"?"พักไว้ชั่วคราว":"กำลังดำเนินการ");
      dot.style.background = newVal==="done"?"#16A34A":(newVal==="paused"?"#A8A29E":"#21409a");
      btn.dataset.prval = newVal;
    });
  };

  // v33: Custom rounded dropdown for owner
  $("#prOwnerBtn").onclick = (e) => {
    e.stopPropagation();
    const ownerOpts = sortTeam(Object.values(users)).map(u => ({
      value: u.name, label: u.name, color: avatarColor(u.name)
    }));
    openCustomDropdown($("#prOwnerBtn"), ownerOpts, selOwner, (newVal) => {
      selOwner = newVal;
      const btn = $("#prOwnerBtn");
      const lbl = $("#prOwnerLbl");
      const dot = btn.querySelector(".pj-dd-dot");
      lbl.textContent = newVal;
      dot.style.background = avatarColor(newVal);
      btn.dataset.prval = newVal;
      refreshMemberList(newVal);
    });
  };

  // v33: Manual progress slider — value applies live to a local var.
  const slider = $("#prManualSlider");
  const sliderVal = $("#prManualVal");
  const updateSliderUI = () => {
    if(selManual == null){
      sliderVal.textContent = "— อัตโนมัติ";
      sliderVal.style.color = "var(--label3)";
      slider.style.opacity = ".55";
      slider.value = 0;
    } else {
      sliderVal.textContent = selManual + "%";
      sliderVal.style.color = "#21409a";
      slider.style.opacity = "1";
      slider.value = selManual;
    }
  };
  slider.oninput = (e) => {
    selManual = Number(e.target.value);
    updateSliderUI();
  };
  // Quick-set buttons (0/25/50/75/100/auto)
  document.querySelectorAll("[data-prquick]").forEach(b => {
    b.onclick = (e) => {
      e.preventDefault();
      const v = b.dataset.prquick;
      if(v === "auto") selManual = null;
      else selManual = Number(v);
      updateSliderUI();
    };
  });
  updateSliderUI();

  // Due date picker
  $("#prDueRow").onclick = ()=>{
    openDatePicker(selDue, (date)=>{
      selDue = date || "";
      const v = $("#prDueVal");
      if(v){
        v.textContent = selDue ? fmtDateFull(selDue) : "แตะเพื่อเลือก ›";
        if(selDue) v.classList.add("set"); else v.classList.remove("set");
      }
    });
  };

  // Save
  $("#prSave").onclick = async ()=>{
    const name = $("#prName").value.trim();
    if(!name){ toast("กรอกชื่อโปรเจกต์ก่อน"); $("#prName").focus(); return; }
    prog.name = name;
    prog.description = $("#prDesc").value.trim();
    prog.status = selStatus;
    prog.owner = selOwner;
    // v32: Persist collaborators (excluding owner — owner is implicit member)
    prog.members = selMembers.filter(m => nKey(m) !== nKey(prog.owner));
    // v33: Persist manual progress override (null = auto-compute from linked tasks)
    prog.manualProgress = selManual;
    prog.dueDate = selDue;
    prog.color = selC;
    prog.updatedAt = new Date().toISOString();
    if(isNew){
      programs.push(prog);
      await addLog("project", `สร้างโปรเจกต์: ${name}`, "");
    } else {
      await addLog("project", `แก้ไขโปรเจกต์: ${name}`, "");
    }
    await savePrograms();
    closeSheet();
    render();
    toast(isNew ? "สร้างโปรเจกต์แล้ว" : "บันทึกแล้ว");
  };

  // Delete
  if(!isNew){
    const del = $("#prDelete");
    if(del) del.onclick = async ()=>{
      const linked = projects.filter(p => p.programId === prog.id).length;
      const msg = linked > 0
        ? `ลบโปรเจกต์ "${prog.name}"?\n\nมี ${linked} งานผูกอยู่ — งานจะยังอยู่ครบ เพียงแต่จะไม่อยู่ในโปรเจกต์นี้อีก`
        : `ลบโปรเจกต์ "${prog.name}"?`;
      if(!confirm(msg)) return;
      // Unlink any tasks pointing to this program
      let unlinkedCount = 0;
      projects.forEach(p => {
        if(p.programId === prog.id){ p.programId = ""; unlinkedCount++; }
      });
      if(unlinkedCount > 0) await saveProjects();
      programs = programs.filter(p => p.id !== prog.id);
      await savePrograms();
      await addLog("project", `ลบโปรเจกต์: ${prog.name}`, unlinkedCount>0 ? `ปลดล็อก ${unlinkedCount} งาน` : "");
      closeSheet();
      render();
      toast("ลบโปรเจกต์แล้ว");
    };
  }
}

              return `

                  <div class="ach-emoji">${is?a.emoji:icon("lock",20)}</div>
                  <div class="ach-name">${esc(a.name)}</div>
                  <div class="ach-desc">${esc(a.desc)}</div>

      </div>
    </div>
  `;
}

// HISTORY LOG PAGE
let chatScope = "team"; // "team" or a project id
function renderChatPage(me){
  const activeProjects = projects.filter(p=>!p.cancelled);
  // Permission gate: never show messages from scopes I can't access
  const msgs = chatMsgs.filter(m=>{
    const sc = m.scope||"team";
    if(sc !== chatScope) return false;
    return canSeeScope(myName, sc);
  }).slice().sort((a,b)=>new Date(a.ts)-new Date(b.ts));
  const myEmojiUnlocked = userHasRedeem(myName, "r_emoji");
  // Scope name resolution (DM / project / team)
  let scopeName;
  if(chatScope === "team") scopeName = "แชทรวมทีม";
  else if(isDmScope(chatScope)) scopeName = "💬 คุยกับ " + dmOtherParticipant(chatScope, myName);
  else {
    const p = projects.find(x=>x.id===chatScope);
    scopeName = p ? ("งาน: " + (p.title||"(ไม่มีชื่อ)")) : "แชทรวมทีม";
  }
  // Build DM partner list (everyone on team except myself)
  const dmPartners = sortTeam(Object.values(users))
    .filter(u => nKey(u.name) !== nKey(myName));

  return `
    ${topbarHTML("แชททีม", SHEET_URL?"ข้อความซิงค์ทุก 30 วิ · กดรีเฟรชเพื่อดูล่าสุดทันที":"โหมดในเครื่อง — เชื่อม Google Sheet เพื่อให้ทีมเห็นร่วมกัน", me)}
    <div class="chat-wrap">
      <div class="chat-scopebar">
        <button class="chat-scope-btn ${chatScope==="team"?"on":""}" data-chatscope="team">
          ${icon("team",15)} แชทรวมทีม
          ${(()=>{ const n=unreadInScope("team"); return n>0?`<span class="chat-scope-badge">${n>99?"99+":n}</span>`:""; })()}
        </button>
        <select class="chat-proj-select" id="chatDmSel" title="แชทเดี่ยว — เห็นแค่ 2 คน">
          <option value="">— 💬 คุยส่วนตัวกับ —</option>
          ${dmPartners.map(u => {
            const sc = dmScope(myName, u.name);
            const n = sc ? unreadInScope(sc) : 0;
            const sel = (sc === chatScope) ? "selected" : "";
            return `<option value="${esc(sc)}" ${sel}>${esc(u.name)}${n>0?` 🔴 ${n}`:""}</option>`;
          }).join("")}
        </select>
        <select class="chat-proj-select" id="chatProjSel">
          <option value="">— เลือกงานเพื่อคุยเฉพาะงาน —</option>
          ${activeProjects.filter(p => projectInvolves(p, myName) || meIsAdmin() || nKey(p.createdBy||"")===nKey(myName)).map(p=>{
            const n = unreadInScope(p.id);
            return `<option value="${p.id}" ${chatScope===p.id?"selected":""}>${esc(p.title||"(ไม่มีชื่อ)")}${n>0?` 🔴 ${n}`:""}</option>`;
          }).join("")}
        </select>
      </div>

      <div class="chat-head-label">${esc(scopeName)} · ${msgs.length} ข้อความ</div>

      <div class="chat-stream" id="chatStream">
        ${msgs.length===0
          ? `<div class="chat-empty">ยังไม่มีข้อความ เริ่มต้นการสนทนาได้เลย</div>`
          : msgs.map(m=>{
              const mine = nKey(m.who)===nKey(myName);
              const title = userTitle(m.who);
              const hasFrame = userHasRedeem(m.who,"r_frame");
              const hasBadge = userHasRedeem(m.who,"r_badge");
              const d=new Date(m.ts);
              const tm=d.toLocaleString("th-TH",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"});
              const isSticker = typeof m.text==="string" && m.text.startsWith(STICKER_PREFIX);
              const stickerChar = isSticker ? m.text.slice(STICKER_PREFIX.length) : "";
              return `
                <div class="chat-msg ${mine?'mine':''}">
                  <div class="chat-ava" ${hasFrame?'style="box-shadow:0 0 0 2px var(--warm)"':''}>${avatarHTML(m.who,32)}</div>
                  <div class="chat-bubble-wrap">
                    <div class="chat-meta">
                      <span class="chat-name">${esc(m.who)}</span>
                      ${title?`<span class="chat-title">${esc(title)}</span>`:""}
                      ${hasBadge?`<span class="chat-badge" title="ป้ายเกียรติยศ">🏅</span>`:""}
                      <span class="chat-time">${tm}</span>
                    </div>
                    ${isSticker
                      ? `<div class="chat-sticker">${esc(stickerChar)}</div>`
                      : `<div class="chat-bubble">${esc(m.text)}</div>`}
                    ${mine?`<button class="chat-del" data-chatdel="${m.id}">ลบ</button>`:""}
                  </div>
                </div>`;
            }).join("")}
      </div>

      ${myEmojiUnlocked?`
        <div class="chat-sticker-label">สติกเกอร์เกียรติยศของคุณ — กดเพื่อส่ง</div>
        <div class="chat-emoji-bar">
          ${SPECIAL_EMOJI.map(e=>`<button class="chat-emoji-btn" data-sticker="${e}">${e}</button>`).join("")}
        </div>`:""}

      <div class="chat-input-row">
        <input class="chat-input" id="chatInput" placeholder="${(()=>{ if(chatScope==='team') return 'พิมพ์ข้อความถึงทีม...'; if(isDmScope(chatScope)) return 'พิมพ์ข้อความถึง '+dmOtherParticipant(chatScope, myName)+'...'; return 'พิมพ์ข้อความเฉพาะงานนี้...'; })()}" maxlength="1000"/>
        <button class="chat-send" id="chatSend">${icon("send",16)||"ส่ง"}</button>
      </div>
      ${!myEmojiUnlocked?`<div class="chat-hint">แลก "สติกเกอร์เกียรติยศ" ในหน้าระดับและรางวัล เพื่อส่งสติกเกอร์รูปใหญ่พิเศษในแชท (ต่างจากอิโมจิทั่วไป — คนไม่แลกส่งไม่ได้)</div>`:""}
    </div>
  `;
}

function wireChat(){
  const stream=$("#chatStream");
  if(stream) stream.scrollTop = stream.scrollHeight;

  // Mark current scope as read whenever this page renders (debounced so re-render doesn't spam writes)
  markChatRead(chatScope);

  document.querySelectorAll("[data-chatscope]").forEach(b=>{
    b.onclick=async()=>{ await markChatRead("team"); chatScope="team"; render(); };
  });
  const dmSel = $("#chatDmSel");
  if(dmSel) dmSel.onchange = async () => {
    if(!dmSel.value) return;
    await markChatRead(dmSel.value);
    chatScope = dmSel.value; render();
  };
  const sel=$("#chatProjSel");
  if(sel) sel.onchange=async()=>{
    const next = sel.value || "team";
    await markChatRead(next);
    chatScope = next; render();
  };

  const input=$("#chatInput");
  const doSend=async()=>{
    if(!input || !input.value.trim()) return;
    const txt=input.value;
    input.value="";
    await sendChat(txt, chatScope);
    render();
    const s=$("#chatStream"); if(s) s.scrollTop=s.scrollHeight;
  };
  const sb=$("#chatSend");
  if(sb) sb.onclick=doSend;
  if(input) input.onkeydown=(e)=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); doSend(); } };

  document.querySelectorAll("[data-sticker]").forEach(b=>{
    b.onclick=async()=>{
      await sendChat(STICKER_PREFIX + b.dataset.sticker, chatScope);
      render();
      const s=$("#chatStream"); if(s) s.scrollTop=s.scrollHeight;
    };
  });
  document.querySelectorAll("[data-chatdel]").forEach(b=>{
    b.onclick=async()=>{
      if(!confirm("ลบข้อความนี้?")) return;
      await deleteChat(b.dataset.chatdel);
      render();
    };
  });
}

function renderHistoryPage(me){
  const ACT = {

    done:{ic:"check",c:"var(--ok)",label:"ปิดงานเสร็จ"},
    status:{ic:"restore",c:"var(--blue)",label:"เปลี่ยนสถานะ"},
    cancel:{ic:"cancel",c:"var(--crit)",label:"ยกเลิกงาน"},
    restore:{ic:"restore",c:"var(--ok)",label:"กู้คืนงาน"},
    task:{ic:"check",c:"var(--blue)",label:"ทำงานย่อยเสร็จ"},
    note:{ic:"note",c:"var(--accent)",label:"เพิ่มบันทึก"},
    edit:{ic:"settings",c:"var(--label2)",label:"แก้ไขงาน"},
    reward:{ic:"award",c:"var(--accent)",label:"ตั้งรางวัล"},
    import:{ic:"upload",c:"var(--accent)",label:"นำเข้าข้อมูล"},
  };
  // group by date
  const groups={};
  history.forEach(h=>{
    const d=new Date(h.ts);
    const key=d.toLocaleDateString("th-TH",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
    if(!groups[key]) groups[key]=[];
    groups[key].push(h);
  });
  const keys=Object.keys(groups);

  return `
    ${topbarHTML("ประวัติการทำงาน", `${history.length} รายการล่าสุด · ใครทำอะไรบ้าง`, me)}
    <div class="hist">

        <div class="hist-empty">

          <div style="font-size:15px;font-weight:700;margin-top:12px">ยังไม่มีประวัติ</div>
          <div style="font-size:13px;color:var(--label2);margin-top:4px">เมื่อมีคนสร้างงาน ปิดงาน หรือยกเลิกงาน จะถูกบันทึกที่นี่</div>
        </div>
      `:keys.map(k=>`
        <div class="hist-day">
          <div class="hist-day-label">${k}</div>
          <div class="stagger">
          ${groups[k].map(h=>{
            const a=ACT[h.action]||{ic:"note",c:"var(--label2)",label:h.action};
            const t=new Date(h.ts).toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
            return `
              <div class="hist-item">
                <div class="hist-ic" style="color:${a.c}">${icon(a.ic,16)}</div>
                <div class="hist-body">
                  <div class="hist-line"><b>${esc(h.who)}</b> ${a.label}${h.target?` · <span class="hist-target">${esc(h.target)}</span>`:""}</div>
                  ${h.detail?`<div class="hist-detail">${esc(h.detail)}</div>`:""}
                </div>
                <div class="hist-time">${t}</div>
              </div>`;
          }).join("")}
          </div>
        </div>
      `).join("")}
      ${history.length>0&&meIsAdmin()?`<button class="pj-addrow" id="histClear" style="margin:16px;width:calc(100% - 32px);border-color:var(--crit);color:var(--crit)">ล้างประวัติทั้งหมด</button>`:""}
    </div>
  `;
}

function wireProjects(){
  const wa=$("#welcomeAvatar"); if(wa) wa.onclick=openProfileSheet;

  // Dismiss last-import banner
  document.querySelectorAll("[data-dismiss-lastimp]").forEach(b=>{
    b.onclick=()=>{
      try { localStorage.removeItem(LAST_IMPORT_KEY); } catch(e){}
      const banner=document.getElementById("lastImpBanner");
      if(banner) banner.style.display="none";
    };
  });

  // Filter chips
  document.querySelectorAll("[data-scope]").forEach(b=>{
    b.onclick=()=>{ projectScope=b.dataset.scope; window._scopeTouched=true; render(); };
  });
  document.querySelectorAll("[data-statusf]").forEach(b=>{
    b.onclick=()=>{ projectStatusFilter=b.dataset.statusf; render(); };
  });

  // v17: View mode toggle (Table / Card)
  document.querySelectorAll("[data-viewmode]").forEach(b=>{
    b.onclick=()=>{
      const mode = b.dataset.viewmode;
      if(mode === projectViewMode) return;
      projectViewMode = mode;
      try { localStorage.setItem("bt-viewmode", mode); } catch(e){}
      render();
    };
  });
  // v17: Quick-add input (Table mode) — press Enter to create instantly
  const qaInput = $("#pjQuickAdd");
  if(qaInput){
    qaInput.onkeydown = async (e) => {
      if(e.key !== "Enter") return;
      const title = qaInput.value.trim();
      if(!title) return;
      const np={
        id:genId(), title, description:"",
        status:"todo", priority:"medium", assignee:myName, collaborators:[],
        dueDate:"", actualDate:"", budget:0, spent:0, color:CARD_COLORS[6],
        autoPriority:true, cancelled:false,
        createdBy:myName, createdAt:new Date().toISOString(),
        updatedAt:new Date().toISOString(), tasks:[], notes:[],
      };
      projects.unshift(np);
      await saveProjects();
      await addLog("create", np.title, `เพิ่มเร็ว · ${prioObj(np.priority).label}`);
      qaInput.value = "";
      toast(`เพิ่ม "${title}" แล้ว`);
      window._justAddedId = np.id; // v18: marker for highlight animation
      render();
      setTimeout(()=>{
        const fresh = document.querySelector("#pjQuickAdd"); if(fresh) fresh.focus();
        const newRow = document.querySelector(`.pj-tr[data-row="${np.id}"]`);
        if(newRow){
          newRow.classList.add("pj-tr-justadded");
          newRow.scrollIntoView({behavior:"smooth", block:"nearest"});
          setTimeout(()=>newRow.classList.remove("pj-tr-justadded"), 1900);
        }
      }, 50);
    };
  }

  // v31: FAB (Floating Action Button) — single circular button replaces both old bars.
  //      Same handler as the old top/bottom buttons; backward-compat with old IDs kept
  //      in case anything else still references them.
  const addNewProject = async () => {
    const np={
      id:genId(), title:"", description:"",
      status:"todo", priority:"medium", assignee:myName, collaborators:[],
      dueDate:"", actualDate:"", budget:0, spent:0, color:CARD_COLORS[6],
      autoPriority:true, cancelled:false,
      createdBy:myName, createdAt:new Date().toISOString(),
      updatedAt:new Date().toISOString(), tasks:[], notes:[],
    };
    // Reset status filter so the new (todo) task is always visible — user always sees what they just added
    if(projectStatusFilter && projectStatusFilter !== "" && projectStatusFilter !== "todo") {
      projectStatusFilter = "";
    }
    projects.push(np);
    await saveProjects(); render();
    // Smoothly scroll the new card into view + focus its title input — never lose user's attention
    setTimeout(()=>{
      const newCard = document.querySelector(`[data-row="${np.id}"]`);
      if(!newCard) return;
      newCard.scrollIntoView({ behavior:"smooth", block:"center" });
      newCard.classList.add("pj-just-added");      // v61: brief glow so it's obvious
      setTimeout(()=>newCard.classList.remove("pj-just-added"), 2200);
      const inp = newCard.querySelector(".pj-title-input");
      if(inp) inp.focus({ preventScroll: true });
    }, 100);
  };
  const fab=$("#pjAddFab"); if(fab) fab.onclick = addNewProject;
  const arT=$("#pjAddRowTop"); if(arT) arT.onclick = addNewProject;
  const ar=$("#pjAddRow");     if(ar)  ar.onclick  = addNewProject;

  // Inline text/number edits (title, description, budget — both Card and Table view)
  document.querySelectorAll(".pj-cell-input, .pj-title-input, .pj-desc-input, .pj-tt-input").forEach(el=>{
    el.onchange=async()=>{
      const p=projects.find(x=>x.id===el.dataset.id); if(!p) return;
      const f=el.dataset.f;
      const wasEmpty = f==="title" && !p.title;
      if(f==="budget") p.budget=Number(el.value)||0;
      else p[f]=el.value;
      p.updatedAt=new Date().toISOString();
      await saveProjects();
      if(wasEmpty && p.title){ await addLog("create", p.title, `ผู้ดูแลโครงการ ${p.assignee||"-"}`); }
    };
  });

  // Collab add button (admin only)
  document.querySelectorAll("[data-collabadd]").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      openCollabPickerSheet(btn.dataset.collabadd);
    };
  });

  // Select edits (legacy native selects, if any remain anywhere)
  document.querySelectorAll(".pj-select").forEach(el=>{
    el.onchange=async()=>{
      const p=projects.find(x=>x.id===el.dataset.id); if(!p) return;
      const f=el.dataset.f; const prev=p[f]; p[f]=el.value;
      p.updatedAt=new Date().toISOString();
      if(f==="priority"){ p.autoPriority=false; }
      if(f==="status"){
        const newStatus = el.value;
        p.status = prev;
        const wasNotDone = prev!=="done";
        applyStatusTransition(p, newStatus, myName);
        if(p.status==="done" && !p.actualDate){ p.actualDate=todayDate(); }
        await saveProjects();
        if(p.status==="done" && wasNotDone){
          if(!p.xpGranted){
            // v30: First-time completion → grant XP, then lock the flag forever
            await addLog("done", p.title||"(ไม่มีชื่อ)", `ความสำคัญ ${prioObj(p.priority).label}`);
            await completeProject(p);
            p.xpGranted = true;
            await saveProjects();
          } else {
            // v30: Reopened-then-reclosed → log only, no XP (anti-exploit)
            await addLog("status", p.title||"(ไม่มีชื่อ)", `${colObj(prev).label} → ${colObj(p.status).label} (ปิดงานซ้ำ — ไม่มอบ XP)`);
          }
        } else {
          await addLog("status", p.title||"(ไม่มีชื่อ)", `${colObj(prev).label} → ${colObj(p.status).label}`);
        }
        render(); return;
      }
      await saveProjects();
      if(f==="priority"){ el.style.color=prioObj(p.priority).color; }
    };
  });

  // ═══ Custom rounded dropdowns (assignee / status / priority) ═══
  document.querySelectorAll(".pj-dd-btn[data-dd]").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      if(btn.disabled) return;
      const p = projects.find(x => x.id === btn.dataset.id);
      if(!p) return;
      const which = btn.dataset.dd;
      let options = [];
      let currentVal = "";
      if(which === "assignee"){
        // v19: hard guard — only admins can reassign
        if(!meIsAdmin()){ toast("เฉพาะหัวหน้าเปลี่ยนผู้รับผิดชอบงานได้"); return; }
        const opts = sortTeam(Object.values(users));
        options = opts.map(u => ({ value:u.name, label:u.name, color:avatarColor(u.name) }));
        currentVal = p.assignee || "";
      } else if(which === "status"){
        // v19: hard guard — only assignee, collaborator, creator, or admin can change status
        if(!canEditStatus(p, myName)){ toast("คุณไม่มีสิทธิ์เปลี่ยนสถานะงานนี้ — เฉพาะผู้รับผิดชอบเท่านั้น"); return; }
        options = COLUMNS.map(c => ({ value:c.id, label:c.label, color:c.color }));
        currentVal = p.status;
      } else if(which === "priority"){
        options = PRIORITIES.map(x => ({ value:x.id, label:x.label, color:x.color }));
        currentVal = p.priority;
      }
      openCustomDropdown(btn, options, currentVal, async (newVal) => {
        const prev = p[which];
        if(prev === newVal) return;
        if(which === "priority"){ p.priority = newVal; p.autoPriority = false; }
        else if(which === "status"){
          const wasNotDone = prev !== "done";
          applyStatusTransition(p, newVal, myName);
          if(p.status === "done" && !p.actualDate) p.actualDate = todayDate();
          await saveProjects();
          if(p.status === "done" && wasNotDone){
            if(!p.xpGranted){
              // v30: First-time completion → grant XP, then lock the flag forever
              await addLog("done", p.title||"(ไม่มีชื่อ)", `ความสำคัญ ${prioObj(p.priority).label}`);
              await completeProject(p);
              p.xpGranted = true;
              await saveProjects();
            } else {
              // v30: Reopened-then-reclosed → log only, no XP (anti-exploit)
              await addLog("status", p.title||"(ไม่มีชื่อ)", `${colObj(prev).label} → ${colObj(p.status).label} (ปิดงานซ้ำ — ไม่มอบ XP)`);
              toast("งานนี้เคยปิดและรับ XP ไปแล้ว — ปิดซ้ำไม่ได้รับ XP เพิ่ม");
            }
          } else {
            await addLog("status", p.title||"(ไม่มีชื่อ)", `${colObj(prev).label} → ${colObj(p.status).label}`);
          }
          render(); return;
        }
        else { p[which] = newVal; }
        p.updatedAt = new Date().toISOString();
        await saveProjects();
        render();
      });
    };
  });

  // Deadline picker — auto-set priority from the window owner gave themselves
  document.querySelectorAll("[data-datebtn]").forEach(b=>{
    b.onclick=()=>{
      const p=projects.find(x=>x.id===b.dataset.datebtn); if(!p) return;
      openDatePicker(p.dueDate||"", async(date, time)=>{
        p.dueDate=date||"";
        p.startTime = time||"";   // v59b: เวลาเริ่มงาน in date popup
        if(p.dueDate && p.autoPriority!==false){
          const created=p.createdAt?new Date(p.createdAt):new Date();
          const due=new Date(p.dueDate);
          const win=Math.round((due-created)/86400000);
          p.priority=autoPriorityFromWindow(win);
        }
        p.updatedAt=new Date().toISOString();
        await saveProjects(); render();
        if(p.dueDate && p.autoPriority!==false){
          toast(`ตั้งความสำคัญอัตโนมัติ: ${prioObj(p.priority).label}`);
        }
      }, { withTime:true, time:p.startTime||"", timeLabel:"เวลาเริ่ม" });
    };
  });
  // Actual completion date picker
  document.querySelectorAll("[data-actualbtn]").forEach(b=>{
    b.onclick=()=>{
      const p=projects.find(x=>x.id===b.dataset.actualbtn); if(!p) return;
      openDatePicker(p.actualDate||"", async(date, time)=>{
        p.actualDate=date||""; p.endTime = time||"";   // v59b: เวลาจบงาน in popup
        p.updatedAt=new Date().toISOString();
        await saveProjects(); render();
      }, { withTime:true, time:p.endTime||"", timeLabel:"เวลาจบ" });
    };
  });

  document.querySelectorAll("[data-open]").forEach(b=>{
    b.onclick=()=>toggleInlineDetail(b.dataset.open, b);
  });

  // Cancel (instead of delete) — requires reason, keeps history
  document.querySelectorAll("[data-cancel]").forEach(b=>{
    b.onclick=()=>{
      const p=projects.find(x=>x.id===b.dataset.cancel); if(!p) return;
      openCancelReason(p);
    };
  });
  // Restore cancelled
  document.querySelectorAll("[data-restore]").forEach(b=>{
    b.onclick=async()=>{
      const p=projects.find(x=>x.id===b.dataset.restore); if(!p) return;
      p.cancelled=false;
      p.updatedAt=new Date().toISOString();
      await saveProjects();
      await addLog("restore", p.title||"(ไม่มีชื่อ)", "");
      render();
      toast("กู้คืนงานแล้ว");
    };
  });
}

// ─── Admin PIN lock (settings for Kongigo only) ───
function hashPin(s){ // lightweight non-crypto hash, enough to gate UI
  let h=0; for(let i=0;i<s.length;i++){ h=(h<<5)-h+s.charCodeAt(i); h|=0; }
  return String(h);
}
async function getStoredPin(){
  try{ const r=await sget(ADMIN_PIN_KEY,true); return r?r.value:null; }catch(e){ return null; }
}
// Show PIN gate. onOK() runs only after correct PIN (or after first-time setup).

      await sset(ADMIN_PIN_KEY, hashPin(a), true);

      closeSheet();
      onOK();
    };
    return;
  }
  // existing PIN — ask to unlock
  sheetShell(`

      <button class="sheet-close" id="pnClose">✕</button>

    </div>
    <div class="group"><div class="row">
      <input class="ios-input" id="pnEnter" type="password" inputmode="numeric" placeholder="ใส่รหัส" maxlength="8"/>
    </div></div>
    <button class="btn-primary" id="pnGo">ปลดล็อก</button>
    <div style="height:8px"></div>

    <div style="height:8px"></div>
  `);
  const tryUnlock=async()=>{
    const v=$("#pnEnter").value.trim();
    if(hashPin(v)===stored){ closeSheet(); onOK(); }

    const cloudIsEmpty = !cloudHasProj && !cloudHasUsers && !cloudHasLog && !cloudHasChat;

      try{ await sset(USERS_KEY, JSON.stringify(users),    true); }catch(e){}
      try{ await sset(LOG_KEY,   JSON.stringify(history),  true); }catch(e){}
      try{ await sset(CHAT_KEY,  JSON.stringify(chatMsgs), true); }catch(e){}
    }
    await loadAll();
    render();
    if(!cloudIsEmpty){ toast("✓ ดึงข้อมูลทีมเรียบร้อย"); }
  };

// v53: Score a finished project by how early/late it was vs its deadline —
// NOT by a self-chosen "priority" label (which everyone could just set to urgent).
//   • on/before deadline → reward, scaled by how many days early
//   • after deadline      → penalty, scaled by how many days late
// Anti-padding buffer: the "days early" that count are capped at how long the job
// actually took (createdAt → completion). So setting a far-off deadline on a quick
// task can't farm the full +40 — a job you finished in a day can claim at most one
// day early, regardless of how distant the deadline was.
function scoreForCompletion(p){
  // No deadline → can't measure early/late. Give a small flat completion reward.
  if(!p.dueDate) return { points: 20, timing: "none", daysDiff: null, capped: false };

  const due = new Date(p.dueDate); due.setHours(0,0,0,0);
  const actRaw = p.actualDate ? new Date(p.actualDate)
               : (p.completedAt ? new Date(p.completedAt) : new Date());
  actRaw.setHours(0,0,0,0);
  let diffDays = Math.round((due - actRaw) / 86400000); // + = early, 0 = on time, − = late

  let capped = false;
  if(diffDays > 0){
    // Anti-padding: "days early" can't exceed the days actually spent working
    // (createdAt → completion). A task finished in 1 day can claim at most "1 day
    // early", no matter how far out the deadline was set. Big jobs that genuinely
    // took many days and still beat the deadline keep their full early bonus.
    const created = p.createdAt ? new Date(p.createdAt) : actRaw;
    created.setHours(0,0,0,0);
    const workDays = Math.max(1, Math.round((actRaw - created) / 86400000));
    if(diffDays > workDays){ diffDays = workDays; capped = true; }
  }

  let points, timing;
  if(diffDays >= 3){ points = 40; timing = "early"; }
  else if(diffDays === 2){ points = 30; timing = "early"; }
  else if(diffDays === 1){ points = 20; timing = "early"; }
  else if(diffDays === 0){ points = 20; timing = "ontime"; }
  else if(diffDays === -1){ points = -10; timing = "late"; }
  else if(diffDays === -2){ points = -20; timing = "late"; }
  else { points = -30; timing = "late"; }  // 3+ days late

  return { points, timing, daysDiff: diffDays, capped };
}

async function completeProject(p){
  const sc = scoreForCompletion(p);
  const total = sc.points;
  const onTime = sc.points > 0 || sc.timing === "ontime";
  // v16: Multi-assign XP sharing — primary gets full, collabs get 50%
  const combo = awardProjectCoins(p, total, "project");
  const result = combo.primary || { granted: 0, newAchievements: [], leveledUp: false, oldLevel: 1, newLevel: 1 };
  result.collabs = combo.collabs;
  result.collabAmount = combo.collabAmount;
  result.base = total;
  result.onTime = onTime;
  result.timing = sc.timing;
  result.daysDiff = sc.daysDiff;
  result.capped = sc.capped;
  result.bonus = 0;            // v53: timing is folded into the base score now
  result.priorityLabel = prioObj(p.priority).label;
  // remaining points to next level — show PRIMARY's level (the assignee), not the clicker's
  const primaryUser = getUser(p.assignee);
  result.levelInfo = levelInfo(primaryUser ? primaryUser.xp || 0 : 0);
  result.primaryName = p.assignee;
  await saveUsers();
  openGiftBox(p, result);
}

function exportCSV(){
  const headers = ["ชื่องาน","ผู้รับผิดชอบ","สถานะ","ความสำคัญ","Deadline","วันที่เสร็จจริง","วันคงเหลือ","เตือน","หมายเหตุ","งบประมาณ","ใช้ไป","คงเหลือ","Tasks ทั้งหมด","Tasks เสร็จ","%ความคืบหน้า","วันที่สร้าง"];
  const rows = projects.map(p=>{
    const done = (p.tasks||[]).filter(t=>t.done).length;
    const total = (p.tasks||[]).length;
    const pct = total>0?Math.round(done/total*100):0;
    const budget = p.budget||0;
    const spent = p.spent||0;
    const d = p.dueDate?daysUntil(p.dueDate):null;
    let warn;
    if(p.status==="done") warn="🎉 เสร็จ";
    else if(d===null) warn="— ไม่มีกำหนด";
    else if(d<0) warn="🚨 เกินกำหนด";
    else if(d<=3) warn="⚠️ ใกล้ครบ";
    else warn="✅ ตามแผน";
    return [
      p.title,
      p.assignee||"",
      colObj(p.status).label,
      prioObj(p.priority).label,
      p.dueDate?fmtDateFull(p.dueDate):"",
      p.actualDate?fmtDateFull(p.actualDate):"",
      d===null?"":d+" วัน",
      warn,
      (p.description||"").replace(/[\r\n]+/g," "),
      budget, spent, budget-spent,
      total, done, pct+"%",
      p.createdAt?fmtDateFull(p.createdAt):"",
    ].map(cell=>{
      const s=String(cell);
      if(s.includes(",")||s.includes('"')||s.includes("\n")) return `"${s.replace(/"/g,'""')}"`;
      return s;
    }).join(",");
  });
  const csv = "\ufeff" + [headers.join(","), ...rows].join("\n");
  const blob = new Blob([csv],{type:"text/csv;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `jobs-tracker-${todayDate()}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),200);
  toast("📑 Export CSV สำเร็จ");
}

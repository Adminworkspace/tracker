async function bootstrapTeam(){
  let changed=false;
  TEAM.forEach(t=>{
    const k=nKey(t.name);
    if(!users[k]){
      users[k] = {
        name:t.name, avatar:null,
        role: t.role || "member",
        color:t.color, emoji:t.emoji,
        xp:0, coins:0, streak:0, lastActive:null,
        achievements:[], redeemed:[], redeemLog:{},
        stats:{tasksDone:0,projectsDone:0,notesAdded:0},
        chatRead:{}, profileTitle:"",
        createdAt: new Date().toISOString(),
      };
      changed=true;
    } else {
      const u=users[k];
      if(u.coins===undefined){ u.coins=0; changed=true; }
      if(u.xp===undefined){ u.xp=u.coins||0; changed=true; } // xp = lifetime points (level), never spent
      if(u.streak===undefined){ u.streak=0; changed=true; }
      if(u.lastActive===undefined){ u.lastActive=null; changed=true; }
      if(!u.achievements){ u.achievements=[]; changed=true; }
      if(!u.redeemed){ u.redeemed=[]; changed=true; }
      if(!u.redeemLog){ u.redeemLog={}; changed=true; } // { rewardId: "YYYY-MM" } last redeemed month
      if(!u.stats){ u.stats={tasksDone:0,projectsDone:0,notesAdded:0}; changed=true; }
      if(!u.chatRead){ u.chatRead={}; changed=true; } // { scopeId: lastSeenIsoTs } unread tracker
      if(u.emoji !== t.emoji){ u.emoji=t.emoji; changed=true; }
      if(u.color !== t.color){ u.color=t.color; changed=true; }
    }
  });
  // v47: only persist if safe (cloud ok or no cloud) — never overwrite good cloud data
  const safeToSave = (typeof window.__cloudSyncOK === "undefined") ? true : window.__cloudSyncOK;
  if(changed && safeToSave) await saveUsers();
}

function updateStreak(user){
  const today = todayDate();
  if(user.lastActive === today) return;
  const last = user.lastActive;
  if(!last){ user.streak = 1; }
  else {
    const diffDays = Math.round((new Date(today) - new Date(last))/86400000);
    if(diffDays === 1) user.streak = (user.streak||0)+1;
    else if(diffDays > 1) user.streak = 1;
  }
  user.lastActive = today;
}

function awardCoins(userName, amount, kind){
  const u = getUser(userName);
  if(!u) return { newAchievements:[], leveledUp:false, oldLevel:1, newLevel:1, granted:0 };
  // Leaders (admins) focus on assigning work — they don't accumulate XP/coins themselves
  if(u.role === "admin"){
    return { newAchievements:[], leveledUp:false, oldLevel:1, newLevel:1, granted:0, skippedLeader:true };
  }
  if(u.xp===undefined) u.xp=u.coins||0;
  const oldXp = u.xp||0;
  const oldLv = levelInfo(oldXp).lv;

  // v53: a negative `amount` (late-delivery penalty) may not push a person below 0.
  // It can shave points earned this cycle, but never eats into banked progress.
  let granted = amount;
  if(granted < 0){
    granted = Math.max(granted, -oldXp);          // floor lifetime xp at 0
    granted = Math.max(granted, -(u.coins||0));   // and wallet at 0 too
  }
  u.xp = oldXp + granted;       // lifetime — drives level, never spent
  u.coins = (u.coins||0) + granted; // wallet — spent on redeems
  // Penalties don't count as a "completed" stat or touch streaks/achievements.
  if(granted >= 0){
    if(kind==="task")    u.stats.tasksDone = (u.stats.tasksDone||0)+1;
    if(kind==="project") u.stats.projectsDone = (u.stats.projectsDone||0)+1;
    if(kind==="note")    u.stats.notesAdded = (u.stats.notesAdded||0)+1;
    updateStreak(u);
  }
  const newAch = [];
  const ctx = { ...u.stats, streak:u.streak, coins:u.xp }; // achievements check against lifetime xp
  ACHIEVEMENTS.forEach(a=>{
    if(!u.achievements.includes(a.id) && a.check(ctx)){
      u.achievements.push(a.id);
      u.xp += a.reward; u.coins += a.reward;
      newAch.push(a);
    }
  });
  return { newAchievements:newAch, leveledUp:levelInfo(u.xp).lv>oldLv, oldLevel:oldLv, newLevel:levelInfo(u.xp).lv, granted };
}

// ═══════════════════════════════════════════════════════════════════════
// v16: Multi-assign XP sharing (Model B — Primary 100% + Collab 50%)
//   ─ Primary (assignee) gets `amount` full
//   ─ Each collaborator gets `Math.round(amount * 0.5)`
//   ─ Admins automatically skipped (handled by awardCoins itself)
//   ─ The same `kind` stat counter increments for each recipient
//   ─ Returns { primary: <result>, collabs: [{ name, result }] } for UI feedback
// Use this for project-level and task-level rewards. For solo grants
// (e.g., a personal note add), keep using awardCoins() directly.
// ═══════════════════════════════════════════════════════════════════════
function awardProjectCoins(project, amount, kind){
  if(!project) return { primary:null, collabs:[] };
  const primaryResult = awardCoins(project.assignee, amount, kind);
  const collabAmount  = Math.floor(amount * 0.5);
  const collabs = [];
  if(collabAmount > 0 && Array.isArray(project.collaborators)){
    project.collaborators.forEach(name => {
      if(!name) return;
      // Avoid double-rewarding if collaborator list accidentally includes primary
      if(nKey(name) === nKey(project.assignee)) return;
      const r = awardCoins(name, collabAmount, kind);
      collabs.push({ name, result: r, amount: collabAmount });
    });
  }
  return { primary: primaryResult, collabs, primaryAmount: amount, collabAmount };
}

const cvs=$("#confetti"), ctx=cvs.getContext("2d");
function resizeCvs(){ cvs.width=innerWidth; cvs.height=innerHeight; }
resizeCvs(); addEventListener("resize",resizeCvs);
let parts=[];
// Celebration confetti — used ONLY for early-completion success. Refined palette, not childish.
const CONFETTI_COLORS=["#0E7C66","#0A5E4D","#9DCFC3","#D4A24E","#1E293B","#E6F4F0"];
function burstConfetti(x,y,count=0){
  if(count<=0) return;
  for(let i=0;i<count;i++){
    const a=(Math.PI*2*i)/count + Math.random()*0.5;
    const sp=3+Math.random()*5;
    parts.push({
      x,y,
      vx:Math.cos(a)*sp,
      vy:Math.sin(a)*sp-3,
      g:0.14+Math.random()*0.05,
      size:6+Math.random()*5,
      color:CONFETTI_COLORS[i%CONFETTI_COLORS.length],
      rot:Math.random()*Math.PI,
      vr:(Math.random()-0.5)*0.3,
      life:42+Math.random()*22
    });
  }
  requestAnimationFrame(animConfetti);
}
function animConfetti(){
  ctx.clearRect(0,0,cvs.width,cvs.height);
  parts=parts.filter(p=>p.life>0);
  parts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=p.g; p.rot+=p.vr; p.life--;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.globalAlpha=Math.max(0,p.life/45); ctx.fillStyle=p.color;
    ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.62); ctx.restore();
  });
  if(parts.length>0) requestAnimationFrame(animConfetti);
  else ctx.clearRect(0,0,cvs.width,cvs.height);
}

function animateNum(el,target){
  const start=parseInt(el.textContent)||0;
  if(start===target){ el.textContent=target; return; }
  const dur=Math.min(900, 400+Math.abs(target-start)*8), t0=performance.now();
  function step(now){
    const p=Math.min(1,(now-t0)/dur);
    const e = p===1 ? 1 : 1-Math.pow(2,-10*p); // easeOutExpo — fast then gently settles
    el.textContent=Math.round(start+(target-start)*e);
    if(p<1) requestAnimationFrame(step);
    else el.textContent=target;
  }
  requestAnimationFrame(step);
}

// Ripple feedback on tap — subtle, satisfying, not loud
function attachRipple(el){
  if(el._rip) return; el._rip=true;
  el.classList.add("ripple");
  el.addEventListener("pointerdown",e=>{
    const r=el.getBoundingClientRect();
    const d=Math.max(r.width,r.height);
    const dot=document.createElement("span");
    dot.className="ripple-dot";
    dot.style.width=dot.style.height=d+"px";
    dot.style.left=(e.clientX-r.left-d/2)+"px";
    dot.style.top=(e.clientY-r.top-d/2)+"px";
    el.appendChild(dot);
    setTimeout(()=>dot.remove(),560);
  });
}
function wireRipples(){
  document.querySelectorAll(".btn-primary,.fab,.nav-item,.pj-open-btn,.dh-card,.move-chip").forEach(attachRipple);
}

function donutSVG(data, size=130, thickness=20){
  const total = data.reduce((s,d)=>s+d.value,0);
  const r = (size - thickness)/2;
  const c = 2 * Math.PI * r;
  if(total===0){
    return `<svg viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#E5E5EA" stroke-width="${thickness}"/>
    </svg>`;
  }
  let offset = 0;
  const segs = data.filter(d=>d.value>0).map(d=>{
    const len = (d.value/total) * c;
    const seg = `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none"
      stroke="${d.color}" stroke-width="${thickness}"
      stroke-dasharray="${len-2} ${c-len+2}"
      stroke-dashoffset="${-offset+1}"
      transform="rotate(-90 ${size/2} ${size/2})"/>`;
    offset += len;
    return seg;
  }).join('');
  return `<svg viewBox="0 0 ${size} ${size}">${segs}</svg>`;
}

// v56: which time-of-day phase are we in, based on the real device clock.
// (still used for text-contrast classes: light text on evening/night)
function scenePhase(){
  const h = new Date().getHours();
  if(h>=5 && h<10) return "morning";
  if(h>=10 && h<17) return "day";
  if(h>=17 && h<19) return "evening";
  return "night";
}
// v58: blend two hex colours by t (0..1).
function mixHex(a, b, t){
  const pa=[parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
  const pb=[parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
  const m=pa.map((v,i)=>Math.round(v+(pb[i]-v)*t));
  return "#"+m.map(v=>v.toString(16).padStart(2,"0")).join("");
}
function buildLoginScene(){
  const now = new Date();
  const hour = now.getHours() + now.getMinutes()/60;  // 0..24, continuous
  const phase = scenePhase();
  const isDaytime = hour>=6 && hour<18;               // sun up 6:00–18:00
  const isNight = !isDaytime;

  // ── Sky colour by continuous time ────────────────────────────────
  // Anchor palettes through the day; interpolate between the two nearest.
  // [hour, skyTop, skyBottom]
  const skyStops = [
    [0,  "#0B1437", "#243B6B"],  // deep night
    [5,  "#243B6B", "#5A6BA8"],  // pre-dawn
    [6.5,"#FCE7C8", "#AEE0F0"],  // sunrise
    [9,  "#9FD8FF", "#E8F6FF"],  // morning
    [12, "#7FCBFF", "#E8F6FF"],  // midday bright
    [15, "#9FD8FF", "#E8F6FF"],  // afternoon
    [17.5,"#3A4D8F","#F6A65A"],  // sunset
    [19, "#1B2A55", "#7C5A8E"],  // dusk
    [21, "#0B1437", "#243B6B"],  // night
    [24, "#0B1437", "#243B6B"],
  ];
  let s1="#0B1437", s2="#243B6B";
  for(let i=0;i<skyStops.length-1;i++){
    const [h0,t0,b0]=skyStops[i], [h1,t1,b1]=skyStops[i+1];
    if(hour>=h0 && hour<=h1){
      const t=(hour-h0)/(h1-h0||1);
      s1=mixHex(t0,t1,t); s2=mixHex(b0,b1,t); break;
    }
  }

  // ── Mountain colours: green in day, dark blue at night, warm at dusk ──
  let far, mid, front, cloud;
  if(phase==="night"){       far="#2A3A63"; mid="#1E2C4E"; front="#141E38"; cloud="#3A4A74"; }
  else if(phase==="evening"){far="#7C6E8E"; mid="#5E5374"; front="#3E3855"; cloud="#F3C9A0"; }
  else if(phase==="morning"){far="#BFE3C7"; mid="#8FCFA3"; front="#5FB07C"; cloud="#FFFFFF"; }
  else {                     far="#A9DDB4"; mid="#7BC893"; front="#4FA873"; cloud="#FFFFFF"; }

  // ── Sun / moon position on a continuous arc ──────────────────────
  // Daytime: sun travels 6:00(left) → 12:00(top-centre) → 18:00(right).
  // Night:   moon travels 18:00(left) → 24:00(top-centre) → 6:00(right).
  // progress p = 0..1 across that span. x sweeps 180→820. y is a parabola
  // (lowest at the ends, highest in the middle) but kept ABOVE the title.
  let p;
  if(isDaytime) p = (hour-6)/12;
  else p = (hour>=18 ? (hour-18) : (hour+6)) / 12;   // 18→6 wraps midnight
  const discX = 180 + p*640;                          // 180 … 820
  // v59b: full-size disc, peaks high (overlap with title is fine per request).
  const discY = 300 - Math.sin(p*Math.PI)*250;

  // Stars (night only), fade in as it gets darker
  let stars = "";
  if(isNight){
    const pts = [[300,80],[360,140],[420,60],[470,120],[520,70],[560,150],[600,90],[640,50],[680,130],[720,80],[330,200],[450,190],[580,210],[660,180],[700,200],[280,150],[400,40],[500,30],[620,150],[750,140]];
    pts.forEach((pt,i)=>{
      const r=(i%3===0)?2.2:1.4, dly=(i%5)*0.6;
      stars += `<circle class="scene-star" cx="${pt[0]}" cy="${pt[1]}" r="${r}" fill="#FFFFFF" style="animation-delay:${dly}s"/>`;
    });
  }

  // Sun or moon disc at the computed arc position
  let disc;
  if(isNight){
    const moonGlow="#9DB4E8", moonFill="#EAF2FF";
    disc = `
      <circle cx="${discX}" cy="${discY}" r="46" fill="${moonGlow}" opacity="0.22"/>
      <circle cx="${discX}" cy="${discY}" r="30" fill="${moonFill}"/>
      <circle cx="${discX+12}" cy="${discY-6}" r="26" fill="${s1}"/>`;
  } else {
    // warm at sunrise/sunset, bright yellow midday
    const edge = Math.sin(p*Math.PI);                 // 0 at ends, 1 at noon
    const sunFill = mixHex("#FF9E45", "#FFE259", edge);
    const sunGlow = mixHex("#FFC089", "#FFF3B8", edge);
    disc = `
      <circle cx="${discX}" cy="${discY}" r="72" fill="${sunGlow}" opacity="0.35"/>
      <circle cx="${discX}" cy="${discY}" r="44" fill="${sunFill}"/>`;
  }

  const cloudOpacity = isNight ? 0.5 : 0.92;
  const clouds = `
    <g class="scene-cloud" opacity="${cloudOpacity}">
      <ellipse cx="400" cy="120" rx="70" ry="26" fill="${cloud}"/>
      <ellipse cx="450" cy="110" rx="55" ry="30" fill="${cloud}"/>
      <ellipse cx="350" cy="110" rx="45" ry="22" fill="${cloud}"/>
    </g>
    <g class="scene-cloud c2" opacity="${cloudOpacity*0.85}">
      <ellipse cx="600" cy="160" rx="60" ry="22" fill="${cloud}"/>
      <ellipse cx="640" cy="153" rx="46" ry="26" fill="${cloud}"/>
      <ellipse cx="560" cy="155" rx="40" ry="20" fill="${cloud}"/>
    </g>`;

  // Birds fly in the morning only
  let birds = "";
  if(phase==="morning"){
    const bird=(cls)=>`<g class="scene-bird ${cls}"><path d="M0 0 q8 -9 16 0 q8 -9 16 0" fill="none" stroke="#2B2B2B" stroke-width="2.4" stroke-linecap="round"/></g>`;
    birds = bird("b1")+bird("b2");
  }

  return `
  <svg viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${s1}"/>
        <stop offset="100%" stop-color="${s2}"/>
      </linearGradient>
    </defs>
    <rect x="0" y="0" width="1000" height="600" fill="url(#skyGrad)"/>
    ${stars}
    ${disc}
    ${clouds}
    ${birds}
    <path d="M0 420 L150 300 L300 400 L450 290 L620 410 L780 300 L1000 400 L1000 600 L0 600 Z" fill="${far}" opacity="0.75"/>
    <path d="M0 470 L180 360 L360 460 L520 360 L700 470 L860 380 L1000 460 L1000 600 L0 600 Z" fill="${mid}" opacity="0.9"/>
    <path d="M0 540 L160 470 L340 540 L520 460 L720 545 L900 480 L1000 530 L1000 600 L0 600 Z" fill="${front}"/>
  </svg>`;
}

      const u=getUser(name);
      if(u){ updateStreak(u); saveUsers(); } // v26: don't await — let cloud sync happen in background
      newSessionGreeting();
      currentPage="dashboard"; // always land on dashboard

// v53: remember which jobs already involve me at login time, so the background
// poll only toasts for jobs added AFTER I opened the app.
function seedSeenJobs(name){
  const set = new Set();
  (projects||[]).forEach(p=>{ if(!p.cancelled && p.status!=="done" && projectInvolves(p, name)) set.add("t_"+p.id); });
  (programs||[]).forEach(pr=>{
    if(pr.status==="done") return;
    if(nKey(pr.owner||"")===nKey(name) || (pr.members||[]).some(m=>nKey(m)===nKey(name))) set.add("pr_"+pr.id);
  });
  window.__seenJobIds = set;
}

// Popup shown right after login: jobs assigned to me that need attention
function showMyJobsPopup(name){
  const mine=projects.filter(p=>!p.cancelled && projectInvolves(p, name) && p.status!=="done");
  // v53: also surface big projects (programs) where this person is owner or member,
  // so a collaborator added to a program sees it when they log in.
  const myPrograms=(programs||[]).filter(pr=>{
    if(pr.status==="done") return false;
    if(nKey(pr.owner||"")===nKey(name)) return true;
    return (pr.members||[]).some(m=>nKey(m)===nKey(name));
  });
  if(mine.length===0 && myPrograms.length===0) return;
  const overdue=mine.filter(p=>{const d=daysUntil(p.dueDate);return d!==null&&d<0;});
  const dueSoon=mine.filter(p=>{const d=daysUntil(p.dueDate);return d!==null&&d>=0&&d<=3;});
  const sorted=mine.slice().sort((a,b)=>{
    const da=daysUntil(a.dueDate), db=daysUntil(b.dueDate);
    if(da===null&&db===null) return 0;
    if(da===null) return 1;
    if(db===null) return -1;
    return da-db;
  });
  const o=sheetShell(`
    <div class="sheet-head">
      <h2>งานของคุณ</h2>
      <button class="sheet-close" id="mjClose">✕</button>
    </div>
    <div style="font-size:14px;color:var(--label2);font-weight:600;padding:0 4px 14px;line-height:1.5">
      ${mine.length>0?`คุณมีงานที่ต้องดูแล <b style="color:var(--blue)">${mine.length} งาน</b>`:`คุณยังไม่มีงานเดี่ยวที่ค้างอยู่`}
      ${overdue.length>0?` · <b style="color:var(--red)">เกินกำหนด ${overdue.length}</b>`:""}
      ${dueSoon.length>0?` · <b style="color:#B45309">ใกล้ครบ ${dueSoon.length}</b>`:""}
      ${myPrograms.length>0?` · <b style="color:var(--accent,#7C3AED)">โปรเจกต์ใหญ่ ${myPrograms.length}</b>`:""}
    </div>
    <div class="group" style="padding:4px 0;max-height:48vh;overflow-y:auto">
      ${sorted.map(p=>{
        const d=daysUntil(p.dueDate);
        let c="#16A34A",lbl=d===null?"ไม่มีกำหนด":d+" วัน";
        if(d!==null){
          if(d<0){c="#DC2626";lbl="เกิน "+Math.abs(d)+" วัน";}
          else if(d===0){c="#DC2626";lbl="วันนี้!";}
          else if(d<=3){c="#EA580C";lbl="อีก "+d+" วัน";}
          else if(d<=7){c="#D97706";lbl="อีก "+d+" วัน";}
        } else { c="#8E8E93"; }
        return `
          <div class="dash-due" data-mjopen="${p.id}">
            <span style="width:8px;height:8px;border-radius:50%;background:${c};flex-shrink:0"></span>
            <span style="flex:1;font-size:13px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.title)||"(ไม่มีชื่อ)"}</span>
            <span style="font-size:11px;font-weight:700;color:${prioObj(p.priority).color}">${prioObj(p.priority).label}</span>
            <span style="font-size:12px;font-weight:800;color:${c};white-space:nowrap">${lbl}</span>
          </div>`;
      }).join("")}
      ${myPrograms.length>0?`
        <div style="font-size:12px;font-weight:800;color:var(--label2);padding:12px 8px 6px">📦 โปรเจกต์ใหญ่ที่คุณมีส่วนร่วม</div>
        ${myPrograms.map(pr=>{
          const isOwner=nKey(pr.owner||"")===nKey(name);
          return `
          <div class="dash-due" data-mjprog="${pr.id}">
            <span style="width:8px;height:8px;border-radius:50%;background:var(--accent,#7C3AED);flex-shrink:0"></span>
            <span style="flex:1;font-size:13px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(pr.title)||"(ไม่มีชื่อ)"}</span>
            <span style="font-size:11px;font-weight:700;color:${isOwner?'var(--blue)':'var(--label2)'}">${isOwner?'เจ้าของ':'ผู้ช่วย'}</span>
          </div>`;
        }).join("")}
      `:""}
    </div>
    <button class="btn-primary" id="mjGoto">ดูงานทั้งหมดของฉัน →</button>
    <div style="height:8px"></div>
    <button class="btn-secondary" id="mjDismiss">ปิด</button>
    <div style="height:8px"></div>
  `);
  $("#mjClose").onclick=closeSheet;
  $("#mjDismiss").onclick=closeSheet;
  $("#mjGoto").onclick=async()=>{
    projectScope="mine"; window._scopeTouched=true; projectStatusFilter="";
    closeSheet(); await savePage("projects"); render();
  };
  o.querySelectorAll("[data-mjopen]").forEach(b=>{

// MAIN RENDER
function render(){
  // v58: always show the welcome screen on a fresh app open so each person
  // re-confirms who they are (one tap on their card). myName is still
  // remembered, so it's a confirmation, not a full re-login.
  if(!loginConfirmed){ renderLogin(); return; }
  if(!myName || !getUser(myName)){ renderLogin(); return; }
  document.body.classList.add("has-nav");

  const me=getUser(myName);
  let content="";
  if(currentPage==="dashboard") content = renderDashboardPage(me);
  else if(currentPage==="projects")  content = renderProjectsPage(me);
  else if(currentPage==="programs")  content = renderProgramsPage(me);
  else if(currentPage==="chat") content = renderChatPage(me);
  else if(currentPage==="analytics") content = renderAnalyticsPage(me);
  else if(currentPage==="team") content = renderTeamPage(me);
  else if(currentPage==="history") content = renderHistoryPage(me);
  else if(currentPage==="settings") content = renderSettingsPage(me);
  else content = renderDashboardPage(me);

  $("#app").innerHTML = `
    ${sidebarHTML(me)}
    ${content}
  `;

  document.querySelectorAll("[data-num]").forEach(el=>animateNum(el,parseInt(el.dataset.num)));

  wireGlobal();
  if(currentPage==="dashboard") wireDashboard();
  else if(currentPage==="projects") wireProjects();
  else if(currentPage==="programs") wirePrograms();
  else if(currentPage==="chat") wireChat();
  else if(currentPage==="analytics") wireAnalytics();
  else if(currentPage==="team") wireTeam();
  else if(currentPage==="history") wireHistory();
  else if(currentPage==="settings") wireSettings();

  wireRipples();
  // re-open inline detail if it was open before a full re-render
  if(currentPage==="projects" && _inlineDetailId){
    const stillThere=projects.find(x=>x.id===_inlineDetailId && !x.cancelled);
    const keepId=_inlineDetailId;
    _inlineDetailId=null;
    if(stillThere){
      const btn=document.querySelector(`.pj-open-btn[data-open="${keepId}"]`);
      if(btn) toggleInlineDetail(keepId, btn);
    }
  }
  // grow progress bars from 0 on each render — progress feels earned
  requestAnimationFrame(()=>{
    document.querySelectorAll("[data-grow]").forEach(el=>{
      const w=el.dataset.grow; el.style.width="0%";
      requestAnimationFrame(()=>{ el.style.transition="width .9s var(--ease-out)"; el.style.width=w; });
    });
  });
}

// Rounded custom dropdown — replaces native <select> for status/priority/assignee
// ════════════════════════════════════════════════════════════════
function openCustomDropdown(anchorBtn, options, currentVal, onSelect){
  // Close any existing dropdowns first
  document.querySelectorAll(".pj-dd-menu").forEach(d => d.remove());
  document.querySelectorAll("[data-open]").forEach(b => { if(b.classList.contains("pj-dd-btn")) b.removeAttribute("data-open"); });
  // Mark anchor as open (arrow flips)
  anchorBtn.setAttribute("data-open", "1");
  // Build menu
  const menu = document.createElement("div");
  menu.className = "pj-dd-menu";
  menu.innerHTML = options.map(o => `
    <div class="pj-dd-item ${o.value===currentVal?"sel":""}" data-val="${esc(o.value)}">
      ${o.color ? `<span class="pj-dd-dot" style="background:${o.color}"></span>` : ""}
      <span class="pj-dd-lbl" ${o.color?`style="color:${o.color}"`:""}>${esc(o.label)}</span>
    </div>
  `).join("");
  document.body.appendChild(menu);
  // Position below anchor
  const r = anchorBtn.getBoundingClientRect();
  menu.style.top = (r.bottom + 6 + window.scrollY) + "px";
  menu.style.left = (r.left + window.scrollX) + "px";
  menu.style.minWidth = Math.max(r.width, 160) + "px";
  // Flip up if overflowing bottom
  requestAnimationFrame(() => {
    const mr = menu.getBoundingClientRect();
    if(mr.bottom > window.innerHeight - 8){
      menu.style.top = (r.top - mr.height - 6 + window.scrollY) + "px";
    }
    if(mr.right > window.innerWidth - 8){
      menu.style.left = (r.right - mr.width + window.scrollX) + "px";
    }
  });
  // Wire item clicks
  menu.querySelectorAll(".pj-dd-item").forEach(item => {
    item.onclick = (e) => {
      e.stopPropagation();
      onSelect(item.dataset.val);
      closeCustomDropdowns();
    };
  });
  // Click outside to close
  setTimeout(() => {
    document.addEventListener("click", closeCustomDropdowns, { once:true });
  }, 0);
}
function closeCustomDropdowns(){
  document.querySelectorAll(".pj-dd-menu").forEach(d => {
    d.style.animation = "ddMenuIn .12s reverse";
    setTimeout(() => d.remove(), 110);

  document.querySelectorAll(".pj-dd-btn[data-open]").forEach(b => b.removeAttribute("data-open"));
}

  const completedEarly = active.filter(p=>{

function dashCalendarHTML(active){
  const MONTHS=["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
  const DOW=["อา","จ","อ","พ","พฤ","ศ","ส"];
  const y=calRef.y, m=calRef.m;
  const first=new Date(y,m,1);
  const startDow=first.getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const today=new Date(); today.setHours(0,0,0,0);

  // map jobs by yyyy-mm-dd of their deadline
  const byDay={};
  active.forEach(p=>{
    if(!p.dueDate) return;
    const d=new Date(p.dueDate);
    if(d.getFullYear()!==y||d.getMonth()!==m) return;
    const key=d.getDate();
    if(!byDay[key]) byDay[key]=[];
    byDay[key].push(p);
  });

  // build grid cells
  let cells="";
  for(let i=0;i<startDow;i++) cells+=`<div class="dcal-cell empty"></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const jobs=byDay[day]||[];
    const cellDate=new Date(y,m,day); cellDate.setHours(0,0,0,0);
    const isToday=cellDate.getTime()===today.getTime();
    const dow=cellDate.getDay();
    const isWeekend=(dow===0||dow===6);
    const hol=holidayName(y,m,day);
    const isHoliday=!!hol;
    let dotColor="";
    if(jobs.length){
      const hasOverdue=jobs.some(p=>p.status!=="done"&&cellDate<today);
      const hasDone=jobs.every(p=>p.status==="done");
      dotColor = hasDone? "#16A34A" : hasOverdue? "#DC2626" : "#D97706";
    }
    cells+=`
      <div class="dcal-cell ${isToday?'today':''} ${jobs.length?'has-jobs':''} ${(isWeekend||isHoliday)?'dcal-off':''}" data-calday="${day}" ${isHoliday?`title="${esc(hol)}"`:""}>
        <div class="dcal-num">${day}</div>
        ${isHoliday?`<div class="dcal-holiday-dot"></div>`:""}
        ${jobs.length?`<div class="dcal-dot" style="background:${dotColor}"></div><div class="dcal-cnt">${jobs.length}</div>`:""}
      </div>`;
  }

  // upcoming jobs (not done, has due date, soonest) — shown like "Meetings" panel
  const upcoming=active
    .filter(p=>p.status!=="done"&&p.dueDate)
    .sort((a,b)=>daysUntil(a.dueDate)-daysUntil(b.dueDate))
    .slice(0,6);

  return `
    <div class="dash-box dcal-box">
      <div class="dash-box-head" style="display:flex;align-items:center;justify-content:space-between">
        <span style="display:flex;align-items:center;gap:7px;font-size:15px;font-weight:800">${MONTHS[m]} ${y+543}</span>
        <span style="display:flex;align-items:center;gap:6px">
          <button class="cal-nav" data-calnav="-1">‹</button>
          <button class="cal-nav" data-calnav="1">›</button>
        </span>
      </div>
      <div class="dash-box-body">
        <div class="dcal-grid">
          ${DOW.map(d=>`<div class="dcal-dow">${d}</div>`).join("")}
          ${cells}
        </div>
        <div class="dcal-legend">
          <span><i style="background:var(--warn)"></i>มีงาน</span>
          <span><i style="background:var(--crit)"></i>เกินกำหนด</span>
          <span><i style="background:var(--ok)"></i>เสร็จหมด</span>
          <span><i style="background:#FCA5A5"></i>วันหยุด</span>
        </div>
        <div id="calDayDetail" class="dcal-day-detail" style="display:none"></div>
      </div>
    </div>

    <div class="dash-box" style="margin-top:14px">
      <div class="dash-box-head" style="display:flex;align-items:center;justify-content:space-between">
        <span style="display:flex;align-items:center;gap:7px">${icon("clock",16)} กำหนดส่งถัดไป</span>
      </div>
      <div class="dash-box-body" style="padding:6px 0">
        ${upcoming.length===0?`<div class="cmp-empty">ไม่มีงานที่มีกำหนดส่ง</div>`:
          upcoming.map(p=>{
            const d=daysUntil(p.dueDate);
            let c="#16A34A",lbl=d+" วัน";
            if(d<0){c="#DC2626";lbl="เกิน "+Math.abs(d)+" วัน";}
            else if(d===0){c="#DC2626";lbl="วันนี้!";}
            else if(d<=3){c="#EA580C";lbl="อีก "+d+" วัน";}
            else if(d<=7){c="#D97706";lbl="อีก "+d+" วัน";}
            else if(d<=14){c="#CA8A04";lbl="อีก "+d+" วัน";}
            else lbl="อีก "+d+" วัน";
            const dd=new Date(p.dueDate);
            const dateLbl=dd.getDate()+" "+MONTHS[dd.getMonth()].slice(0,3);
            return `
              <div class="meet-row" data-dueopen="${p.id}">
                <div class="meet-date" style="border-color:${c}33;color:${c}">
                  <div class="meet-d">${dd.getDate()}</div>
                  <div class="meet-m">${MONTHS[dd.getMonth()].slice(0,3)}</div>
                </div>
                <div style="flex:1;min-width:0">
                  <div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(p.title)||"(ไม่มีชื่อ)"}</div>
                  <div style="font-size:11px;color:var(--label2);font-weight:600;margin-top:2px">${esc(p.assignee)} · <span style="color:${c};font-weight:800">${lbl}</span></div>
                </div>
                <span class="meet-go">${icon("chevron",15)}</span>
              </div>`;
          }).join("")}
      </div>
    </div>
  `;
}

function renderProjectsPage(me){
  const greetTime=greetingNow();
  const greetMsg=sessionGreeting;
  const li=levelInfo(me.xp||0);
  const wcAvatar=me.avatar?`<img src="${me.avatar}" alt=""/>`:me.emoji||"🙂";

  // default scope: admin sees all, member sees own
  if(projectScope==="mine" && meIsAdmin() && !window._scopeTouched) projectScope="all";

  function inScope(p){
    if(projectScope==="mine"){
      return projectInvolves(p, myName) || nKey(p.createdBy)===nKey(myName);
    }
    return true; // "all"
  }
  function passStatusFilter(p){
    if(projectStatusFilter==="overdue"){
      const d=daysUntil(p.dueDate); return d!==null&&d<0&&p.status!=="done"&&!p.cancelled;
    }
    if(projectStatusFilter==="doing") return p.status==="doing"&&!p.cancelled;
    if(projectStatusFilter==="todo") return p.status==="todo"&&!p.cancelled;
    if(projectStatusFilter==="done") return p.status==="done";
    if(projectStatusFilter==="cancelled") return p.cancelled===true;
    return !p.cancelled; // default hides cancelled unless explicitly filtered
  }

  const visible=projects.filter(p=>inScope(p)&&passStatusFilter(p));
  const total=visible.length;
  const doneCount=visible.filter(p=>p.status==="done").length;
  const overdue=visible.filter(p=>{const d=daysUntil(p.dueDate);return d!==null&&d<0&&p.status!=="done"&&!p.cancelled;}).length;

  const sorted=visible.slice().sort((a,b)=>{
    // 1. Done & cancelled go to the bottom — active work stays on top
    const aDone = (a.status === "done") || a.cancelled;
    const bDone = (b.status === "done") || b.cancelled;
    if(aDone !== bDone) return aDone ? 1 : -1;
    // 2. Within each bucket, sort by deadline (closest/overdue first)
    const da=daysUntil(a.dueDate), db=daysUntil(b.dueDate);
    if(da===null && db===null) return new Date(b.createdAt)-new Date(a.createdAt);

    if(db===null) return -1;
    return da-db;

    {id:"doing",label:"⚡ กำลังทำ"},
    {id:"done",label:"เสร็จ"},
    {id:"overdue",label:"เกินกำหนด"},
    {id:"cancelled",label:"ยกเลิก"},

  const scopeChips2=[
    {id:"mine",label:"งานของฉัน"},
    {id:"all",label:"ทั้งหมด"},

    {id:"overdue",label:"เกินกำหนด"},
    {id:"cancelled",label:"ยกเลิก"},
  ];

  return `
    ${topbarHTML("งานและโปรเจค", `${total} งาน · ${doneCount} เสร็จ${overdue>0?" · "+overdue+" เกินกำหนด":""}`, me)}

    <div class="welcome">

        <div class="wc-body">
          <div class="wc-greet">${greetTime.text}</div>

// ═══════════════════════════════════════════════════════════════════
// v17: TABLE VIEW — Excel-like flat layout (default mode)
// Cols: # · ชื่องาน · ผู้รับ · สถานะ · ความสำคัญ · กำหนดส่ง · วันเสร็จจริง · เตือน · จัดการ
// Reuses the same data-* attributes as card view so existing event handlers work.
// ═══════════════════════════════════════════════════════════════════
function renderProjectTable(sorted, teamOpts){
  const COL_COUNT = 9;
  return `
    <div class="pj-table-wrap">
      <table class="pj-table">
        <thead>
          <tr>
            <th class="pj-th pj-th-num">#</th>
            <th class="pj-th pj-th-title">ชื่องาน</th>
            <th class="pj-th pj-th-assign">ผู้รับผิดชอบ</th>
            <th class="pj-th pj-th-status">สถานะ</th>
            <th class="pj-th pj-th-prio">ความสำคัญ</th>
            <th class="pj-th pj-th-due">กำหนดส่ง</th>
            <th class="pj-th pj-th-actual">วันเสร็จจริง</th>
            <th class="pj-th pj-th-warn">เตือน</th>
            <th class="pj-th pj-th-act"></th>
          </tr>
        </thead>
        <tbody>
          <tr class="pj-tr-quickadd">
            <td colspan="${COL_COUNT}">
              <div class="pj-quickadd-wrap">
                <span class="pj-quickadd-icon">${icon("plus",14)}</span>
                <input class="pj-quickadd-input" id="pjQuickAdd" placeholder="พิมพ์ชื่องาน แล้วกด Enter เพื่อเพิ่มทันที..." />
                <span class="pj-quickadd-hint">Enter ↵</span>
              </div>
            </td>
          </tr>
          ${sorted.map((p,i)=>projectTableRow(p,i+1,teamOpts)).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function projectTableRow(p, num, teamOpts){
  const col = colObj(p.status);
  const isCancelled = p.cancelled===true;
  const days = daysUntil(p.dueDate);
  const collabCount = (p.collaborators||[]).length;
  const accent = p.color || col.color;

  let statusCls = "s-todo";
  if(isCancelled) statusCls = "is-cancelled";
  else if(p.status==="done") statusCls = "s-done";
  else if(p.status==="doing") statusCls = "s-doing";
  else if(days!==null && days<0) statusCls = "s-overdue";
  else if(days!==null && days>=0 && days<=3) statusCls = "s-soon";

  let dBg="var(--card2)", dFg="var(--label2)", dLabel="—";
  if(p.dueDate){
    if(days<0){dBg="rgba(220,38,38,.10)";dFg="#B91C1C";dLabel="เกิน "+Math.abs(days)+" วัน";}
    else if(days===0){dBg="rgba(220,38,38,.10)";dFg="#B91C1C";dLabel="วันนี้!";}
    else if(days<=3){dBg="rgba(234,88,12,.10)";dFg="#C2410C";dLabel=days+" วัน";}
    else if(days<=14){dBg="rgba(217,119,6,.10)";dFg="#B45309";dLabel=days+" วัน";}
    else {dBg="rgba(22,163,74,.10)";dFg="#15803D";dLabel=days+" วัน";}
  }

  let warnTxt, warnFg, warnBg;
  if(isCancelled){ warnTxt="ยกเลิก"; warnFg="var(--idle)"; warnBg="var(--card2)"; }
  else if(p.status==="done"){
    let dDate = p.actualDate || (p.completedAt?String(p.completedAt).slice(0,10):"");
    if(p.dueDate && dDate){
      const du=new Date(p.dueDate); du.setHours(0,0,0,0);
      const ac=new Date(dDate); ac.setHours(0,0,0,0);
      const diff=Math.round((du-ac)/86400000);
      if(diff>0){ warnTxt=`⚡ เร็ว ${diff}`; warnFg="#0F766E"; warnBg="rgba(20,184,166,.14)"; }
      else if(diff===0){ warnTxt="✓ ตรง"; warnFg="var(--ok)"; warnBg="rgba(14,124,102,.10)"; }
      else { warnTxt=`⏰ ช้า ${Math.abs(diff)}`; warnFg="#B91C1C"; warnBg="rgba(220,38,38,.10)"; }
    } else { warnTxt="เสร็จ"; warnFg="var(--ok)"; warnBg="rgba(14,124,102,.10)"; }
  }
  else if(days===null){ warnTxt="—"; warnFg="var(--idle)"; warnBg="var(--card2)"; }
  else if(days<0){ warnTxt=`✗ เกิน ${Math.abs(days)}`; warnFg="var(--crit)"; warnBg="rgba(220,38,38,.10)"; }
  else if(days<=3){ warnTxt="ใกล้ครบ"; warnFg="#C2410C"; warnBg="rgba(234,88,12,.10)"; }
  else { warnTxt="ตามแผน"; warnFg="var(--ok)"; warnBg="rgba(14,124,102,.10)"; }

  const canCancel = meIsAdmin() || nKey(p.createdBy)===nKey(myName);
  const canRestore = meIsAdmin() || nKey(p.createdBy)===nKey(myName);
  const creatorUser = users[nKey(p.createdBy)] || Object.values(users).find(u=>nKey(u.name)===nKey(p.createdBy));
  const createdByBoss = creatorUser && creatorUser.role==="admin";
  // v46: lock to creator only (admin override).
  const lockFields = !meIsAdmin() && nKey(p.createdBy)!==nKey(myName);
  const lockAttr = lockFields ? 'disabled' : (isCancelled?'disabled':'');
  const lockHint = lockFields ? ' title="เฉพาะผู้สร้างงานเท่านั้นที่แก้ไขได้"' : '';

  const aColor = avatarColor(p.assignee);
  const aInitial = (p.assignee||"?").charAt(0).toUpperCase();

  return `
    <tr class="pj-tr ${statusCls}" data-row="${p.id}" style="border-left:3px solid ${accent}">
      <td class="pj-td pj-td-num">${num}</td>
      <td class="pj-td pj-td-title">
        <div class="pj-tt-wrap">
          <input class="pj-tt-input ${lockFields?'pj-locked':''}" data-f="title" data-id="${p.id}" value="${esc(p.title||"")}" placeholder="(ไม่มีชื่อ)" ${lockAttr}${lockHint}/>
          ${p.description?`<span class="pj-tt-sub" title="${esc(p.description)}">${esc(p.description)}</span>`:""}
        </div>
      </td>
      <td class="pj-td pj-td-assign">
        <div class="pj-tassign-wrap">
          <button class="pj-dd-btn pj-tassign-btn" data-dd="assignee" data-id="${p.id}" ${!meIsAdmin()?'disabled title="เฉพาะหัวหน้ามอบหมายงานได้"':(isCancelled?'disabled':'')}>
            <span class="pj-tassign-ava" style="background:${aColor}">${esc(aInitial)}</span>
            <span class="pj-tassign-name">${esc(p.assignee||"—")}</span>
          </button>
          ${canAddCollab(p) && !isCancelled ? `<button class="pj-tassign-plus" data-collabadd="${p.id}" title="เพิ่มทีมร่วม">${icon("plus",12)}</button>` : ""}
          ${collabCount>0 ? `
            <div class="pj-tcollab-stack" title="ทีมร่วม: ${esc((p.collaborators||[]).filter(Boolean).join(", "))}">
              ${(p.collaborators||[]).slice(0,3).map(n=>`
                <span class="pj-tcollab-ava" style="background:${avatarColor(n)}" title="${esc(n)}">${esc((n||"?").charAt(0).toUpperCase())}</span>
              `).join("")}
              ${collabCount>3?`<span class="pj-tcollab-ava pj-tcollab-more">+${collabCount-3}</span>`:""}
            </div>
          ` : ""}
        </div>
      </td>
      <td class="pj-td pj-td-status">
        ${canEditStatus(p, myName)
          ? `<button class="pj-dd-btn pj-tdd" data-dd="status" data-id="${p.id}" style="background:${col.color}1a;color:${col.color};border-color:${col.color}33" ${isCancelled?'disabled':''}>
              <span class="pj-dd-dot" style="background:${col.color}"></span>
              <span>${esc(col.label)}</span>
            </button>`
          : `<span class="pj-tdd pj-tdd-locked" style="background:${col.color}1a;color:${col.color};border-color:${col.color}33" title="ดูได้อย่างเดียว — เฉพาะผู้รับผิดชอบงานนี้เปลี่ยนสถานะได้">
              <span class="pj-dd-dot" style="background:${col.color}"></span>
              <span>${esc(col.label)}</span>
            </span>`}
      </td>
      <td class="pj-td pj-td-prio">
        ${lockFields
          ? `<span class="pj-tdd pj-tdd-locked" style="background:${prioObj(p.priority).color}1a;color:${prioObj(p.priority).color};border-color:${prioObj(p.priority).color}33"${lockHint}>${esc(prioObj(p.priority).label)}${icon("lock",10)}</span>`
          : `<button class="pj-dd-btn pj-tdd" data-dd="priority" data-id="${p.id}" style="background:${prioObj(p.priority).color}1a;color:${prioObj(p.priority).color};border-color:${prioObj(p.priority).color}33" ${isCancelled?'disabled':''}>
              <span>${esc(prioObj(p.priority).label)}</span>
            </button>`}
      </td>
      <td class="pj-td pj-td-due">
        ${lockFields
          ? `<span class="pj-tdate-pill" style="background:${dBg};color:${dFg};opacity:.7"${lockHint}>${p.dueDate?fmtDateShort(p.dueDate):"—"} ${icon("lock",10)}</span>`
          : `<div class="pj-tdate-btn" data-datebtn="${p.id}">
              <span class="pj-tdate-pill" style="background:${dBg};color:${dFg}">${p.dueDate?fmtDateShort(p.dueDate)+" · "+dLabel:"แตะเลือก"}</span>
            </div>`}
      </td>
      <td class="pj-td pj-td-actual">
        <div class="pj-tdate-btn" data-actualbtn="${p.id}">
          <span class="pj-tdate-pill" style="background:${p.actualDate?'rgba(14,124,102,.10)':'var(--card2)'};color:${p.actualDate?'var(--warm-deep)':'var(--label3)'}">${p.actualDate?fmtDateShort(p.actualDate):"—"}</span>
        </div>
      </td>
      <td class="pj-td pj-td-warn">
        <span class="pj-twarn" style="background:${warnBg};color:${warnFg}">${warnTxt}</span>
      </td>
      <td class="pj-td pj-td-act">
        <button class="pj-open-btn pj-tact-btn" data-open="${p.id}" title="ขยายดูรายละเอียด">${icon("expand",13)}</button>
        ${isCancelled
          ? (canRestore?`<button class="pj-restore-btn pj-tact-btn" data-restore="${p.id}" title="กู้คืน">${icon("restore",13)}</button>`:"")
          : (canCancel?`<button class="pj-cancel-btn pj-tact-btn" data-cancel="${p.id}" title="ยกเลิก">${icon("cancel",13)}</button>`:`<span class="pj-tact-lock" title="ล็อก">${icon("lock",12)}</span>`)}
      </td>
    </tr>
  `;
}

function projectRow(p, num, teamOpts){
  const col=colObj(p.status);
  const isCancelled = p.cancelled===true;
  const days=daysUntil(p.dueDate);

  // ─── v16: SLIM DONE CARD ─────────────────────────────────────────────
  // For finished (not cancelled) tasks, render a compact row instead of the
  // full edit grid. Users can still tap to expand for full details.
  if(p.status === "done" && !isCancelled){
    const accent = p.color || col.color;
    const collabCount = (p.collaborators||[]).length;
    const canCancel = meIsAdmin() || nKey(p.createdBy)===nKey(myName);
    let doneDate = p.actualDate || "";
    if(!doneDate && p.completedAt) doneDate = String(p.completedAt).slice(0,10);
    let badgeText = "เสร็จแล้ว", badgeBg = "rgba(14,124,102,.12)", badgeFg = "#15803D", badgeIcon = "✓";
    if(p.dueDate && doneDate){
      const due = new Date(p.dueDate); due.setHours(0,0,0,0);
      const act = new Date(doneDate);  act.setHours(0,0,0,0);
      const diff = Math.round((due-act)/86400000);
      if(diff > 0){
        badgeText = `เร็วกว่า ${diff} วัน`;
        badgeBg = "rgba(20,184,166,.14)"; badgeFg = "#0F766E"; badgeIcon = "⚡";
      } else if(diff === 0){
        badgeText = "ตรงเวลา";
      } else {
        badgeText = `ล่าช้า ${Math.abs(diff)} วัน`;
        badgeBg = "rgba(220,38,38,.12)"; badgeFg = "#B91C1C"; badgeIcon = "⏰";
      }
    } else if(!p.dueDate){
      badgeText = "ไม่มีกำหนด"; badgeBg = "var(--card2)"; badgeFg = "var(--label2)"; badgeIcon = "—";
    }
    const dateLine = doneDate
      ? `เสร็จ ${fmtDateShort(doneDate)}${p.dueDate?` · กำหนด ${fmtDateShort(p.dueDate)}`:""}`
      : (p.dueDate ? `กำหนด ${fmtDateShort(p.dueDate)}` : "—");
    return `
      <div class="pj-card pj-card-slim s-done" data-row="${p.id}" style="border-left-color:${accent}">
        <div class="pj-slim-row">
          <div class="pj-num-badge pj-num-badge-slim">${num}</div>
          <div class="pj-slim-main">
            <div class="pj-slim-title">${esc(p.title||"(ไม่มีชื่อ)")}</div>
            <div class="pj-slim-meta">
              <span class="pj-slim-assignee">
                <span class="pj-slim-ava" style="background:${avatarColor(p.assignee)}">${esc((p.assignee||"?").charAt(0).toUpperCase())}</span>
                <span class="pj-slim-aname">${esc(p.assignee||"—")}</span>
                ${collabCount>0?`<span class="pj-slim-collab" title="ทีมร่วม ${collabCount} คน">+${collabCount}</span>`:""}
              </span>
              <span class="pj-slim-sep">·</span>
              <span class="pj-slim-dates">${dateLine}</span>
            </div>
          </div>
          <div class="pj-slim-badge" style="background:${badgeBg};color:${badgeFg}">${badgeIcon} ${badgeText}</div>
          <div class="pj-slim-actions">
            <button class="pj-open-btn" data-open="${p.id}" title="ขยายดูรายละเอียด">${icon("expand",14)}</button>
            ${canCancel?`<button class="pj-cancel-btn" data-cancel="${p.id}" title="ยกเลิกงาน">${icon("cancel",14)}</button>`:""}
          </div>
        </div>
      </div>
    `;
  }
  // ────────────────────────────────────────────────────────────────────

  // Compute status class for card background tint
  let statusClass = "s-todo";
  if(isCancelled) statusClass = "";
  else if(p.status==="done") statusClass = "s-done";
  else if(p.status==="doing") statusClass = "s-doing";
  else if(days!==null && days<0) statusClass = "s-overdue";
  else if(days!==null && days>=0 && days<=3) statusClass = "s-soon";
  let dBg="var(--card2)", dFg="var(--label2)", dLabel="แตะเลือกกำหนดส่ง";
  if(p.dueDate){
    if(days<0){dBg="rgba(220,38,38,.10)";dFg="#B91C1C";dLabel="เกิน "+Math.abs(days)+" วัน";}
    else if(days===0){dBg="rgba(220,38,38,.10)";dFg="#B91C1C";dLabel="วันนี้!";}
    else if(days<=3){dBg="rgba(234,88,12,.10)";dFg="#C2410C";dLabel="เหลือ "+days+" วัน";}
    else if(days<=7){dBg="rgba(217,119,6,.10)";dFg="#B45309";dLabel="เหลือ "+days+" วัน";}
    else if(days<=14){dBg="rgba(202,138,4,.12)";dFg="#A16207";dLabel="เหลือ "+days+" วัน";}
    else {dBg="rgba(22,163,74,.10)";dFg="#15803D";dLabel="เหลือ "+days+" วัน";}
  }
  let warnTxt, warnFg, warnBg;
  if(isCancelled){ warnTxt="ยกเลิก"; warnFg="var(--idle)"; warnBg="var(--card2)"; }
  else if(p.status==="done"){ warnTxt="เสร็จแล้ว"; warnFg="var(--ok)"; warnBg="rgba(14,124,102,.10)"; }
  else if(days===null){ warnTxt="ไม่มีกำหนด"; warnFg="var(--idle)"; warnBg="var(--card2)"; }
  else if(days<0){ warnTxt="เกินกำหนด"; warnFg="var(--crit)"; warnBg="rgba(220,38,38,.10)"; }
  else if(days<=3){ warnTxt="ใกล้ครบ"; warnFg="var(--warn)"; warnBg="rgba(217,119,6,.10)"; }
  else { warnTxt="ตามแผน"; warnFg="var(--ok)"; warnBg="rgba(14,124,102,.10)"; }

  const done=(p.tasks||[]).filter(t=>t.done).length;
  const tot=(p.tasks||[]).length;
  const fileCount=(p.attachments||[]).length;
  const pct = tot>0 ? Math.round(done/tot*100) : 0;
  const canCancel = meIsAdmin() || nKey(p.createdBy)===nKey(myName);
  const canRestore = meIsAdmin() || nKey(p.createdBy)===nKey(myName);
  // Lock key fields (title / due date / priority) when the job was assigned to
  // someone by an admin/head and the current user is neither admin nor the creator.
  const creatorUser = users[nKey(p.createdBy)] || Object.values(users).find(u=>nKey(u.name)===nKey(p.createdBy));
  const createdByBoss = creatorUser && creatorUser.role==="admin";
  // v46: lock to creator only (admin override).
  const lockFields = !meIsAdmin() && nKey(p.createdBy)!==nKey(myName);
  const lockAttr = lockFields ? 'disabled' : (isCancelled?'disabled':'');
  const lockHint = lockFields ? ' title="เฉพาะผู้สร้างงานเท่านั้นที่แก้ไขได้"' : '';
  const accent = p.color || col.color;

  return `
    <div class="pj-card ${isCancelled?'pj-card-cancelled':''} ${statusClass}" data-row="${p.id}" style="border-left-color:${accent}">
      <div class="pj-card-top">
        <div class="pj-num-badge">${num}</div>
        <div class="pj-card-main">
          <input class="pj-title-input ${lockFields?'pj-locked':''}" data-f="title" data-id="${p.id}" value="${esc(p.title)}" placeholder="พิมพ์ชื่องาน / โปรเจค..." ${lockAttr}${lockHint}/>
          <input class="pj-desc-input" data-f="description" data-id="${p.id}" value="${esc(p.description||"")}" placeholder="รายละเอียดงาน / หมายเหตุ..." ${isCancelled?'disabled':''}/>
        </div>
        <div class="pj-card-sub">
          <span class="pj-subtask-pill ${tot>0&&done===tot?'all-done':''}">
            ${icon("check",13)} งานย่อย ${tot>0?`${done}/${tot}`:"0"}
          </span>
          ${tot>0?`<div class="pj-subtask-bar"><div style="width:${pct}%;background:${pct===100?'var(--warm)':accent}"></div></div>`:""}
          ${fileCount>0?`<span class="pj-file-pill">${icon("file",12)} ${fileCount}</span>`:""}
        </div>
      </div>
      <div class="pj-card-bot">
        <div class="pj-field">
          <span class="pj-field-lbl">ผู้ดูแลหลัก ${(p.collaborators||[]).length>0?`<span style="color:var(--accent);font-weight:700">· +${(p.collaborators||[]).length} ทีมร่วม</span>`:""}</span>
          <div class="pj-assign-wrap">
            <button class="pj-dd-btn pj-assign-dd" data-dd="assignee" data-id="${p.id}" ${!meIsAdmin()?'disabled title="เฉพาะหัวหน้ามอบหมายงานได้"':(isCancelled?'disabled':'')}>
              <span class="pj-assign-ava" style="background:${avatarColor(p.assignee)}">${esc((p.assignee||"?").charAt(0).toUpperCase())}</span>
              <span class="pj-assign-name">${esc(p.assignee||"— เลือก")}</span>
            </button>
            ${canAddCollab(p) && !isCancelled ? `<button class="pj-collab-add" data-collabadd="${p.id}" title="เพิ่มคนเข้าร่วมในงานนี้">+</button>` : ""}
          </div>
          ${(p.collaborators||[]).length > 0 ? `
            <div class="pj-collab-row">
              <div class="pj-collab-stack">
                ${(p.collaborators||[]).slice(0,4).map(name => `
                  <div class="pj-collab-ava" style="background:${avatarColor(name)}" title="${esc(name)}">${esc((name||"?").charAt(0).toUpperCase())}</div>
                `).join("")}
                ${(p.collaborators||[]).length > 4 ? `<div class="pj-collab-ava pj-collab-more">+${(p.collaborators||[]).length - 4}</div>` : ""}
              </div>
              <span class="pj-collab-lbl">${esc((p.collaborators||[]).slice(0,2).join(", "))}${(p.collaborators||[]).length > 2 ? ` และอีก ${(p.collaborators||[]).length - 2}` : ""}</span>
            </div>
          ` : ""}
        </div>
        <div class="pj-field">
          <span class="pj-field-lbl">สถานะ ${!canEditStatus(p, myName)?icon("lock",10):""}</span>
          ${canEditStatus(p, myName)
            ? `<button class="pj-dd-btn" data-dd="status" data-id="${p.id}" style="background:${col.color}1a;color:${col.color};border-color:${col.color}33" ${isCancelled?'disabled':''}>
                <span class="pj-dd-dot" style="background:${col.color}"></span>
                <span>${esc(col.label)}</span>
              </button>`
            : `<div class="pj-dd-btn pj-locked" style="background:${col.color}1a;color:${col.color};border-color:${col.color}33" title="ดูได้อย่างเดียว — เฉพาะผู้รับผิดชอบเปลี่ยนสถานะได้">
                <span class="pj-dd-dot" style="background:${col.color}"></span>
                <span>${esc(col.label)}</span>
              </div>`}
        </div>
        <div class="pj-field">
          <span class="pj-field-lbl">ความสำคัญ ${lockFields?icon("lock",10):""}</span>
          <button class="pj-dd-btn" data-dd="priority" data-id="${p.id}" style="color:${prioObj(p.priority).color};border-color:${prioObj(p.priority).color}44" ${lockAttr}${lockHint}>
            <span class="pj-dd-dot" style="background:${prioObj(p.priority).color}"></span>
            <span>${esc(prioObj(p.priority).label)}</span>
          </button>
        </div>
        <div class="pj-field">
          <span class="pj-field-lbl">กำหนดส่ง ${lockFields?icon("lock",10):""}</span>
          ${lockFields
            ? `<div class="pj-date-btn" style="opacity:.6;cursor:not-allowed"${lockHint}><span class="pj-date-pill" style="background:${dBg};color:${dFg}">${p.dueDate?fmtDateShort(p.dueDate)+" · "+dLabel:"— ไม่ระบุ"}</span></div>`
            : `<div class="pj-date-btn" data-datebtn="${p.id}">

// ANALYTICS PAGE
// Date-range filter state for analytics page
let analyticsRange = "month"; // today | week | month | quarter | year | all

function renderAnalyticsPage(me){
  const range = rangeFor(analyticsRange);
  const rangeLabels = { today:"วันนี้", week:"สัปดาห์นี้", month:"เดือนนี้", quarter:"ไตรมาสนี้", year:"ปีนี้", all:"ทั้งหมด" };

  // ─── Active set filtered by range ───
  const inWindow = projects.filter(p => inRange(p.createdAt, range) || inRange(p.completedAt, range));
  const doneInWindow = inWindow.filter(p => p.status==="done" && !p.cancelled);

  // ─── Team-wide KPIs ───
  const totalAssigned = inWindow.length;
  const totalDone = doneInWindow.length;
  const totalActive = inWindow.filter(p => p.status!=="done" && !p.cancelled).length;
  const totalCancelled = inWindow.filter(p => p.cancelled).length;
  const doneRate = totalAssigned > 0 ? Math.round(totalDone/totalAssigned*100) : 0;

  // Hours stats
  let totalHours = 0, hoursCount = 0;
  doneInWindow.forEach(p=>{
    const h = effectiveHours(p);
    if(h !== null){ totalHours += h; hoursCount++; }
  });
  const avgHours = hoursCount>0 ? totalHours/hoursCount : null;

  // On-time stats (team-wide)
  let onTimeT=0, lateT=0, withDl=0;
  doneInWindow.forEach(p=>{
    if(p.dueDate && p.completedAt){
      withDl++;
      const due = new Date(p.dueDate); due.setHours(23,59,59,999);
      const dn  = new Date(p.completedAt);
      if(dn.getTime() <= due.getTime()) onTimeT++; else lateT++;
    }
  });
  const onTimeRate = withDl>0 ? Math.round(onTimeT/withDl*100) : null;

  // Budget (same as legacy)
  const totalBudget = inWindow.reduce((s,p)=>s+(p.budget||0),0);
  const totalSpent  = inWindow.reduce((s,p)=>s+(p.spent||0),0);

  // ─── Per-person aggregation ───
  const perf = aggregatePerformance(range);
  const personList = Object.values(perf)
    .filter(o=>o.assigned>0)
    .sort((a,b)=>b.done-a.done || b.assigned-a.assigned);
  const maxAssigned = personList.reduce((m,o)=>Math.max(m,o.assigned),1);

  // ─── Hours-per-task chart (top 10 by hours) ───
  const hoursPerPerson = personList
    .filter(o=>o.hoursCount>0)
    .map(o=>({ name:o.name, avg: o.hoursTotal/o.hoursCount, total:o.hoursTotal, count:o.hoursCount }))
    .sort((a,b)=>b.avg-a.avg);
  const maxAvg = hoursPerPerson.reduce((m,o)=>Math.max(m,o.avg),1);

  return `
    ${topbarHTML("วัด Performance ของทีม", `${rangeLabels[analyticsRange]} · ${totalAssigned} งานในช่วงนี้`, me)}

    <div class="analytics">

      <!-- Date Range Filter -->
      <div class="perf-filter" id="perfRangeBar">
        ${["today","week","month","quarter","year","all"].map(k=>`
          <button data-range="${k}" class="${analyticsRange===k?"active":""}">${rangeLabels[k]}</button>
        `).join("")}
      </div>

      <!-- Export Bar -->
      <div class="perf-export-bar">
        <span class="lbl">📥 ดาวน์โหลดรายงานช่วง <b>${rangeLabels[analyticsRange]}</b></span>
        <button id="btnExportXlsx" class="primary">${icon("file",13)} Export Excel (4 แผ่น)</button>
        <button id="btnExportCsv">${icon("file",13)} CSV</button>
      </div>

      <!-- Team-wide KPI cards -->
      <div class="perf-cards">
        <div class="perf-card">
          <div class="pc-label">งานทั้งหมด</div>
          <div class="pc-value">${totalAssigned}</div>
          <div class="pc-sub">${totalActive} กำลังทำ · ${totalCancelled} ยกเลิก</div>
        </div>
        <div class="perf-card warm">
          <div class="pc-label">งานเสร็จ</div>
          <div class="pc-value">${totalDone}</div>
          <div class="pc-sub">${doneRate}% ของทั้งหมด</div>
        </div>
        <div class="perf-card accent">
          <div class="pc-label">เฉลี่ย ชม./งาน</div>
          <div class="pc-value">${avgHours!==null?fmtHours(avgHours):"—"}</div>
          <div class="pc-sub">รวม ${fmtHours(totalHours)} · ${hoursCount} งาน</div>
        </div>
        <div class="perf-card ${onTimeRate!==null&&onTimeRate<70?'warn':'warm'}">
          <div class="pc-label">% ตรงเวลา</div>
          <div class="pc-value">${onTimeRate!==null?onTimeRate+"%":"—"}</div>
          <div class="pc-sub">ตรง ${onTimeT} · ช้า ${lateT}</div>
        </div>
      </div>

      <!-- Per-Person Performance -->
      <div class="ana-section">
        <div class="ana-section-head">
          ${icon("team",14)} Performance รายคน
          <span style="font-size:11px;color:var(--label2);font-weight:500">${personList.length} คนมีงานในช่วงนี้</span>
        </div>
        ${personList.length===0
          ? `<div class="perf-empty">ยังไม่มีข้อมูลในช่วง <b>${rangeLabels[analyticsRange]}</b><br><span style="font-size:11px">ลองเลือกช่วงเวลาที่กว้างขึ้น</span></div>`
          : personList.map(o=>{
              const avg = o.hoursCount>0 ? o.hoursTotal/o.hoursCount : null;
              const onTimePct = o.withDeadline>0 ? Math.round(o.onTime/o.withDeadline*100) : null;
              const ontimeColor = onTimePct===null ? "muted" : onTimePct>=80 ? "green" : onTimePct>=50 ? "orange" : "red";
              // Workload bar: active + done + cancelled segments
              const total = o.active + o.done + o.cancelled;
              const aPct = total>0 ? (o.active/total*100) : 0;
              const dPct = total>0 ? (o.done/total*100) : 0;
              const cPct = total>0 ? (o.cancelled/total*100) : 0;
              return `
                <div class="pp-row">
                  ${avatarHTML(o.name, 40)}
                  <div class="pp-row-main">
                    <div class="pp-name-line">
                      <span class="pp-name">${esc(o.name)}</span>
                      <span class="pp-name-sub">${o.role==="admin"?"· หัวหน้าทีม":"· สมาชิก"} · ${o.assigned} งาน</span>
                    </div>
                    <div class="pp-stats">
                      <div class="pp-stat"><div class="pp-stat-lbl">เสร็จ</div><div class="pp-stat-val green">${o.done}</div></div>
                      <div class="pp-stat"><div class="pp-stat-lbl">กำลังทำ</div><div class="pp-stat-val">${o.active}</div></div>
                      <div class="pp-stat"><div class="pp-stat-lbl">เฉลี่ย ชม./งาน</div><div class="pp-stat-val">${avg!==null?fmtHours(avg):"—"}</div></div>
                      <div class="pp-stat"><div class="pp-stat-lbl">ชม.รวม</div><div class="pp-stat-val">${fmtHours(o.hoursTotal||null)}</div></div>
                      <div class="pp-stat"><div class="pp-stat-lbl">ตรงเวลา</div><div class="pp-stat-val ${ontimeColor}">${onTimePct!==null?onTimePct+"%":"—"}</div></div>
                      <div class="pp-stat"><div class="pp-stat-lbl">ล่าช้า</div><div class="pp-stat-val ${o.late>0?'orange':'muted'}">${o.late}</div></div>
                    </div>
                    <div class="pp-bar-wrap">
                      <div class="pp-bar-track">
                        ${dPct>0?`<div class="pp-bar-seg" style="width:${dPct}%;background:var(--ok)"></div>`:""}
                        ${aPct>0?`<div class="pp-bar-seg" style="width:${aPct}%;background:var(--blue)"></div>`:""}
                        ${cPct>0?`<div class="pp-bar-seg" style="width:${cPct}%;background:var(--label3)"></div>`:""}
                      </div>
                      <div class="pp-bar-legend">
                        ${o.done>0?`<span><i style="background:var(--ok)"></i> เสร็จ ${o.done}</span>`:""}
                        ${o.active>0?`<span><i style="background:var(--blue)"></i> กำลังทำ ${o.active}</span>`:""}
                        ${o.cancelled>0?`<span><i style="background:var(--label3)"></i> ยกเลิก ${o.cancelled}</span>`:""}
                      </div>
                    </div>
                  </div>
                </div>`;
            }).join("")}
      </div>

      <!-- Hours per task chart -->
      ${hoursPerPerson.length>0?`
        <div class="ana-section">
          <div class="ana-section-head">
            ${icon("clock",14)} เวลาที่ใช้ต่อหนึ่งงาน (เฉลี่ย)
            <span style="font-size:11px;color:var(--label2);font-weight:500">เรียงจากใช้เวลามาก → น้อย</span>
          </div>
          ${hoursPerPerson.map(o=>`
            <div class="hpt-row">
              <div class="hpt-name">${esc(o.name)}</div>
              <div class="hpt-bar"><div class="hpt-fill" style="width:${(o.avg/maxAvg)*100}%"></div></div>
              <div class="hpt-val">${fmtHours(o.avg)}</div>
            </div>
          `).join("")}
        </div>
      `:""}

      <!-- Workload distribution (assigned count) -->
      ${personList.length>0?`
        <div class="ana-section">
          <div class="ana-section-head">
            ${icon("tasks",14)} การกระจายงาน — ใครได้งานเยอะที่สุด
            <span style="font-size:11px;color:var(--label2);font-weight:500">${totalAssigned} งานทั้งหมด</span>
          </div>
          <div class="ana-bar-chart">
            ${personList.slice().sort((a,b)=>b.assigned-a.assigned).map(o=>`
              <div class="ana-bar-row">
                <div class="ana-bar-label">${esc(o.name)}</div>
                <div class="ana-bar-bar">
                  <div class="ana-bar-fill" style="width:${(o.assigned/maxAssigned)*100}%;background:${avatarColor(o.name)}">${o.assigned} งาน · ${o.done} เสร็จ</div>
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      `:""}

      <!-- Budget overview (compact, range-aware) -->
      ${totalBudget>0?`
        <div class="ana-cards">
          <div class="ana-card budget">
            <div class="ac-label">งบในช่วงนี้</div>
            <div class="ac-value">${fmtMoney(totalBudget)}</div>
            <div class="ac-sub">${inWindow.filter(p=>(p.budget||0)>0).length} โปรเจค</div>
          </div>
          <div class="ana-card spent">
            <div class="ac-label">ใช้ไป</div>
            <div class="ac-value">${fmtMoney(totalSpent)}</div>
            <div class="ac-sub">${totalBudget>0?Math.round(totalSpent/totalBudget*100):0}% ของงบ</div>
          </div>
          <div class="ana-card remain">
            <div class="ac-label">คงเหลือ</div>
            <div class="ac-value" style="${totalBudget-totalSpent<0?'color:var(--crit)':''}">${fmtMoney(totalBudget-totalSpent)}</div>
